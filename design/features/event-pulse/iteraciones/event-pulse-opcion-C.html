<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Event Pulse — Opcion C: River Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Urbanist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#F6F8FA;--ink:#1A1A1A;--ink70:rgba(26,26,26,.7);--ink50:rgba(26,26,26,.5);--ink35:rgba(26,26,26,.35);--ink20:rgba(26,26,26,.18);--ink10:rgba(26,26,26,.1);--ink05:rgba(26,26,26,.05);--teal:#0D9488;--tealS:rgba(13,148,136,.1);--plat:#B5A68B;--platS:rgba(181,166,139,.12);--green:#16A34A;--blue:#2563EB;--purple:#7C3AED;--red:#EF4444;--surface:#FFF;--dsp:'Plus Jakarta Sans',system-ui,sans-serif;--body:'Urbanist',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{background:#0B0E13;font-family:var(--body);color:var(--ink);overflow:hidden;-webkit-font-smoothing:antialiased}
.stage{position:fixed;inset:0;display:grid;place-items:center;background:#0B0E13}
.canvas{width:1920px;height:1080px;transform-origin:center;background:var(--bg);position:relative;overflow:hidden;display:grid;grid-template-columns:280px 1fr 300px;grid-template-rows:1fr}

/* ═══ Left sidebar ═══ */
.sidebar-left{background:var(--surface);border-right:1px solid var(--ink05);display:flex;flex-direction:column;overflow:hidden}

.sl-header{padding:24px 20px;border-bottom:1px solid var(--ink05)}
.sl-brand{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sl-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.6}}
.sl-name{font-family:var(--dsp);font-weight:800;font-size:15px}
.sl-event{font-size:12px;color:var(--ink50);line-height:1.4}

.sl-clock{padding:20px;text-align:center;border-bottom:1px solid var(--ink05)}
.sl-clock-time{font-family:var(--dsp);font-weight:800;font-size:56px;letter-spacing:-.04em;font-variant-numeric:tabular-nums;line-height:1}
.sl-clock-time .colon{color:var(--ink35);animation:blink 1s steps(2) infinite}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:.2}}
.sl-clock-date{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink50);margin-top:6px}
.sl-clock-weather{font-size:13px;color:var(--ink50);margin-top:4px}
.sl-clock-weather b{color:var(--ink);font-weight:700}

.sl-metrics{padding:16px 20px;display:flex;flex-direction:column;gap:12px;border-bottom:1px solid var(--ink05)}
.sl-metric{display:flex;align-items:center;justify-content:space-between}
.sl-metric-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink50)}
.sl-metric-val{font-family:var(--dsp);font-weight:800;font-size:24px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.sl-metric-delta{font-family:var(--body);font-weight:700;font-size:10px;color:var(--teal);margin-left:6px}

.sl-rooms{flex:1;overflow-y:auto;padding:8px}
.sl-rooms::-webkit-scrollbar{width:0}
.sl-rooms-title{font-family:var(--dsp);font-weight:700;font-size:11px;color:var(--ink50);text-transform:uppercase;letter-spacing:.1em;padding:8px 12px 4px}
.sl-room{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .15s}
.sl-room:hover{background:var(--ink05)}
.sl-room-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sl-room-dot.off{background:var(--ink20)}
.sl-room-info{flex:1;min-width:0}
.sl-room-name{font-family:var(--dsp);font-weight:600;font-size:12px}
.sl-room-session{font-size:10px;color:var(--ink50);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sl-room-count{font-family:var(--dsp);font-weight:800;font-size:16px;font-variant-numeric:tabular-nums}

/* ═══ River (center) ═══ */
.river{overflow-y:auto;padding:24px 40px;scroll-behavior:smooth}
.river::-webkit-scrollbar{width:4px}
.river::-webkit-scrollbar-thumb{background:var(--ink10);border-radius:4px}
.river-title{font-family:var(--dsp);font-weight:700;font-size:13px;color:var(--ink50);text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:2}
.river-title .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}

/* River items — different sizes by importance */
.ri{background:var(--surface);border-radius:18px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);animation:riIn .5s cubic-bezier(.2,.7,.2,1);cursor:pointer;transition:box-shadow .2s,transform .2s;border:1px solid var(--ink05)}
.ri:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
@keyframes riIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Small item (check-in, points, message) */
.ri-sm{display:flex;align-items:center;gap:14px;padding:14px 18px}
.ri-sm .ri-avatar{width:40px;height:40px;border-radius:50%;background-size:cover;background-position:center;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.ri-sm .ri-icon{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex-shrink:0;font-size:18px}
.ri-sm .ri-body{flex:1}
.ri-sm .ri-text{font-size:14px;color:var(--ink70);line-height:1.35}
.ri-sm .ri-text b{color:var(--ink);font-weight:700}
.ri-sm .ri-meta{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink35);margin-top:3px}
.ri-sm .ri-accent{font-family:var(--dsp);font-weight:800;font-size:18px;color:var(--teal);flex-shrink:0}

/* Medium item (lead, match, rating) */
.ri-md{padding:20px 22px}
.ri-md .ri-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);margin-bottom:10px}
.ri-md .ri-row{display:flex;align-items:center;gap:18px}
.ri-md .ri-avatar{width:56px;height:56px;border-radius:50%;background-size:cover;background-position:center;box-shadow:0 4px 12px rgba(0,0,0,.12),0 0 0 3px #fff;flex-shrink:0}
.ri-md .badge{width:56px;height:56px;border-radius:50%;display:grid;place-items:center;font-family:var(--dsp);font-weight:800;font-size:18px;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15);flex-shrink:0}
.ri-md .badge.teal{background:var(--teal)}
.ri-md .badge.plat{background:var(--plat)}
.ri-md .badge.def{background:var(--ink)}
.ri-md .ri-main{flex:1}
.ri-md .ri-name{font-family:var(--dsp);font-weight:700;font-size:18px;letter-spacing:-.01em}
.ri-md .ri-sub{font-size:12px;color:var(--ink50);margin-top:2px}
.ri-md .ri-action{font-family:var(--dsp);font-weight:800;font-size:32px;color:var(--teal);flex-shrink:0;letter-spacing:-.02em}
.ri-md .ri-action span{color:var(--ink)}

/* Match special */
.ri-match .ri-row{justify-content:center;gap:24px;padding:8px 0}
.ri-match .ri-avatar{width:64px;height:64px}
.ri-match .spark{width:10px;height:10px;border-radius:50%;background:var(--teal);box-shadow:0 0 16px var(--teal);flex-shrink:0;animation:sparkP 1.2s ease-in-out infinite}
@keyframes sparkP{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
.ri-match .names{text-align:center;font-family:var(--dsp);font-weight:800;font-size:22px;margin-top:8px}
.ri-match .names .amp{color:var(--teal);margin:0 6px;font-weight:500}

/* Large item (social photo, poll) */
.ri-lg{padding:0;overflow:hidden}
.ri-lg .ri-photo{width:100%;height:240px;object-fit:cover}
.ri-lg .ri-photo-body{padding:16px 20px}
.ri-lg .ri-photo-caption{font-family:var(--dsp);font-weight:700;font-size:18px;letter-spacing:-.01em;line-height:1.25}
.ri-lg .ri-photo-author{font-size:12px;color:var(--ink50);margin-top:6px;display:flex;align-items:center;gap:6px}
.ri-lg .ri-photo-author .av{width:20px;height:20px;border-radius:50%;background-size:cover;background-position:center}
.ri-lg .ri-photo-likes{display:flex;align-items:center;gap:4px;font-family:var(--dsp);font-weight:700;font-size:13px;color:var(--red);margin-top:6px}

.ri-poll{padding:20px 22px}
.ri-poll .ri-question{font-family:var(--dsp);font-weight:700;font-size:16px;margin-bottom:14px;line-height:1.2}
.ri-poll .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.ri-poll .bar-label{font-size:11px;width:140px;text-align:right;color:var(--ink50)}
.ri-poll .bar-track{flex:1;height:20px;background:var(--ink05);border-radius:5px;overflow:hidden}
.ri-poll .bar-fill{height:100%;border-radius:5px}
.ri-poll .bar-fill.win{background:var(--teal)}
.ri-poll .bar-fill.norm{background:var(--ink20)}
.ri-poll .bar-pct{font-family:var(--dsp);font-weight:800;font-size:14px;width:40px}
.ri-poll .total{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink35);margin-top:8px}

/* ═══ Right sidebar ═══ */
.sidebar-right{background:var(--surface);border-left:1px solid var(--ink05);display:flex;flex-direction:column;overflow:hidden}
.sr-section{border-bottom:1px solid var(--ink05)}
.sr-title{font-family:var(--dsp);font-weight:700;font-size:11px;color:var(--ink50);text-transform:uppercase;letter-spacing:.1em;padding:14px 16px 8px}
.sr-sponsors{display:flex;flex-direction:column}
.sr-sp{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:background .15s}
.sr-sp:hover{background:var(--ink05)}
.sr-sp-logo{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;font-family:var(--dsp);font-weight:800;font-size:10px;flex-shrink:0}
.sr-sp-logo.teal{background:var(--teal);color:#fff}
.sr-sp-logo.plat{background:var(--plat);color:#fff}
.sr-sp-logo.def{background:var(--ink05);color:var(--ink)}
.sr-sp-name{font-family:var(--dsp);font-weight:600;font-size:12px;flex:1}
.sr-sp-leads{font-family:var(--dsp);font-weight:800;font-size:16px;font-variant-numeric:tabular-nums;position:relative}
.sr-sp-delta{position:absolute;right:0;top:-12px;font-size:10px;font-weight:800;color:var(--teal);opacity:0;pointer-events:none}
.sr-sp-delta.fire{animation:dPop 1s ease-out forwards}
@keyframes dPop{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-14px)}}

.sr-social{flex:1;overflow-y:auto;padding:8px}
.sr-social::-webkit-scrollbar{width:0}
.sr-social-card{border-radius:10px;overflow:hidden;margin-bottom:8px;background:var(--bg);animation:riIn .4s ease-out}
.sr-social-card img{width:100%;height:90px;object-fit:cover}
.sr-social-card .info{padding:6px 8px}
.sr-social-card .cap{font-family:var(--dsp);font-weight:600;font-size:11px;line-height:1.3}
.sr-social-card .auth{font-size:9px;color:var(--ink50);margin-top:3px}
.sr-social-card .lks{display:flex;align-items:center;gap:3px;font-family:var(--dsp);font-weight:700;font-size:10px;color:var(--red);margin-top:3px}

.hint{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.2);pointer-events:none}
</style>
</head>
<body>
<div class="stage"><div class="canvas">

<!-- Left sidebar -->
<div class="sidebar-left">
  <div class="sl-header">
    <div class="sl-brand"><div class="sl-dot"></div><div class="sl-name">Event Pulse</div></div>
    <div class="sl-event">Summit Empresarial 2026<br>Dia 2 &middot; Bogota</div>
  </div>
  <div class="sl-clock">
    <div class="sl-clock-time"><span id="hh">10</span><span class="colon">:</span><span id="mm">42</span></div>
    <div class="sl-clock-date">Jueves 23 Abril 2026</div>
    <div class="sl-clock-weather">Parcialmente nublado &middot; <b>24C</b></div>
  </div>
  <div class="sl-metrics">
    <div class="sl-metric"><div class="sl-metric-label">Check-ins</div><div><span class="sl-metric-val" id="k-checkin">347</span><span class="sl-metric-delta">+12</span></div></div>
    <div class="sl-metric"><div class="sl-metric-label">En linea</div><div class="sl-metric-val" id="k-online">189</div></div>
    <div class="sl-metric"><div class="sl-metric-label">Mensajes</div><div class="sl-metric-val" id="k-msgs">1,204</div></div>
    <div class="sl-metric"><div class="sl-metric-label">Conexiones</div><div class="sl-metric-val" id="k-conn">42</div></div>
    <div class="sl-metric"><div class="sl-metric-label">Leads</div><div><span class="sl-metric-val" id="k-leads">78</span><span class="sl-metric-delta" style="color:var(--plat)">+3</span></div></div>
  </div>
  <div class="sl-rooms">
    <div class="sl-rooms-title">Salones</div>
    <div id="roomsList"></div>
  </div>
</div>

<!-- River (center) -->
<div class="river" id="river">
  <div class="river-title"><span class="dot"></span>Actividad en vivo</div>
  <div id="riverItems"></div>
</div>

<!-- Right sidebar -->
<div class="sidebar-right">
  <div class="sr-section">
    <div class="sr-title">Sponsors &middot; Leads</div>
    <div class="sr-sponsors" id="sponsorList"></div>
  </div>
  <div class="sr-title">Social Wall</div>
  <div class="sr-social" id="socialList"></div>
</div>

</div></div>
<div class="hint">Opcion C — River Flow &middot; Stream central con tamanos variables</div>

<script>
function scale(){var c=document.querySelector('.canvas');var s=Math.min(window.innerWidth/1920,window.innerHeight/1080);c.style.transform='scale('+s+')';}
window.addEventListener('resize',scale);scale();

var AV=function(n){return'https://i.pravatar.cc/200?img='+n;};
var SOCIAL=['https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=600&q=80','https://images.unsplash.com/photo-1591115765373-5207764f72e7?w=600&q=80','https://images.unsplash.com/photo-1505373877841-8d25f7d46678?w=600&q=80','https://images.unsplash.com/photo-1528605248644-14dd04022da1?w=600&q=80','https://images.unsplash.com/photo-1515187029135-18ee286d815b?w=600&q=80'];
var NAMES=['Lucia Reyes','Carlos Morales','Sofia Herrera','Juan Perez','Maria Garcia','Pedro Lopez','Laura Diaz','Andres Gil','Camila Rojas','Elena Castillo','Diego Ramirez','Isabella Cruz','Mateo Alvarez','Valentina Torres'];
var ROLES=['Product Lead','Founder','CTO','VP Engineering','Design Director'];
var SPONSORS=[{name:'AWS',leads:23,mark:'AWS',color:'teal'},{name:'Google Cloud',leads:18,mark:'GC',color:'def'},{name:'Microsoft',leads:14,mark:'Ms',color:'plat'},{name:'Stripe',leads:12,mark:'St',color:'def'},{name:'Datadog',leads:11,mark:'Dd',color:'def'}];
var ROOMS=[{name:'Auditorio Principal',title:'Growth Hacking: metricas que importan',count:67,live:true},{name:'Sala A',title:'React Native a fondo',count:34,live:true},{name:'Sala B',title:'IA en la empresa moderna',count:28,live:true},{name:'Sala C',title:'DevOps para startups',count:0,live:false},{name:'Networking Lounge',title:'Networking libre',count:41,live:true},{name:'Zona Sponsors',title:'Stands abiertos',count:19,live:true}];
var CAPTIONS=['Increible keynote','Networking on fire','AWS demo impresionante','Panel IA','La mejor conferencia'];
var QUESTIONS=['Cual es la herramienta mas impactante?','Como miden el ROI de la innovacion?','Cual es el mayor reto de escalar cultura?'];
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function randAv(){return 1+Math.floor(Math.random()*70);}
var state={checkins:347,online:189,msgs:1204,conn:42,leads:78};

// Clock
function tickClock(){var d=new Date();var p=function(n){return String(n).padStart(2,'0');};document.getElementById('hh').textContent=p(d.getHours());document.getElementById('mm').textContent=p(d.getMinutes());}
tickClock();setInterval(tickClock,1000);

// Rooms
function renderRooms(){document.getElementById('roomsList').innerHTML=ROOMS.map(function(r){return'<div class="sl-room"><div class="sl-room-dot'+(r.live?'':' off')+'"></div><div class="sl-room-info"><div class="sl-room-name">'+r.name+'</div><div class="sl-room-session">'+r.title+'</div></div><div class="sl-room-count">'+(r.count||'-')+'</div></div>';}).join('');}
renderRooms();

// Sponsors
function renderSponsors(){document.getElementById('sponsorList').innerHTML=SPONSORS.map(function(s,i){return'<div class="sr-sp"><div class="sr-sp-logo '+s.color+'">'+s.mark+'</div><div class="sr-sp-name">'+s.name+'</div><div class="sr-sp-leads" id="sp-'+i+'">'+s.leads+'</div></div>';}).join('');}
renderSponsors();

// Social
var socialList=document.getElementById('socialList');
function addSocial(){var img=pick(SOCIAL);var name=pick(NAMES);var cap=pick(CAPTIONS);var likes=Math.floor(Math.random()*15)+3;
  var d=document.createElement('div');d.className='sr-social-card';
  d.innerHTML='<img src="'+img+'"><div class="info"><div class="cap">'+cap+'</div><div class="auth">'+name+'</div><div class="lks"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>'+likes+'</div></div>';
  socialList.insertBefore(d,socialList.firstChild);
  while(socialList.children.length>5)socialList.removeChild(socialList.lastChild);
}
for(var i=0;i<3;i++)addSocial();
setInterval(addSocial,9000);

// Metrics
function setK(id,val){document.getElementById(id).textContent=typeof val==='number'?val.toLocaleString():val;}
setInterval(function(){if(Math.random()<.5){state.checkins++;setK('k-checkin',state.checkins);}state.msgs+=Math.floor(Math.random()*3)+1;setK('k-msgs',state.msgs);state.online+=Math.random()<.5?1:-1;state.online=Math.max(175,Math.min(210,state.online));setK('k-online',state.online);if(Math.random()<.3){state.conn++;setK('k-conn',state.conn);}},3200);
setInterval(function(){if(Math.random()<.45){var si=Math.floor(Math.random()*SPONSORS.length);SPONSORS[si].leads++;state.leads++;setK('k-leads',state.leads);var el=document.getElementById('sp-'+si);if(el){el.textContent=SPONSORS[si].leads;var d=document.createElement('span');d.className='sr-sp-delta fire';d.textContent='+1';el.style.position='relative';el.appendChild(d);setTimeout(function(){d.remove();},1000);}}},5500);

// ═══ River items ═══
var riverItems=document.getElementById('riverItems');
var river=document.getElementById('river');

function addRiverItem(html){
  var d=document.createElement('div');
  d.innerHTML=html;
  var item=d.firstElementChild;
  riverItems.insertBefore(item,riverItems.firstChild);
  while(riverItems.children.length>40)riverItems.removeChild(riverItems.lastChild);
  river.scrollTop=0;
}

var RIVER_TYPES=[
  // Small: check-in
  {w:3,fn:function(){var n=pick(NAMES);var r=pick(ROOMS.filter(function(x){return x.live;}));return'<div class="ri ri-sm"><div class="ri-avatar" style="background-image:url(\''+AV(randAv())+'\')"></div><div class="ri-body"><div class="ri-text"><b>'+n+'</b> hizo check-in en <b>'+r.name+'</b></div><div class="ri-meta">Check-in</div></div></div>';}},
  // Small: points
  {w:1.5,fn:function(){var n=pick(NAMES);var pts=pick([25,50,75,100]);return'<div class="ri ri-sm"><div class="ri-icon" style="background:var(--tealS);color:var(--teal)">+</div><div class="ri-body"><div class="ri-text"><b>'+n+'</b> gano puntos en gamificacion</div><div class="ri-meta">Gamificacion</div></div><div class="ri-accent">+'+pts+'</div></div>';}},
  // Small: message
  {w:1,fn:function(){var n=pick(NAMES);var r=pick(ROOMS.filter(function(x){return x.live;}));return'<div class="ri ri-sm"><div class="ri-avatar" style="background-image:url(\''+AV(randAv())+'\')"></div><div class="ri-body"><div class="ri-text"><b>'+n+'</b> en chat de <b>'+r.name+'</b></div><div class="ri-meta">Mensaje</div></div></div>';}},
  // Medium: lead
  {w:2.5,fn:function(){var s=pick(SPONSORS);var n=pick(NAMES);var role=pick(ROLES);return'<div class="ri ri-md"><div class="ri-eyebrow">Lead capturado</div><div class="ri-row"><div class="ri-avatar" style="background-image:url(\''+AV(randAv())+'\')"></div><div class="ri-main"><div class="ri-name">'+n+'</div><div class="ri-sub">'+role+' &middot; capturado por <b>'+s.name+'</b></div></div><div class="ri-action"><span>+</span>1</div></div></div>';}},
  // Medium: match
  {w:2,fn:function(){var a=pick(NAMES),b=pick(NAMES);return'<div class="ri ri-md ri-match"><div class="ri-eyebrow">Conexion networking</div><div class="ri-row"><div class="ri-avatar" style="background-image:url(\''+AV(randAv())+'\')"></div><div class="spark"></div><div class="ri-avatar" style="background-image:url(\''+AV(randAv())+'\')"></div></div><div class="names">'+a.split(' ')[0]+'<span class="amp">&</span>'+b.split(' ')[0]+'</div></div>';}},
  // Medium: rating
  {w:1,fn:function(){var r=pick(ROOMS.filter(function(x){return x.live;}));var score=(4.5+Math.random()*.5).toFixed(1);return'<div class="ri ri-md"><div class="ri-eyebrow">Evaluacion de sesion</div><div class="ri-row"><div class="ri-icon" style="background:var(--platS);color:var(--plat);width:56px;height:56px;border-radius:50%;font-size:22px">&#9733;</div><div class="ri-main"><div class="ri-name">'+r.title+'</div><div class="ri-sub">'+r.name+'</div></div><div class="ri-action" style="color:var(--plat)">'+score+'</div></div></div>';}},
  // Large: social photo
  {w:1.5,fn:function(){var img=pick(SOCIAL);var n=pick(NAMES);var cap=pick(CAPTIONS);var likes=Math.floor(Math.random()*15)+3;return'<div class="ri ri-lg"><img class="ri-photo" src="'+img+'"><div class="ri-photo-body"><div class="ri-photo-caption">'+cap+'</div><div class="ri-photo-author"><div class="av" style="background-image:url(\''+AV(randAv())+'\')"></div>'+n+'</div><div class="ri-photo-likes"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>'+likes+' likes</div></div></div>';}},
  // Medium: poll
  {w:.8,fn:function(){var q=pick(QUESTIONS);var opts=['De acuerdo','Neutral','En desacuerdo'];var vals=[58,28,14];var max=58;return'<div class="ri ri-poll"><div class="ri-eyebrow" style="font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);margin-bottom:10px">Encuesta en vivo</div><div class="ri-question">'+q+'</div>'+opts.map(function(o,i){var w=Math.round(vals[i]/max*100);return'<div class="bar-row"><div class="bar-label">'+o+'</div><div class="bar-track"><div class="bar-fill '+(i===0?'win':'norm')+'" style="width:'+w+'%"></div></div><div class="bar-pct">'+vals[i]+'%</div></div>';}).join('')+'<div class="total">127 respuestas</div></div>';}},
  // Medium: QA
  {w:1,fn:function(){var q=pick(QUESTIONS);var n=pick(NAMES);var votes=Math.floor(Math.random()*20)+8;return'<div class="ri ri-md"><div class="ri-eyebrow">Q&A &middot; Pregunta popular</div><div class="ri-row"><div class="ri-icon" style="background:rgba(37,99,235,.08);color:var(--blue);width:56px;height:56px;border-radius:50%;font-size:22px">?</div><div class="ri-main"><div class="ri-name" style="font-size:15px;line-height:1.3">"'+q+'"</div><div class="ri-sub">'+n+' &middot; Auditorio</div></div><div class="ri-action" style="color:var(--blue);font-size:24px">&#8593;'+votes+'</div></div></div>';}},
];

function wPickRiver(){var total=RIVER_TYPES.reduce(function(s,t){return s+t.w;},0);var r=Math.random()*total;for(var i=0;i<RIVER_TYPES.length;i++){r-=RIVER_TYPES[i].w;if(r<=0)return RIVER_TYPES[i];}return RIVER_TYPES[0];}

// Seed
for(var j=0;j<8;j++){addRiverItem(wPickRiver().fn());}

// Live
setInterval(function(){addRiverItem(wPickRiver().fn());},2200);
</script>
</body>
</html>
