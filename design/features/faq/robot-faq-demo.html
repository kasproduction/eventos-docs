<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventOS — NOVA</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Urbanist:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --bg2: #18181b;
    --bg3: #222228;
    --surface: rgba(255,255,255,0.04);
    --surface2: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f4f3ef;
    --text2: rgba(244,243,239,0.55);
    --text3: rgba(244,243,239,0.28);
    --accent: #39d2c0;
    --accent2: rgba(57,210,192,0.10);
    --accent3: rgba(57,210,192,0.22);
    --blue: #4a9eff;
    --purple: #a78bfa;
  }

  html, body {
    width: 100%; min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; opacity: 0.5;
  }

  /* Ambient glow */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 700px 500px at 50% 60%, rgba(57,210,192,0.06) 0%, transparent 65%),
      radial-gradient(ellipse 400px 400px at 80% 10%, rgba(74,158,255,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 300px 300px at 10% 90%, rgba(167,139,250,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .wrapper {
    position: relative; z-index: 1;
    width: 100%; max-width: 440px;
    padding: 48px 24px 64px;
    display: flex; flex-direction: column; align-items: center;
  }

  /* ─── HEADER ─── */
  .header {
    text-align: center; margin-bottom: 36px;
  }
  .header-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent2); border: 1px solid var(--accent3);
    border-radius: 20px; padding: 4px 14px;
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 14px;
  }
  .chip-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: chip-blink 2s infinite; }
  @keyframes chip-blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .header-title {
    font-family: 'Urbanist', sans-serif;
    font-weight: 900; font-size: 30px;
    letter-spacing: -0.8px; line-height: 1.1; color: var(--text);
  }
  .header-title em { font-style: normal; color: var(--accent); }
  .header-sub {
    font-size: 13px; color: var(--text2); margin-top: 8px; font-weight: 500;
  }

  /* ─── STAGE ─── */
  .stage {
    width: 100%;
    display: flex; flex-direction: column; align-items: center;
  }

  /* ─── QUESTION BUBBLES ─── */
  .bubbles-top {
    width: 100%;
    display: flex; flex-direction: column; align-items: flex-end;
    gap: 9px; margin-bottom: 24px; min-height: 168px;
  }
  .q-bubble {
    max-width: 290px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 20px 20px 5px 20px;
    padding: 13px 18px;
    font-size: 14px; font-weight: 600; color: var(--text);
    cursor: pointer; position: relative;
    transform: translateX(24px) scale(0.97); opacity: 0;
    transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease, background 0.2s, border-color 0.2s, box-shadow 0.2s;
    line-height: 1.45;
  }
  .q-bubble:hover {
    background: var(--bg3);
    border-color: var(--accent3);
    box-shadow: 0 4px 20px rgba(57,210,192,0.08);
    transform: translateX(0) scale(1) !important;
  }
  .q-bubble.visible { transform: translateX(0) scale(1); opacity: 1; }
  .q-bubble.picked {
    background: var(--accent2); border-color: var(--accent3);
    color: var(--accent); pointer-events: none;
    box-shadow: 0 0 20px rgba(57,210,192,0.12);
  }
  .q-bubble.faded { opacity: 0.15; pointer-events: none; }

  /* ─── ROBOT ─── */
  .robot-scene {
    display: flex; flex-direction: column; align-items: center;
    position: relative; margin: 0;
  }

  .robot-outer {
    animation: bob 4s ease-in-out infinite;
    filter: drop-shadow(0 16px 48px rgba(57,210,192,0.14)) drop-shadow(0 0 1px rgba(57,210,192,0.3));
    transition: filter 0.4s;
  }
  .robot-outer.talking {
    animation: bob-talk 0.35s ease-in-out infinite alternate;
    filter: drop-shadow(0 20px 60px rgba(57,210,192,0.28)) drop-shadow(0 0 2px rgba(57,210,192,0.5));
  }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes bob-talk { from{transform:translateY(-4px)} to{transform:translateY(4px)} }

  .robot-glow {
    width: 90px; height: 12px; margin-top: -2px;
    background: radial-gradient(ellipse, rgba(57,210,192,0.25) 0%, transparent 70%);
    border-radius: 50%;
    animation: glow-bob 4s ease-in-out infinite;
    transition: opacity 0.4s;
  }
  @keyframes glow-bob { 0%,100%{transform:scaleX(1);opacity:0.7} 50%{transform:scaleX(0.65);opacity:0.3} }

  .robot-label {
    margin-top: 10px;
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text3);
  }
  .robot-label b { color: var(--accent); font-weight: 800; }

  /* ─── RESPONSE ─── */
  .response-zone {
    width: 100%; margin-top: 22px;
    display: flex; flex-direction: column; align-items: flex-start;
    gap: 0; min-height: 80px;
  }

  .typing-indicator {
    display: flex; align-items: center; gap: 5px;
    padding: 14px 18px;
    background: rgba(57,210,192,0.07);
    border: 1px solid rgba(57,210,192,0.18);
    border-radius: 5px 20px 20px 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .typing-indicator.show { opacity: 1; }
  .td { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: td 1.1s ease-in-out infinite; }
  .td:nth-child(2){animation-delay:.18s}
  .td:nth-child(3){animation-delay:.36s}
  @keyframes td { 0%,80%,100%{transform:scale(0.6);opacity:0.3} 40%{transform:scale(1);opacity:1} }

  .r-bubble {
    max-width: 310px;
    background: linear-gradient(135deg, rgba(57,210,192,0.09) 0%, rgba(74,158,255,0.05) 100%);
    border: 1px solid rgba(57,210,192,0.2);
    border-radius: 5px 20px 20px 20px;
    padding: 15px 18px;
    font-size: 14px; line-height: 1.65; color: var(--text);
    opacity: 0; transform: translateY(10px) scale(0.97);
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    position: relative; overflow: hidden;
  }
  .r-bubble::before {
    content: ''; position: absolute;
    left: 0; top: 12px; bottom: 12px; width: 2.5px;
    background: linear-gradient(to bottom, var(--accent), var(--blue));
    border-radius: 2px;
  }
  .r-bubble.show { opacity: 1; transform: translateY(0) scale(1); }

  /* Reset */
  .reset-wrap {
    margin-top: 18px; width: 100%;
    display: flex; justify-content: flex-start;
    opacity: 0; transform: translateY(8px); pointer-events: none;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .reset-wrap.show { opacity: 1; transform: translateY(0); pointer-events: all; }
  .reset-btn {
    padding: 9px 20px; border-radius: 12px;
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text2); font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .reset-btn:hover { background: var(--accent2); border-color: var(--accent3); color: var(--accent); }

</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="header-chip"><div class="chip-dot"></div>Asistente del evento</div>
    <div class="header-title">Hola, soy <em>NOVA</em> 👋</div>
    <div class="header-sub">Toca una pregunta y te ayudo al instante</div>
  </div>

  <div class="stage">

    <div class="bubbles-top" id="bubblesTop"></div>

    <!-- ROBOT SVG v2 — más premium, más personaje -->
    <div class="robot-scene">
      <div class="robot-outer" id="robotOuter">
        <svg width="160" height="180" viewBox="0 0 160 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%">
              <stop offset="0%" stop-color="#2a2a35"/>
              <stop offset="100%" stop-color="#16161e"/>
            </radialGradient>
            <radialGradient id="faceGrad" cx="50%" cy="35%" r="55%">
              <stop offset="0%" stop-color="#1e1e28"/>
              <stop offset="100%" stop-color="#111118"/>
            </radialGradient>
            <radialGradient id="eyeGlowL" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#39d2c0" stop-opacity="0.9"/>
              <stop offset="100%" stop-color="#1a9e94" stop-opacity="0.4"/>
            </radialGradient>
            <radialGradient id="eyeGlowR" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.9"/>
              <stop offset="100%" stop-color="#2060cc" stop-opacity="0.4"/>
            </radialGradient>
            <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="6" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <clipPath id="faceClip">
              <rect x="26" y="36" width="108" height="90" rx="24"/>
            </clipPath>
          </defs>

          <!-- ── ANTENA ── -->
          <line x1="80" y1="8" x2="80" y2="28" stroke="#39d2c0" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
          <!-- Antena base -->
          <ellipse cx="80" cy="28" rx="5" ry="3.5" fill="#2a2a35" stroke="#39d2c0" stroke-width="1" stroke-opacity="0.5"/>
          <!-- Antena ball con glow -->
          <circle cx="80" cy="8" r="6" fill="#39d2c0" filter="url(#softglow)" opacity="0.9">
            <animate attributeName="r" values="6;7.5;6" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle cx="80" cy="8" r="3.5" fill="white" opacity="0.6"/>

          <!-- ── CUELLO ── -->
          <rect x="65" y="125" width="30" height="14" rx="7" fill="#1a1a22" stroke="#39d2c0" stroke-width="0.8" stroke-opacity="0.2"/>
          <rect x="72" y="129" width="16" height="6" rx="3" fill="#39d2c0" opacity="0.08"/>

          <!-- ── CUERPO PRINCIPAL ── -->
          <!-- Sombra exterior sutil -->
          <rect x="18" y="30" width="124" height="100" rx="28" fill="#0a0a10" opacity="0.5"/>
          <!-- Body base -->
          <rect x="20" y="28" width="120" height="100" rx="26" fill="url(#bodyGrad)"/>
          <!-- Border con gradiente -->
          <rect x="20" y="28" width="120" height="100" rx="26" fill="none" stroke="url(#bodyGrad)" stroke-width="0"/>
          <rect x="20.75" y="28.75" width="118.5" height="98.5" rx="25.25" fill="none" stroke="#39d2c0" stroke-width="1" stroke-opacity="0.25"/>
          <!-- Top highlight -->
          <rect x="36" y="30" width="88" height="3" rx="1.5" fill="white" opacity="0.06"/>

          <!-- ── VISOR / PANEL FACIAL ── -->
          <rect x="26" y="36" width="108" height="90" rx="24" fill="url(#faceGrad)"/>
          <!-- Visor inner glow rim -->
          <rect x="26.75" y="36.75" width="106.5" height="88.5" rx="23.25" fill="none" stroke="#39d2c0" stroke-width="0.75" stroke-opacity="0.15"/>
          <!-- Visor top sheen -->
          <ellipse cx="80" cy="40" rx="42" ry="6" fill="white" opacity="0.04"/>

          <!-- Scanlines sutil -->
          <g clip-path="url(#faceClip)" opacity="0.025">
            <line x1="26" y1="50" x2="134" y2="50" stroke="white" stroke-width="1"/>
            <line x1="26" y1="58" x2="134" y2="58" stroke="white" stroke-width="1"/>
            <line x1="26" y1="66" x2="134" y2="66" stroke="white" stroke-width="1"/>
            <line x1="26" y1="74" x2="134" y2="74" stroke="white" stroke-width="1"/>
            <line x1="26" y1="82" x2="134" y2="82" stroke="white" stroke-width="1"/>
            <line x1="26" y1="90" x2="134" y2="90" stroke="white" stroke-width="1"/>
            <line x1="26" y1="98" x2="134" y2="98" stroke="white" stroke-width="1"/>
            <line x1="26" y1="106" x2="134" y2="106" stroke="white" stroke-width="1"/>
          </g>

          <!-- ── OJO IZQUIERDO (teal) ── -->
          <g class="eye-group" id="eyeL">
            <!-- Socket -->
            <rect x="36" y="54" width="36" height="28" rx="11" fill="#0c0c14"/>
            <rect x="36.5" y="54.5" width="35" height="27" rx="10.5" fill="none" stroke="#39d2c0" stroke-width="0.8" stroke-opacity="0.4"/>
            <!-- Iris glow background -->
            <ellipse cx="54" cy="68" rx="12" ry="9" fill="#39d2c0" opacity="0.08" filter="url(#softglow)"/>
            <!-- Iris -->
            <ellipse cx="54" cy="68" rx="10" ry="7.5" fill="url(#eyeGlowL)" filter="url(#glow)">
              <animate attributeName="ry" values="7.5;0.8;7.5" dur="4.2s" begin="1s" repeatCount="indefinite"/>
            </ellipse>
            <!-- Pupil -->
            <circle cx="54" cy="68" r="4" fill="#0a0a12"/>
            <!-- Glare points -->
            <circle cx="50" cy="64" r="2" fill="white" opacity="0.7"/>
            <circle cx="58" cy="72" r="1" fill="white" opacity="0.3"/>
            <!-- Socket top shine -->
            <rect x="40" y="56" width="20" height="2" rx="1" fill="white" opacity="0.05"/>
          </g>

          <!-- ── OJO DERECHO (blue) ── -->
          <g class="eye-group" id="eyeR">
            <rect x="88" y="54" width="36" height="28" rx="11" fill="#0c0c14"/>
            <rect x="88.5" y="54.5" width="35" height="27" rx="10.5" fill="none" stroke="#4a9eff" stroke-width="0.8" stroke-opacity="0.4"/>
            <ellipse cx="106" cy="68" rx="12" ry="9" fill="#4a9eff" opacity="0.07" filter="url(#softglow)"/>
            <ellipse cx="106" cy="68" rx="10" ry="7.5" fill="url(#eyeGlowR)" filter="url(#glow)">
              <animate attributeName="ry" values="7.5;0.8;7.5" dur="4.2s" begin="1.3s" repeatCount="indefinite"/>
            </ellipse>
            <circle cx="106" cy="68" r="4" fill="#0a0a12"/>
            <circle cx="102" cy="64" r="2" fill="white" opacity="0.7"/>
            <circle cx="110" cy="72" r="1" fill="white" opacity="0.3"/>
            <rect x="92" y="56" width="20" height="2" rx="1" fill="white" opacity="0.05"/>
          </g>

          <!-- ── BOCA (animable) ── -->
          <g id="mouthG" filter="url(#glow)">
            <path id="mouthPath"
              d="M 58 100 Q 80 108 102 100"
              stroke="#39d2c0" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.75"/>
            <!-- Dot corners -->
            <circle cx="58" cy="100" r="2" fill="#39d2c0" opacity="0.5"/>
            <circle cx="102" cy="100" r="2" fill="#39d2c0" opacity="0.5"/>
          </g>

          <!-- ── OÍDOS / SIDE PANELS ── -->
          <!-- Izq -->
          <rect x="8" y="50" width="14" height="38" rx="7" fill="#1c1c24" stroke="#39d2c0" stroke-width="0.8" stroke-opacity="0.2"/>
          <rect x="12" y="58" width="6" height="22" rx="3" fill="#39d2c0" opacity="0.06"/>
          <!-- Ear LEDs -->
          <circle cx="15" cy="62" r="2.5" fill="#39d2c0" opacity="0.7">
            <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.1s" repeatCount="indefinite"/>
          </circle>
          <circle cx="15" cy="72" r="2" fill="#39d2c0" opacity="0.3">
            <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.7s" repeatCount="indefinite"/>
          </circle>
          <circle cx="15" cy="81" r="1.5" fill="#39d2c0" opacity="0.2">
            <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.8s" repeatCount="indefinite"/>
          </circle>

          <!-- Der -->
          <rect x="138" y="50" width="14" height="38" rx="7" fill="#1c1c24" stroke="#4a9eff" stroke-width="0.8" stroke-opacity="0.2"/>
          <rect x="142" y="58" width="6" height="22" rx="3" fill="#4a9eff" opacity="0.06"/>
          <circle cx="145" cy="62" r="2.5" fill="#4a9eff" opacity="0.6">
            <animate attributeName="opacity" values="0.6;0.15;0.6" dur="1.9s" repeatCount="indefinite"/>
          </circle>
          <circle cx="145" cy="72" r="2" fill="#4a9eff" opacity="0.3">
            <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.4s" repeatCount="indefinite"/>
          </circle>
          <circle cx="145" cy="81" r="1.5" fill="#4a9eff" opacity="0.2">
            <animate attributeName="opacity" values="0.2;0.55;0.2" dur="1.5s" repeatCount="indefinite"/>
          </circle>

          <!-- ── STATUS BAR INFERIOR ── -->
          <rect x="44" y="116" width="72" height="8" rx="4" fill="#0c0c14" stroke="#39d2c0" stroke-width="0.5" stroke-opacity="0.2"/>
          <!-- Progress bar animado -->
          <rect x="46" y="117.5" width="0" height="5" rx="2.5" fill="url(#barGrad)" id="statusBar">
            <animate attributeName="width" values="0;68;0" dur="4s" repeatCount="indefinite"/>
          </rect>
          <defs>
            <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#39d2c0"/>
              <stop offset="100%" stop-color="#4a9eff"/>
            </linearGradient>
          </defs>

          <!-- ── HOMBROS / BASE ── -->
          <rect x="30" y="138" width="100" height="22" rx="11" fill="#1a1a22" stroke="#39d2c0" stroke-width="0.8" stroke-opacity="0.15"/>
          <rect x="50" y="142" width="60" height="14" rx="7" fill="#111118"/>
          <!-- Tornillos decorativos -->
          <circle cx="40" cy="149" r="4" fill="#16161e" stroke="#39d2c0" stroke-width="0.8" stroke-opacity="0.3"/>
          <line x1="38" y1="149" x2="42" y2="149" stroke="#39d2c0" stroke-width="1" stroke-opacity="0.2" stroke-linecap="round"/>
          <circle cx="120" cy="149" r="4" fill="#16161e" stroke="#39d2c0" stroke-width="0.8" stroke-opacity="0.3"/>
          <line x1="118" y1="149" x2="122" y2="149" stroke="#39d2c0" stroke-width="1" stroke-opacity="0.2" stroke-linecap="round"/>

          <!-- Chest logo mark -->
          <text x="80" y="151" text-anchor="middle" font-family="Urbanist, sans-serif" font-weight="900" font-size="10" fill="#39d2c0" opacity="0.4" letter-spacing="2">NOVA</text>

        </svg>
      </div>
      <div class="robot-glow" id="robotGlow"></div>
      <div class="robot-label">Asistente · <b>EventOS</b></div>
    </div>

    <!-- ZONA RESPUESTA -->
    <div class="response-zone" id="responseZone">
      <div class="typing-indicator" id="typingIndicator">
        <div class="td"></div><div class="td"></div><div class="td"></div>
      </div>
      <div class="r-bubble" id="rBubble"></div>
    </div>

    <div class="reset-wrap" id="resetWrap">
      <button class="reset-btn" onclick="resetAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Otra pregunta
      </button>
    </div>

  </div>
</div>

<script>
  const faqs = [
    { q: "¿Cómo cambio mi tipo de asistente?", a: "Entrá a tu perfil tocando el avatar arriba a la derecha. En «Tipo de acceso» podés cambiar entre Presencial, Virtual o Vendedor. El organizador aprueba el cambio en menos de 2 horas. 🎫" },
    { q: "¿Dónde queda la Sala Principal?", a: "Está en el Piso 2, Ala Norte. Buscá las señales teal en los pasillos. Desde el lobby principal: elevador → girás a la izquierda, no tiene pérdida. 📍" },
    { q: "¿Cómo descargo mi certificado?", a: "Tu certificado aparece 24h después de que cierre el evento, en la sección «Post-Evento» de la app. Se descarga en PDF y podés compartirlo directo a LinkedIn. 🏆" }
  ];

  let answered = false;
  let mouthInterval = null;

  const mouthFrames = [
    "M 58 100 Q 80 108 102 100",
    "M 58 100 Q 70 114 80 104 Q 90 95 102 100",
    "M 58 100 Q 68 95 80 106 Q 93 114 102 100",
    "M 58 100 Q 72 112 82 102 Q 94 93 102 100",
    "M 58 100 Q 66 97 78 108 Q 91 116 102 100",
    "M 58 100 Q 73 107 83 99 Q 95 91 102 100",
    "M 58 100 Q 80 110 102 100",
  ];
  const mouthIdle = "M 58 100 Q 80 108 102 100";
  let fi = 0;

  function renderBubbles() {
    const c = document.getElementById('bubblesTop');
    c.innerHTML = '';
    faqs.forEach((item, i) => {
      const b = document.createElement('div');
      b.className = 'q-bubble';
      b.textContent = item.q;
      b.onclick = () => pick(item, b);
      c.appendChild(b);
      setTimeout(() => b.classList.add('visible'), 100 + i * 120);
    });
  }

  function pick(item, el) {
    if (answered) return;
    answered = true;
    el.classList.add('picked');
    document.querySelectorAll('.q-bubble:not(.picked)').forEach(b => b.classList.add('faded'));

    startTalking();
    document.getElementById('typingIndicator').classList.add('show');

    setTimeout(() => {
      document.getElementById('typingIndicator').classList.remove('show');
      const rb = document.getElementById('rBubble');
      rb.textContent = item.a;
      rb.classList.add('show');
      setTimeout(() => stopTalking(), 1800);
      setTimeout(() => document.getElementById('resetWrap').classList.add('show'), 400);
    }, 1900);
  }

  function startTalking() {
    document.getElementById('robotOuter').classList.add('talking');
    mouthInterval = setInterval(() => {
      document.getElementById('mouthPath').setAttribute('d', mouthFrames[fi % mouthFrames.length]);
      fi++;
    }, 110);
  }

  function stopTalking() {
    clearInterval(mouthInterval);
    document.getElementById('robotOuter').classList.remove('talking');
    document.getElementById('mouthPath').setAttribute('d', mouthIdle);
  }

  function resetAll() {
    answered = false;
    stopTalking();
    const rb = document.getElementById('rBubble');
    rb.textContent = ''; rb.classList.remove('show');
    document.getElementById('resetWrap').classList.remove('show');
    document.getElementById('typingIndicator').classList.remove('show');
    renderBubbles();
  }

  renderBubbles();
</script>
</body>
</html>
