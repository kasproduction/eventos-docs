<title>Showcase v11 — El Trailer (tokens reales · Noir + Lux)</title>
<style>
  /* Tokens REALES de eventos-web: globals.css (Noir root / [data-theme=lux]) + streaming.css (--st-*) */
  :root {
    --bg: #0a0a0a;
    --bg-elevated: #141414;
    --border: rgba(255, 255, 255, 0.06);
    --border-light: rgba(255, 255, 255, 0.12);
    --border-strong: rgba(255, 255, 255, 0.18);
    --text: rgba(255, 255, 255, 0.85);
    --text-secondary: rgba(255, 255, 255, 0.5);
    --muted: rgba(255, 255, 255, 0.35);
    --label: rgba(255, 255, 255, 0.25);
    --accent: #ffffff;
    --heart: #ff5d6c;
    --teal: #39d2c0;
    --cyan: #5eead4;
    --gold: #b5a68b;
    --chipbg: #141414;
    --inv-bg: #f5f5f4;
    --inv-fg: #0a0a0a;
    --glass-rail: rgba(20, 20, 22, 0.55);
    --island: #0a0a0a;
    /* streaming.css Noir */
    --st-card: #181818; --st-low: #1a1a1a; --st-med: #1f1f1f; --st-high: #262626;
    --st-fg: #f5f5f4; --st-dim: #a8a8a3; --st-mute: #6b6b66;
    --tv-ok: #10b981; --tv-bad: #ef4444;
    /* Noir: sombras NONE — el borde luminoso hace el trabajo */
    --shadow-card: none;
    --shadow-lg: none;
    --shadow-xl: none;
    --kv-shadow: 0 30px 60px rgba(0, 0, 0, 0.55);
    --pop: cubic-bezier(0.34, 1.56, 0.64, 1);
    --rubber: cubic-bezier(0.3, 1.9, 0.4, 1);
  }
  html[data-lux] {
    --bg: #f6f8fa;
    --bg-elevated: #ffffff;
    --border: rgba(0, 0, 0, 0.08);
    --border-light: rgba(0, 0, 0, 0.04);
    --border-strong: rgba(0, 0, 0, 0.14);
    --text: #1a1b1e;
    --text-secondary: #4a4b50;
    --muted: #7c7d82;
    --label: #a8a9ae;
    --accent: #1a1a1a;
    --gold: #8e8170;
    --chipbg: #ffffff;
    --inv-bg: #1a1a1a;
    --inv-fg: #f5f5f4;
    --glass-rail: #ffffff;
    --island: #1a1b1e;
    /* streaming.css Lux */
    --st-card: #ffffff; --st-low: #fafaf9; --st-med: #f5f5f4; --st-high: #e7e5e4;
    --st-fg: #1c1c1c; --st-dim: #4a4a48; --st-mute: #6b6b66;
    /* Lux: las sombras REEMPLAZAN a los bordes */
    --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.10);
    --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.12);
    --kv-shadow: 0 30px 60px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(0, 0, 0, 0.04);
  }
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); overflow: hidden; user-select: none;
    font-family: Urbanist, "Plus Jakarta Sans", "Segoe UI", system-ui, sans-serif;
    transition: background 0.5s ease; }
  .disp { font-family: "Plus Jakarta Sans", Urbanist, "Segoe UI", system-ui, sans-serif; }
  img { -webkit-user-drag: none; }

  #stage { position: fixed; inset: 0; overflow: hidden; }
  /* telon de fondo: SOLO el color del arte (sin wordmark), blur horneado en canvas */
  #kvback { position: absolute; inset: 0; background-size: cover; background-position: center;
    opacity: 0; transform: scale(1.06); z-index: 1; transition: opacity 1.2s ease; }
  #kvback.on { opacity: 1; }
  #fx { position: absolute; inset: 0; z-index: 30; pointer-events: none; }
  #flash { position: absolute; inset: 0; background: #fff; opacity: 0; z-index: 60; pointer-events: none; }
  html[data-lux] #flash { background: #141412; }
  #ring { position: absolute; left: 50%; top: 50%; translate: -50% -50%; width: 60px; height: 60px;
    border-radius: 50%; border: 2px solid rgba(235,235,240,0.55); opacity: 0; z-index: 29; pointer-events: none; }
  html[data-lux] #ring { border-color: rgba(40,40,35,0.45); }
  #ring.boom { animation: ringout 0.9s cubic-bezier(0.1,0.7,0.3,1) forwards; }
  @keyframes ringout { 0% { opacity: 0.9; width: 60px; height: 60px; border-width: 3px; }
    100% { opacity: 0; width: min(120vh,900px); height: min(120vh,900px); border-width: 1px; } }
  #glow { position: absolute; left: 50%; top: 50%; translate: -50% -50%; width: 10px; height: 10px;
    border-radius: 50%; z-index: 8; opacity: 0; pointer-events: none;
    background: radial-gradient(circle, rgba(240,240,245,0.95), rgba(190,195,205,0.4) 55%, transparent 75%); }
  html[data-lux] #glow { background: radial-gradient(circle, rgba(45,45,40,0.85), rgba(80,80,72,0.35) 55%, transparent 75%); }

  .tbtn { font: 600 12.5px Urbanist, system-ui, sans-serif; color: var(--muted);
    background: color-mix(in srgb, var(--accent) 4%, transparent); border: 1px solid var(--border);
    border-radius: 10px; padding: 7px 14px; cursor: pointer; transition: color 0.2s; }
  .tbtn:hover { color: var(--text); }
  #skip { position: absolute; top: 14px; right: 18px; z-index: 95; }
  #replay { position: absolute; top: 14px; right: 92px; z-index: 95; }
  #theme { position: absolute; top: 14px; left: 18px; z-index: 95; letter-spacing: 0.12em; }

  /* ===== rail (Noir: glass borde luminoso sin blur · Lux: blanco + sombra) ===== */
  #rail { position: absolute; left: 18px; top: 50%; z-index: 80;
    width: 52px; display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 0; border-radius: 28px; border: 1px solid var(--border-strong);
    background: var(--glass-rail); box-shadow: var(--shadow-lg);
    transform: translateY(-50%) translateX(-110px); opacity: 0; }
  html[data-lux] #rail { backdrop-filter: none; }
  #rail.in { animation: railin 0.6s var(--pop) forwards; }
  @keyframes railin { to { transform: translateY(-50%) translateX(0); opacity: 1; } }
  .ritem { position: relative; display: grid; place-items: center; width: 52px; height: 40px; flex: none;
    color: var(--muted); opacity: 0.25; transition: opacity 0.35s, color 0.35s, transform 0.25s var(--pop); }
  .ritem svg { width: 19px; height: 19px; display: block; }
  .ritem.lit { opacity: 1; color: var(--text); }
  .ritem .ring2 { position: absolute; inset: 3px 9px; border-radius: 12px; border: 1px solid color-mix(in srgb, var(--accent) 70%, transparent);
    opacity: 0; transform: scale(0.6); }
  .ritem.lit .ring2 { animation: r2 0.7s ease forwards; }
  @keyframes r2 { 0% { opacity: 0.9; transform: scale(0.6); } 100% { opacity: 0; transform: scale(1.6); } }
  .rsep { height: 1px; width: 24px; background: var(--border); margin: 6px 0; flex: none; }
  .rchip { position: absolute; left: calc(100% + 14px); top: 50%; translate: 0 -50%;
    display: flex; height: 30px; align-items: center; white-space: nowrap;
    border-radius: 11px; border: 1px solid var(--border-strong); background: var(--chipbg);
    padding: 0 12px; font-size: 12.5px; font-weight: 600; color: var(--text);
    box-shadow: var(--shadow-lg); opacity: 0; transform-origin: left center;
    pointer-events: none; z-index: 85; }
  .rchip.pop { animation: chippop 1.5s var(--rubber) forwards; }
  @keyframes chippop { 0% { opacity: 0; transform: scaleX(0.15) scaleY(1.4) rotate(-4deg); }
    13% { opacity: 1; transform: none; } 82% { opacity: 1; } 100% { opacity: 0; } }

  /* ===== chrome ===== */
  .sc { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    padding-left: 80px; opacity: 0; pointer-events: none; z-index: 20; }
  .sc.on { opacity: 1; }
  #ftitle { position: absolute; top: 46px; right: 44px; z-index: 62; text-align: right;
    opacity: 0; transform: translateX(50px); pointer-events: none; }
  #ftitle.on { animation: ftin 0.45s var(--pop) forwards; }
  @keyframes ftin { to { opacity: 1; transform: translateX(0); } }
  #ftitle .cat { font-size: 10px; font-weight: 800; letter-spacing: 0.35em; color: var(--fcol, var(--muted)); margin-bottom: 5px; }
  #ftitle .name { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; color: var(--text); }

  /* callout informativo: junto a la accion, dwell largo para que se LEA */
  #co { position: absolute; z-index: 66; width: 300px; padding: 15px 17px; border-radius: 16px;
    background: var(--chipbg); border: 1px solid var(--border-strong);
    box-shadow: var(--shadow-xl); opacity: 0;
    transform: translateY(14px) scale(0.92); pointer-events: none; }
  #co.on { animation: coin 0.5s var(--rubber) forwards; }
  @keyframes coin { to { opacity: 1; transform: none; } }
  #co .co-t { display: flex; align-items: center; gap: 9px;
    font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 14.5px; font-weight: 800;
    letter-spacing: -0.01em; color: var(--text); }
  #co .co-t svg { width: 17px; height: 17px; color: var(--co-col, var(--muted)); flex: none; }
  #co .co-d { font-size: 13px; line-height: 1.5; color: var(--text-secondary); margin-top: 6px; }

  #cur { position: absolute; z-index: 70; width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid color-mix(in srgb, var(--accent) 40%, transparent);
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    opacity: 0; pointer-events: none;
    transition: left 0.55s var(--pop), top 0.55s var(--pop), opacity 0.25s, transform 0.15s; }
  #cur.tap { transform: scale(0.7); }
  #toast { position: absolute; top: 58px; left: 50%; z-index: 88;
    display: flex; align-items: center; gap: 10px; background: var(--chipbg);
    border: 1px solid var(--border-strong); border-radius: 13px; padding: 11px 18px;
    font-size: 13px; font-weight: 700; color: var(--text);
    box-shadow: var(--shadow-xl);
    opacity: 0; transform: translateX(-50%) translateY(-24px) scale(0.9); pointer-events: none; }
  #toast.on { animation: toastin 0.5s var(--rubber) forwards; }
  @keyframes toastin { to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }
  #toast .tico { color: var(--muted); } #toast .tico svg { width: 17px; height: 17px; display: block; }
  #toast small { display: block; font-size: 11px; font-weight: 600; color: var(--muted); }
  .squish { animation: squish 0.35s ease; }
  @keyframes squish { 0% { transform: scaleY(0.92) scaleX(1.06); } 45% { transform: scaleY(1.03) scaleX(0.98); } 100% { transform: none; } }
  @keyframes riseIn { to { opacity: 1; transform: none; } }

  /* ===== OPENING ===== */
  .op-wrap { display: flex; flex-direction: column; align-items: center; }
  #kv { width: min(880px, 78vw); aspect-ratio: 16/9; border-radius: 20px; position: relative;
    overflow: hidden; background: #050403; box-shadow: var(--kv-shadow);
    opacity: 0; transform: scale(1.14); }
  #kv.reveal { animation: kvin 0.7s cubic-bezier(0.2, 0.8, 0.25, 1) forwards; }
  @keyframes kvin { 0% { opacity: 0; transform: scale(1.14); filter: brightness(2.2); }
    45% { opacity: 1; filter: brightness(1.35); } 100% { opacity: 1; transform: scale(1); filter: brightness(1); } }
  #kv img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #kv .ovl { position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.12) 0%, transparent 30%, transparent 65%, rgba(0,0,0,0.4) 100%); }
  .op-meta { margin-top: 22px; display: flex; align-items: center; gap: 12px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; color: var(--text-secondary);
    opacity: 0; transform: translateY(10px); }
  .op-meta.in { animation: riseIn 0.55s ease forwards; }
  .op-meta i { height: 1px; width: 18px; background: var(--border-strong); }
  .kv-note { margin-top: 14px; font-size: 11px; color: var(--label); opacity: 0; }
  .kv-note.in { opacity: 1; transition: opacity 0.6s ease; }

  /* ===== AGENDA ===== */
  .agv { width: 490px; opacity: 0; transform: scale(0.85) translateY(24px); }
  .agv.in { animation: cardin 0.5s var(--rubber) forwards; }
  @keyframes cardin { to { opacity: 1; transform: none; } }
  .ag-title { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 24px; font-weight: 800;
    letter-spacing: -0.5px; color: var(--text); }
  .ag-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 14px; }
  .ag-tabs { display: inline-flex; padding: 3px; background: var(--st-low); border-radius: 11px; gap: 2px;
    border: 1px solid var(--border-light); }
  .ag-tab { padding: 6px 12px; border-radius: 8px; font-size: 11.5px; font-weight: 600; color: var(--st-dim);
    display: flex; align-items: center; gap: 5px; transition: all 0.25s; }
  .ag-tab svg { width: 13px; height: 13px; }
  .ag-tab.active { background: var(--inv-bg); color: var(--inv-fg); }
  .ag-tab.active svg { color: var(--heart); fill: var(--heart); }
  .daystrip { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
  .daypill { width: 42px; height: 60px; border-radius: 999px; background: var(--st-low);
    border: 1px solid var(--border-light);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    font-family: "Plus Jakarta Sans", system-ui, sans-serif; transition: all 0.3s var(--pop); }
  .daypill .dow { font-size: 8.5px; font-weight: 700; letter-spacing: 0.14em; color: var(--st-mute); }
  .daypill .num { font-size: 17px; font-weight: 800; color: var(--st-fg); }
  .daypill.active { background: var(--inv-bg); border-color: transparent; }
  .daypill.active .dow, .daypill.active .num { color: var(--inv-fg); }
  .ag-body { position: relative; height: 252px; overflow: hidden; }
  .ag-page { position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px; }
  .tl-row { display: grid; grid-template-columns: 52px 1fr; gap: 10px;
    opacity: 0; transform: translateY(20px) scale(0.97); }
  .tl-row.in { animation: riseIn 0.45s var(--rubber) forwards; }
  .tl-time-col { display: flex; flex-direction: column; align-items: center; padding-top: 10px; }
  .tl-time { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 11.5px; font-weight: 700;
    color: var(--st-dim); font-variant-numeric: tabular-nums; }
  .tl-time.live { color: var(--st-fg); }
  .tl-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--st-mute); margin-top: 6px; }
  .tl-dot.live { width: 12px; height: 12px; background: var(--st-fg); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 14%, transparent); }
  .tl-conn { width: 1.5px; flex: 1; background: color-mix(in srgb, var(--accent) 12%, transparent); margin-top: 4px; }
  .sess-card { background: var(--st-card); border: 1px solid var(--border); border-radius: 14px;
    position: relative; box-shadow: var(--shadow-card); }
  .sess-card.live { border-color: color-mix(in srgb, var(--accent) 32%, transparent); }
  .sc-top { display: flex; align-items: center; justify-content: space-between; padding: 9px 9px 5px 11px; }
  .sc-badges { display: flex; gap: 6px; }
  .sc-tag { font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; padding: 3px 8px; border-radius: 7px; align-self: center; }
  .sc-tag.live { background: color-mix(in srgb, var(--accent) 10%, transparent); color: var(--st-fg);
    border: 1px solid color-mix(in srgb, var(--accent) 26%, transparent);
    display: flex; align-items: center; gap: 5px; }
  .sc-tag.live::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  /* corazon favorito: chip con superficie propia */
  .sc-heart { width: 32px; height: 32px; border-radius: 10px; background: var(--st-high);
    border: 1px solid var(--border-light);
    display: grid; place-items: center; color: var(--st-dim); flex: none;
    transition: background 0.25s, color 0.25s; }
  .sc-heart svg { width: 16px; height: 16px; display: block; }
  .sc-heart.active { background: color-mix(in srgb, var(--heart) 16%, transparent); color: var(--heart);
    border-color: color-mix(in srgb, var(--heart) 40%, transparent);
    animation: hpop 0.55s var(--rubber); }
  .sc-heart.active svg { fill: currentColor; }
  @keyframes hpop { 0% { transform: scale(0.5); } 55% { transform: scale(1.5); } 100% { transform: none; } }
  .sess-card.faved { border-color: color-mix(in srgb, var(--heart) 45%, transparent); }
  .sc-info { padding: 0 11px 10px; }
  .sc-title { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 13px; font-weight: 700;
    line-height: 1.3; letter-spacing: -0.01em; color: var(--st-fg); }
  .sc-loc { font-size: 11px; color: var(--st-mute); margin-top: 3px; }

  /* ===== SPEAKERS ===== */
  .spk-stage { position: relative; }
  .spk-row { display: flex; gap: 16px; perspective: 1100px; }
  .feat-card { width: 200px; background: var(--st-card); border: 0.5px solid var(--border-strong);
    border-radius: 22px; padding: 12px; opacity: 0; will-change: transform;
    transition: border-color 0.3s; box-shadow: var(--shadow-lg); }
  .feat-card.selected { border-color: color-mix(in srgb, var(--accent) 30%, transparent); }
  .feat-photo { aspect-ratio: 4/5; border-radius: 14px; background: var(--st-med); position: relative;
    overflow: hidden; margin-bottom: 10px; }
  .feat-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .feat-keynote { position: absolute; top: 8px; left: 8px; padding: 3px 8px; border-radius: 6px;
    background: rgba(0,0,0,0.55); font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: #fff; }
  .feat-name { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 15px; font-weight: 700;
    letter-spacing: -0.012em; color: var(--st-fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .feat-role { font-size: 12px; color: var(--st-mute); margin-top: 2px; }
  .feat-sess { font-size: 10.5px; font-weight: 600; color: var(--st-mute); margin-top: 6px; }
  /* mini perfil que abre el tap — la ACCION se ve */
  .spk-detail { position: absolute; left: calc(100% + 18px); top: 8%; width: 262px;
    border-radius: 18px; background: var(--st-card); border: 1px solid var(--border-strong);
    box-shadow: var(--shadow-xl); padding: 15px 16px;
    opacity: 0; transform: translateX(-16px) scale(0.92); transform-origin: left center; }
  .spk-detail.in { animation: coin 0.5s var(--rubber) forwards; }
  .sd-name { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 16px; font-weight: 800;
    letter-spacing: -0.015em; color: var(--st-fg); }
  .sd-lab { font-size: 10px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--st-mute); margin: 12px 0 7px; }
  .sd-row { display: flex; gap: 9px; align-items: baseline; padding: 6px 0;
    border-top: 1px solid var(--border); font-size: 12.5px; color: var(--st-fg); }
  .sd-time { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 10.5px; font-weight: 700;
    color: var(--st-mute); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .sd-stars { display: flex; gap: 4px; margin-top: 4px; }
  .sd-stars svg { width: 17px; height: 17px; color: var(--st-high); transition: color 0.2s; }
  .sd-stars svg.on { color: var(--gold); animation: hpop 0.4s var(--rubber); }
  .sd-stars-lab { font-size: 11px; color: var(--st-mute); margin-top: 6px; }

  /* ===== EN VIVO: player 16:9 BLOQUEADO + columna interactiva (composicion v9) ===== */
  .st-wrap { display: flex; gap: 14px; align-items: center; justify-content: center; --pw: 520px; }
  .st-player { width: var(--pw); aspect-ratio: 16/9; border-radius: 18px; background: #000;
    position: relative; overflow: hidden; box-shadow: 0 16px 56px rgba(0,0,0,0.35);
    clip-path: inset(0 100% 0 0 round 18px); flex: none; }
  .st-player.wipe { animation: wipe 0.55s cubic-bezier(0.6,0,0.2,1) forwards; }
  @keyframes wipe { to { clip-path: inset(0 0% 0 0 round 18px); } }
  .st-vid { position: absolute; inset: 0; background:
    radial-gradient(70% 90% at 30% 60%, #17273a, transparent 70%),
    radial-gradient(60% 80% at 75% 30%, #2a1d38, transparent 70%), #0b0e14; }
  .st-badges { position: absolute; left: 12px; top: 12px; display: flex; gap: 8px; }
  .st-blive { border-radius: 999px; background: rgba(239,68,68,0.95); padding: 4px 10px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #fff;
    display: flex; align-items: center; gap: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.4); opacity: 0; }
  .st-blive.in { animation: riseIn 0.3s ease forwards; }
  .st-blive i { width: 6px; height: 6px; border-radius: 50%; background: #fff; }
  .st-bview { border-radius: 999px; background: rgba(0,0,0,0.6); padding: 4px 10px;
    font-size: 11px; font-weight: 600; color: #fff; opacity: 0; font-variant-numeric: tabular-nums; }
  .st-bview.in { animation: riseIn 0.3s ease 0.15s forwards; }
  .st-title { position: absolute; left: 14px; bottom: 12px; font-family: "Plus Jakarta Sans", system-ui, sans-serif;
    font-size: 15px; font-weight: 700; color: #fff; text-shadow: 0 2px 12px rgba(0,0,0,0.7); }
  /* el player es flex:none + aspect-ratio: la columna NUNCA puede estirarlo a 4:3 */
  .st-col { width: 272px; flex: none;
    display: flex; flex-direction: column; gap: 8px; justify-content: center; }
  .cp-row { display: flex; gap: 8px; align-items: flex-end; max-width: 94%;

    $('sc-op').classList.remove('on');

    /* rail entra */
    rail.classList.add('in');
    if (!skipped) {
      const its = [...rail.querySelectorAll('.ritem')];
      for (const it of its) { it.animate([{ transform: 'scale(0)' }, { transform: 'scale(1.25)' }, { transform: 'scale(1)' }], { duration: 260, easing: 'ease-out' }); await wait(35); }
    }
    await wait(250);

    /* --- AGENDA --- */
    title('TU DÍA', 'Agenda', 'var(--muted)');
    $('sc-ag').classList.add('on');
    $('agv').classList.add('in');
    await wait(280);
    const p0 = [...$('pg0').querySelectorAll('.tl-row')];
    for (const it of p0) { it.classList.add('in'); if (!skipped) it.querySelector('.sess-card').classList.add('squish'); await wait(100); }
    note($('agv'), 'right', I.agenda, 'Tu agenda', 'Toda la programación por días. Explorá las sesiones y armá tu propio recorrido.');
    await wait(2900);
    noteOff();
    $('dp0').classList.remove('active'); $('dp1').classList.add('active');
    if (!skipped) $('dp1').animate([{ transform: 'scale(1)' }, { transform: 'scale(1.15)' }, { transform: 'scale(1)' }], { duration: 300 });
    await switchPage('pg0', 'pg1');
    await wait(900);
    $('dp1').classList.remove('active'); $('dp0').classList.add('active');
    await switchPage('pg1', 'pg0');
    await wait(500);
    /* favorito: pausa, cursor, pop del corazon + borde de la card + callout que se queda */
    const hc = center($('ag-heart'));
    curTo(hc.x, hc.y); await wait(750); await curTap();
    $('ag-heart').classList.add('active');
    $('ag-card').classList.add('faved');
    if (!skipped) {
      burst(hc.x, hc.y, 16, 'rgb(255,93,108)', 4.5, 42); shake(3);
      $('ag-card').animate([{ transform: 'scale(1)' }, { transform: 'scale(1.025)' }, { transform: 'scale(1)' }], { duration: 380, easing: 'ease-out' });
    }
    note($('ag-heart'), 'right', I.heart, 'Marcá tus favoritas', 'El corazón guarda la sesión en “Mi agenda”: tu selección personal del evento.', 'var(--heart)');
    await wait(3000);
    curHide(); noteOff();
    $('tab-ag').classList.remove('active'); $('tab-mi').classList.add('active');
    if (!skipped) $('tab-mi').animate([{ transform: 'scale(1)' }, { transform: 'scale(1.1)' }, { transform: 'scale(1)' }], { duration: 280 });
    await switchPage('pg0', 'pg2');
    await wait(1100);
    titleOff();
    await compressTo($('agv'), 'agenda');
    $('sc-ag').classList.remove('on');

    /* --- SPEAKERS --- */
    title('PROTAGONISTAS', 'Speakers', 'var(--muted)');
    $('sc-sp').classList.add('on');
    const rz = [-10, 0, 10];
    for (let i = 0; i < 3; i++) {
      const el = $('spk' + i); el.style.opacity = '1';
      if (!skipped) {
        el.animate([
          { transform: `translateY(-320px) translateX(${(i-1)*46}px) rotateZ(${rz[i]*3}deg) rotateX(-28deg) scale(0.5)`, opacity: 0 },
          { transform: 'none', opacity: 1 }
        ], { duration: 620, easing: 'cubic-bezier(0.2,0.9,0.3,1.25)', fill: 'forwards' });
        setTimeout(() => { if (skipped) return;
          const r = el.getBoundingClientRect();
          burst(r.left + r.width / 2, r.bottom - 8, 7, P2(), 3, 30); shake(3);
          el.classList.add('squish');
        }, 560);
      }
      await wait(140);
    }
    await wait(700);
    /* tap sobre Maria -> se abre su mini perfil (la accion SE VE) */
    const kc = center($('spk0'));
    curTo(kc.x, kc.y + 20); await wait(650); await curTap();
    $('spk0').classList.add('selected');
    if (!skipped) $('spk0').animate([{ transform: 'scale(1)' }, { transform: 'scale(1.06)' }, { transform: 'scale(1)' }], { duration: 320, easing: 'ease-out' });
    await wait(200);
    $('spk-detail').classList.add('in');
    if (!skipped) shake(2);
    await wait(500);
    for (let i = 0; i < 5; i++) { $('sdst' + i).firstElementChild.classList.add('on'); await wait(110); }
    note($('spk-row'), 'left', I.mic, 'Conocé a los speakers', 'Su perfil, su bio y sus charlas. Al terminar cada sesión podés calificarlos.');
    await wait(3000);
    curHide(); noteOff(); titleOff();
    $('spk-detail').classList.remove('in');
    await wait(200);
    await compressTo($('spk-row'), 'mic');
    $('sc-sp').classList.remove('on');

    /* --- EN VIVO (composicion v9, player 16:9 bloqueado) --- */
    title('EN DIRECTO', 'En vivo', '#ff8a96');
    $('sc-st').classList.add('on');
    await expandFrom($('st-wrap'), 'live');
    $('st-player').classList.add('wipe');
    await wait(420);
    $('st-blive').classList.add('in'); $('st-bview').classList.add('in');
    if (!skipped) shake(3);
    note($('st-player'), 'left', I.live, 'La transmisión en vivo', 'Mirá las sesiones desde donde estés — con chat y juegos en tiempo real.', '#ff8a96');
    await wait(2700);
    noteOff();
    countUp($('st-vn'), 96, 132, 1600);
    const MSGS = [[IMG.a1,'Laura M.','Qué buena charla'],[IMG.a2,'Andrés P.','¿Habrá grabación?'],[IMG.a3,'Sofía R.','El dato de mercado, brutal']];
    for (const [av, w, t] of MSGS) {
      const el = document.createElement('div');
      el.className = 'cp-row'; el.innerHTML = `<img src="${av}" alt=""><div class="cp-bubble"><b>${w}</b>${t}</div>`;
      $('st-col').insertBefore(el, $('tvp'));
      el.classList.add('in');
      await wait(480);
    }
    await wait(700);
    /* el MC lanza la trivia — el chat cede la columna */
    if (!skipped) {
      [...document.querySelectorAll('.cp-row')].forEach((el, i) =>
        el.animate([{ opacity: 1 }, { opacity: 0, transform: 'translateY(-12px)' }],
          { duration: 260, delay: i * 60, easing: 'ease-in', fill: 'forwards' }));
      await wait(440);
    }
    [...document.querySelectorAll('.cp-row')].forEach((el) => { el.style.display = 'none'; });
    $('tvp').classList.add('in');
    if (!skipped) shake(4);
    note($('st-col'), 'right', I.gamepad, 'Juegos del MC', 'Trivias y premios lanzados en vivo — respondé desde acá y sumá puntos.');
    await wait(1200);
    $('tv-cd').classList.add('go');
    setTimeout(() => { if (!skipped) $('tv-cd').classList.add('warn'); }, 2600);
    await wait(1100);
    const bc = center($('opt1'));
    curTo(bc.x, bc.y); await wait(550); await curTap();
    $('opt1').classList.add('mine');
    noteOff();
    await wait(650);
    $('opt1').classList.add('correct');
    $('opt0').classList.add('dim'); $('opt2').classList.add('dim'); $('opt3').classList.add('dim');
    [...Array(4)].forEach((_, i) => { const d = $('dist' + i); d.style.width = d.dataset.w + '%'; $('cnt' + i).style.opacity = '1'; });
    $('tv-score').classList.add('on');
    if (!skipped) { burst(bc.x, bc.y, 16, 'rgb(16,185,129)', 4.5, 40); doFlash(0.08, 200); }
    await wait(1300);
    toast('La ruleta te tocó<small>Premio: café de especialidad en el lobby</small>', I.gift);
    if (!skipped) { shake(5); const tc = center($('toast')); burst(tc.x, tc.y, 18, P1(), 5, 44); }
    await wait(1900);
    toastOff(); curHide(); titleOff();
    await compressTo($('st-wrap'), 'live');
    $('sc-st').classList.remove('on');

    /* --- SOCIAL --- */
    title('LA GENTE', 'Social', 'var(--muted)');
    $('sc-sn').classList.add('on');
    $('snv').classList.add('in');
    await wait(250);
    for (let i = 0; i < 4; i++) { $('sty' + i).classList.add('in'); await wait(90); }
    await wait(300);
    $('post0').classList.add('in');
    note($('snv'), 'right', I.users, 'El muro del evento', 'Compartí fotos y momentos, mirá lo que publica la gente y conectá.');
    await wait(2700);
    const lc = center($('sn-like'));
    curTo(lc.x, lc.y); await wait(650); await curTap();
    $('sn-like').classList.add('liked');
    countUp($('sn-cnt'), 23, 24, 300);
    if (!skipped) { burst(lc.x, lc.y, 12, 'rgb(255,93,108)', 4, 36); shake(2); }
    await wait(1100);
    noteOff();
    toast('Laura M. quiere conectar<small>Solicitud de contacto recibida</small>', I.users);
    await wait(1700); toastOff();
    curHide(); titleOff();
    await compressTo($('snv'), 'users');
    $('sc-sn').classList.remove('on');

    /* --- DESAFIO --- */
    title('PARTICIPÁ Y GANÁ', 'Desafío', 'var(--teal)');
    $('sc-gm').classList.add('on');
    $('hud').classList.add('in');
    await wait(350);
    countUp($('hud-n'), 0, 1240, 1200);
    const segsEls = [...$('hud-segs').querySelectorAll('.hud-seg')];
    for (let i = 0; i < 7; i++) {
      segsEls[i].classList.add('fill');
      if (i === 6) segsEls[i].classList.add('last');
      await wait(90);
    }
    for (let i = 0; i < 3; i++) {
      const f = $('hud-f' + i);
      f.classList.remove('fly'); void f.offsetWidth; f.classList.add('fly');
      if (!skipped) shake(2);
      await wait(260);
    }
    note($('hud'), 'right', I.trophy, 'Todo suma', 'Los +135 de la trivia ya están acá. Retos, trivias y stamps te suben en el ranking.', 'var(--teal)');
    await wait(1400);
    $('hud-rank').animate([{ transform: 'scale(1)' }, { transform: 'scale(1.4)' }, { transform: 'scale(1)' }], { duration: 420, easing: 'ease-out' });
    $('hud-rank').textContent = '#6';
    if (!skipped) { const rc = center($('hud-rank')); burst(rc.x, rc.y, 12, 'rgb(94,234,212)', 4, 38); }
    await wait(1800);
    noteOff(); titleOff();
    await compressTo($('hud'), 'trophy');
    $('sc-gm').classList.remove('on');

    /* --- SPONSORS --- */
    title('LAS MARCAS', 'Sponsors', 'var(--muted)');
    $('sc-br').classList.add('on');
    for (let i = 0; i < 2; i++) {
      const el = $('bp' + i); el.style.opacity = '1';
      if (!skipped) el.animate([{ transform: 'rotateY(90deg) scale(0.5)', opacity: 0 }, { transform: 'none', opacity: 1 }], { duration: 520, easing: 'cubic-bezier(0.2,0.9,0.3,1.3)', fill: 'forwards' });
      await wait(130);
    }
    if (!skipped) shake(3);
    for (let i = 0; i < 3; i++) {
      const el = $('bg' + i); el.style.opacity = '1';
      if (!skipped) el.animate([{ transform: 'scale(0)', opacity: 0 }, { transform: 'scale(1.12)', opacity: 1 }, { transform: 'scale(1)' }], { duration: 320, easing: 'ease-out', fill: 'forwards' });
      await wait(80);
    }
    for (let i = 0; i < 5; i++) {
      const el = $('bs' + i); el.style.opacity = '1';
      if (!skipped) el.animate([{ transform: 'scale(0)', opacity: 0 }, { transform: 'scale(1.18)', opacity: 1 }, { transform: 'scale(1)' }], { duration: 240, easing: 'ease-out', fill: 'forwards' });
      await wait(50);
    }
    await wait(300);
    $('sp-pass').classList.add('in');
    if (!skipped) { const pc = center($('sp-pass')); burst(pc.x, pc.y, 10, 'rgb(20,184,166)', 3.5, 34); }
    note($('spw'), 'right', I.building, 'Los sponsors', 'Visitá sus stands y sellá tu pasaporte — hay trivias con premio en cada uno.');
    await wait(2900);
    noteOff(); titleOff();
    await compressTo($('spw'), 'building');
    $('sc-br').classList.remove('on');

    /* --- FINALE --- */
    for (const k of ['home', 'file', 'sparkles', 'user', 'bell']) {
      iconOf(k).classList.add('lit');
      await wait(skipped ? 20 : 110);
    }
    if (!skipped) {
      rail.animate([{ transform: 'translateY(-50%) translateX(0)' }, { transform: 'translateY(-50%) translateX(1.5px)' }, { transform: 'translateY(-50%) translateX(-1.5px)' }, { transform: 'translateY(-50%) translateX(0)' }], { duration: 90, iterations: 5 });
      await wait(450);
      rail.animate([{ transform: 'translateY(-50%) translateX(0)' }, { transform: 'translateY(-50%) translateX(3px) rotate(0.4deg)' }, { transform: 'translateY(-50%) translateX(-3px) rotate(-0.4deg)' }, { transform: 'translateY(-50%) translateX(0)' }], { duration: 70, iterations: 7 });
      await wait(490);
      await wait(400);
      doFlash(0.32, 400); shake(9);
      const rc2 = rail.getBoundingClientRect();
      burst(rc2.left + 26, rc2.top + rc2.height / 2, 45, P1(), 8, 50);
      burst(rc2.left + 26, rc2.top + rc2.height / 3, 25, P2(), 6, 44);
      burst(rc2.left + 26, rc2.top + rc2.height * 0.66, 25, P1(), 6, 44);
      rail.style.opacity = '0';
      kvback.classList.remove('on');
      await wait(500);
      for (let i = 0; i < 220; i++) {
        const edge = Math.floor(Math.random() * 4);
        const x = edge === 0 ? -20 : edge === 1 ? W + 20 : Math.random() * W;
        const y = edge === 2 ? -20 : edge === 3 ? H + 20 : Math.random() * H;
        parts.push({ x, y, vx: 0, vy: 0, tx: W / 2 + (Math.random() - 0.5) * 24, ty: H / 2 + (Math.random() - 0.5) * 24, life: 999, sz: 1 + Math.random() * 2.2, col: P1(), al: 0.9, mode: 'seek', k: 0.014 + Math.random() * 0.016 });
      }
      const glow = $('glow');
      glow.style.opacity = '1';
      glow.animate([{ scale: 1 }, { scale: 9 }], { duration: 1300, easing: 'ease-in', fill: 'forwards' });
      await wait(1300);
      doFlash(0.38, 420); shake(10);
      glow.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 260, fill: 'forwards' });
      const ring = $('ring'); ring.classList.remove('boom'); void ring.offsetWidth; ring.classList.add('boom');
      parts.forEach((p) => { const a = Math.random() * Math.PI * 2, v = 9 + Math.random() * 12; p.mode = 'free'; p.vx = Math.cos(a) * v; p.vy = Math.sin(a) * v; p.life = 70 + Math.random() * 40; });
      await wait(350);
    } else { rail.style.opacity = '0'; kvback.classList.remove('on'); }

    $('sc-fin').classList.add('on');
    const bs = [...$('fin-bien').querySelectorAll('span')];
    for (const s of bs) { s.classList.add('slam'); await wait(skipped ? 0 : 42); }
    if (!skipped) { shake(6); doFlash(0.1, 200); burst(W / 2, H / 2 - 60, 20, P1(), 5, 40); }
    await wait(200);
    $('fin-nombre').classList.add('in');
    if (!skipped) { burst(W / 2, H / 2, 30, P1(), 6, 48); shake(5); }
    await wait(900);
    rail.style.opacity = '';
    rail.classList.remove('in'); void rail.offsetWidth; rail.classList.add('in');
    if (!skipped) {
      await wait(350);
      const its = [...rail.querySelectorAll('.ritem')];
      for (const it of its) {
        it.style.transform = 'scale(1.35)';
        setTimeout(() => { it.style.transform = ''; }, 240);
        await wait(55);
      }
    }
    $('explorar').classList.add('in');
  }

  $('explorar').addEventListener('click', () => {
    $('sc-fin').animate([{ opacity: 1 }, { opacity: 0 }], { duration: 500, fill: 'forwards' });
    burst(W / 2, H / 2, 24, P1(), 5, 40);
  });

  play();
</script>
