<title>Showcase v9 — El Trailer (modulos reales)</title>
<style>
  :root {
    --bg: #08080b;
    --glass: rgba(20, 20, 27, 0.6);
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.18);
    --text: rgba(255, 255, 255, 0.85);
    --muted: rgba(255, 255, 255, 0.35);
    --label: rgba(255, 255, 255, 0.25);
    --accent: #ffffff;
    --heart: #ff5d6c;
    --teal: #39d2c0;
    --cyan: #5eead4;
    /* streaming */
    --st-card: #181818; --st-low: #1a1a1a; --st-med: #1f1f1f; --st-high: #262626;
    --st-fg: #f5f5f4; --st-dim: #a8a8a3; --st-mute: #6b6b66;
    --tv-ok: #10b981; --tv-bad: #ef4444;
    --pop: cubic-bezier(0.34, 1.56, 0.64, 1);
    --rubber: cubic-bezier(0.3, 1.9, 0.4, 1);
  }
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); overflow: hidden; user-select: none;
    font-family: Urbanist, "Plus Jakarta Sans", "Segoe UI", system-ui, sans-serif; }
  .disp { font-family: "Plus Jakarta Sans", Urbanist, "Segoe UI", system-ui, sans-serif; }

  #stage { position: fixed; inset: 0; overflow: hidden; background: var(--bg); }
  /* keyvisual como telon de fondo tras el opening */
  #kvback { position: absolute; inset: -4%; background-size: cover; background-position: center;
    opacity: 0; filter: blur(28px) brightness(0.22) saturate(0.9); z-index: 1;
    transition: opacity 1.2s ease; }
  #kvback.on { opacity: 1; }
  #fx { position: absolute; inset: 0; z-index: 30; pointer-events: none; }
  #flash { position: absolute; inset: 0; background: #fff; opacity: 0; z-index: 60; pointer-events: none; }
  #ring { position: absolute; left: 50%; top: 50%; translate: -50% -50%; width: 60px; height: 60px;
    border-radius: 50%; border: 2px solid rgba(235,235,240,0.55); opacity: 0; z-index: 29; pointer-events: none; }
  #ring.boom { animation: ringout 0.9s cubic-bezier(0.1,0.7,0.3,1) forwards; }
  @keyframes ringout { 0% { opacity: 0.9; width: 60px; height: 60px; border-width: 3px; }
    100% { opacity: 0; width: min(120vh,900px); height: min(120vh,900px); border-width: 1px; } }
  #glow { position: absolute; left: 50%; top: 50%; translate: -50% -50%; width: 10px; height: 10px;
    border-radius: 50%; z-index: 8; opacity: 0; pointer-events: none;
    background: radial-gradient(circle, rgba(240,240,245,0.95), rgba(190,195,205,0.4) 55%, transparent 75%); }

  #prog { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 90; }
  #prog .seg { width: 36px; height: 3px; border-radius: 3px; background: rgba(255,255,255,0.1); overflow: hidden; }
  #prog .seg i { display: block; height: 100%; width: 0%; background: rgba(255,255,255,0.75); transition: width 0.4s ease; }
  #prog .seg.full i { width: 100%; }
  #skip { position: absolute; top: 14px; right: 18px; z-index: 95;
    font: 600 12.5px Urbanist, system-ui, sans-serif; color: var(--muted);
    background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px;
    padding: 7px 14px; cursor: pointer; transition: color 0.2s; }
  #skip:hover { color: var(--st-fg); }

  /* ===== rail ===== */
  #rail { position: absolute; left: 18px; top: 50%; z-index: 80;
    width: 52px; display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 0; border-radius: 28px; border: 1px solid var(--border-strong);
    background: var(--glass); backdrop-filter: blur(22px) saturate(1.2);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    transform: translateY(-50%) translateX(-110px); opacity: 0; }
  #rail.in { animation: railin 0.6s var(--pop) forwards; }
  @keyframes railin { to { transform: translateY(-50%) translateX(0); opacity: 1; } }
  .ritem { position: relative; display: grid; place-items: center; width: 52px; height: 40px; flex: none;
    color: var(--muted); opacity: 0.2; transition: opacity 0.35s, color 0.35s, transform 0.25s var(--pop); }
  .ritem svg { width: 19px; height: 19px; display: block; }
  .ritem.lit { opacity: 1; color: var(--st-fg); filter: drop-shadow(0 0 8px rgba(255,255,255,0.35)); }
  .ritem .ring2 { position: absolute; inset: 3px 9px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.7);
    opacity: 0; transform: scale(0.6); }
  .ritem.lit .ring2 { animation: r2 0.7s ease forwards; }
  @keyframes r2 { 0% { opacity: 0.9; transform: scale(0.6); } 100% { opacity: 0; transform: scale(1.6); } }
  .rsep { height: 1px; width: 24px; background: var(--border); margin: 6px 0; flex: none; }
  .rchip { position: absolute; left: calc(100% + 14px); top: 50%; translate: 0 -50%;
    display: flex; height: 30px; align-items: center; white-space: nowrap;
    border-radius: 11px; border: 1px solid var(--border-strong); background: #15151b;
    padding: 0 12px; font-size: 12.5px; font-weight: 600; color: var(--st-fg);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4); opacity: 0; transform-origin: left center;
    pointer-events: none; z-index: 85; }
  .rchip.pop { animation: chippop 1.5s var(--rubber) forwards; }
  @keyframes chippop { 0% { opacity: 0; transform: scaleX(0.15) scaleY(1.4) rotate(-4deg); }
    13% { opacity: 1; transform: none; } 82% { opacity: 1; } 100% { opacity: 0; } }

  /* ===== chrome ===== */
  .sc { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    padding-left: 80px; opacity: 0; pointer-events: none; z-index: 20; }
  .sc.on { opacity: 1; }
  #ftitle { position: absolute; top: 46px; right: 44px; z-index: 62; text-align: right;
    opacity: 0; transform: translateX(50px); pointer-events: none; }
  #ftitle.on { animation: ftin 0.45s var(--pop) forwards; }
  @keyframes ftin { to { opacity: 1; transform: translateX(0); } }
  #ftitle .cat { font-size: 10px; font-weight: 800; letter-spacing: 0.35em; color: var(--fcol, var(--st-dim)); margin-bottom: 5px; }
  #ftitle .name { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; color: var(--st-fg); }
  #hint { position: absolute; bottom: 46px; left: 50%; transform: translateX(-50%) translateY(8px);
    z-index: 62; font-size: 14px; font-weight: 700; color: var(--hcol, var(--st-dim));
    opacity: 0; white-space: nowrap; pointer-events: none; }
  #hint.on { animation: hintin 0.4s var(--pop) forwards; }
  @keyframes hintin { to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  #cur { position: absolute; z-index: 70; width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.35); background: rgba(255,255,255,0.07);
    opacity: 0; pointer-events: none;
    transition: left 0.5s var(--pop), top 0.5s var(--pop), opacity 0.25s, transform 0.15s; }
  #cur.tap { transform: scale(0.7); }
  #toast { position: absolute; top: 58px; left: 50%; z-index: 88;
    display: flex; align-items: center; gap: 10px; background: #15151b;
    border: 1px solid var(--border-strong); border-radius: 13px; padding: 11px 18px;
    font-size: 13px; font-weight: 700; color: var(--st-fg);
    box-shadow: 0 12px 40px rgba(0,0,0,0.55);
    opacity: 0; transform: translateX(-50%) translateY(-24px) scale(0.9); pointer-events: none; }
  #toast.on { animation: toastin 0.5s var(--rubber) forwards; }
  @keyframes toastin { to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }
  #toast .tico { color: var(--st-dim); } #toast .tico svg { width: 17px; height: 17px; display: block; }
  #toast small { display: block; font-size: 11px; font-weight: 600; color: var(--muted); }
  .squish { animation: squish 0.35s ease; }
  @keyframes squish { 0% { transform: scaleY(0.92) scaleX(1.06); } 45% { transform: scaleY(1.03) scaleX(0.98); } 100% { transform: none; } }
  @keyframes riseIn { to { opacity: 1; transform: none; } }

  /* ===== OPENING: keyvisual (EventPoster real) ===== */
  #kv { width: min(880px, 78vw); aspect-ratio: 16/9; border-radius: 20px; position: relative;
    overflow: hidden; background: #050403; box-shadow: 0 30px 90px rgba(0,0,0,0.7);
    opacity: 0; transform: scale(1.14); }
  #kv.reveal { animation: kvin 0.7s cubic-bezier(0.2, 0.8, 0.25, 1) forwards; }
  @keyframes kvin { 0% { opacity: 0; transform: scale(1.14); filter: brightness(2.2); }
    45% { opacity: 1; filter: brightness(1.35); } 100% { opacity: 1; transform: scale(1); filter: brightness(1); } }
  #kv img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #kv .ovl { position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.18) 0%, transparent 35%, transparent 55%, rgba(0,0,0,0.65) 100%); }
  #kv .mark { position: absolute; top: 22px; left: 26px; display: flex; align-items: center; gap: 8px;
    font-size: 10px; font-weight: 800; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.9);
    opacity: 0; transform: translateY(-8px); }
  #kv .mark.in { animation: riseIn 0.5s ease forwards; }
  #kv .mark i { width: 6px; height: 6px; border-radius: 50%; background: #ff5d5d; box-shadow: 0 0 8px #ff5d5d; }
  #kv .meta { position: absolute; left: 26px; bottom: 20px; display: flex; align-items: center; gap: 10px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.24em; text-transform: uppercase; color: rgba(255,255,255,0.65);
    opacity: 0; transform: translateY(8px); }
  #kv .meta.in { animation: riseIn 0.5s ease 0.1s forwards; }
  #kv .meta i { height: 1px; width: 14px; background: rgba(255,255,255,0.3); }
  .kv-note { position: absolute; left: 50%; transform: translateX(-50%); bottom: -34px;
    font-size: 11px; color: var(--label); white-space: nowrap; }

  /* saludo breve sobre el keyvisual */
  #op-hola { position: absolute; inset: 0; display: grid; place-items: center; z-index: 3; }
  #op-hola span { font-family: "Plus Jakarta Sans", system-ui, sans-serif;
    font-size: clamp(20px, 3vw, 30px); font-weight: 800; color: #fff;
    text-shadow: 0 4px 28px rgba(0,0,0,0.6); opacity: 0; transform: translateY(14px) scale(0.9); }
  #op-hola span.in { animation: holain 0.5s var(--rubber) forwards; }
  @keyframes holain { to { opacity: 1; transform: none; } }

  /* ===== AGENDA (espejo agenda.css) ===== */
  .agv { width: 490px; opacity: 0; transform: scale(0.85) translateY(24px); }
  .agv.in { animation: cardin 0.5s var(--rubber) forwards; }
  @keyframes cardin { to { opacity: 1; transform: none; } }
  .ag-title { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 24px; font-weight: 800;
    letter-spacing: -0.5px; color: #f5f5f4; }
  .ag-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 14px; }
  .ag-tabs { display: inline-flex; padding: 3px; background: var(--st-low); border-radius: 11px; gap: 2px; }
  .ag-tab { padding: 6px 12px; border-radius: 8px; font-size: 11.5px; font-weight: 600; color: var(--st-dim);
    display: flex; align-items: center; gap: 5px; transition: all 0.25s; }
  .ag-tab svg { width: 13px; height: 13px; }
  .ag-tab.active { background: #f5f5f4; color: #141414; }
  .ag-tab.active svg { color: var(--heart); fill: var(--heart); }
  .daystrip { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
  .daypill { width: 42px; height: 60px; border-radius: 999px; background: var(--st-low);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    font-family: "Plus Jakarta Sans", system-ui, sans-serif; transition: all 0.3s var(--pop); }
  .daypill .dow { font-size: 8.5px; font-weight: 700; letter-spacing: 0.14em; color: var(--st-mute); }
  .daypill .num { font-size: 17px; font-weight: 800; color: #f5f5f4; }
  .daypill.active { background: #fff; }
  .daypill.active .dow, .daypill.active .num { color: #0a0a0a; }
  .ag-body { position: relative; height: 252px; overflow: hidden; }
  .ag-page { position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px; }
  .tl-row { display: grid; grid-template-columns: 52px 1fr; gap: 10px;
    opacity: 0; transform: translateY(20px) scale(0.97); }
  .tl-row.in { animation: riseIn 0.45s var(--rubber) forwards; }
  .tl-time-col { display: flex; flex-direction: column; align-items: center; padding-top: 10px; }
  .tl-time { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 11.5px; font-weight: 700;
    color: var(--st-dim); font-variant-numeric: tabular-nums; }
  .tl-time.live { color: #fff; }
  .tl-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--st-mute); margin-top: 6px; }
  .tl-dot.live { width: 12px; height: 12px; background: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,0.14); }
  .tl-conn { width: 1.5px; flex: 1; background: rgba(255,255,255,0.12); margin-top: 4px; }
  .sess-card { background: var(--st-low); border: 1px solid var(--border); border-radius: 14px; position: relative; }
  .sess-card.live { border-color: rgba(255,255,255,0.32); }
  .sc-top { display: flex; align-items: center; justify-content: space-between; padding: 10px 11px 6px; }
  .sc-badges { display: flex; gap: 6px; }
  .sc-tag { font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; padding: 3px 8px; border-radius: 7px; }
  .sc-tag.live { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.26);
    display: flex; align-items: center; gap: 5px; }
  .sc-tag.live::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: #fff; }
  .sc-heart { color: var(--st-mute); width: 17px; height: 17px; position: relative; }
  .sc-heart svg { width: 17px; height: 17px; display: block; }
  .sc-heart.active { color: var(--heart); animation: hpop 0.45s var(--rubber); }
  .sc-heart.active svg { fill: currentColor; }
  @keyframes hpop { 0% { transform: scale(0.5); } 55% { transform: scale(1.45); } 100% { transform: none; } }
  .sc-info { padding: 0 11px 10px; }
  .sc-title { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 13px; font-weight: 700;
    line-height: 1.3; letter-spacing: -0.01em; color: #f5f5f4; }
  .sc-loc { font-size: 11px; color: var(--st-mute); margin-top: 3px; }

  /* ===== SPEAKERS (feat-card real) ===== */
  .spk-row { display: flex; gap: 16px; perspective: 1100px; }
  .feat-card { width: 200px; background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 22px; padding: 12px; opacity: 0; will-change: transform; transition: border-color 0.3s; }
  .feat-card.selected { border-color: rgba(255,255,255,0.24); }
  .feat-photo { aspect-ratio: 4/5; border-radius: 14px; background: var(--st-med); position: relative;
    display: grid; place-items: center; margin-bottom: 10px;
    font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 42px; font-weight: 800; color: rgba(255,255,255,0.85); }
  .feat-keynote { position: absolute; top: 8px; left: 8px; padding: 3px 8px; border-radius: 6px;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
    font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; }
  .feat-name { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 15px; font-weight: 700;
    letter-spacing: -0.012em; color: #f5f5f4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .feat-role { font-size: 12px; color: var(--st-mute); margin-top: 2px; }
  .feat-sess { font-size: 10.5px; font-weight: 600; color: var(--st-mute); margin-top: 6px; }

  /* ===== EN VIVO (StreamPlayer + ChatPanel + TriviaPanel reales) ===== */
  .st-wrap { display: flex; gap: 14px; align-items: stretch; }
  .st-player { width: 500px; aspect-ratio: 16/9; border-radius: 18px; background: #000;
    position: relative; overflow: hidden; box-shadow: 0 16px 56px rgba(0,0,0,0.5);
    clip-path: inset(0 100% 0 0 round 18px); }
  .st-player.wipe { animation: wipe 0.55s cubic-bezier(0.6,0,0.2,1) forwards; }
  @keyframes wipe { to { clip-path: inset(0 0% 0 0 round 18px); } }
  .st-vid { position: absolute; inset: 0; background:
    radial-gradient(70% 90% at 30% 60%, #17273a, transparent 70%),
    radial-gradient(60% 80% at 75% 30%, #2a1d38, transparent 70%), #0b0e14; }
  .st-badges { position: absolute; left: 12px; top: 12px; display: flex; gap: 8px; }
  .st-blive { border-radius: 999px; background: rgba(239,68,68,0.95); padding: 4px 10px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #fff;
    display: flex; align-items: center; gap: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    opacity: 0; }
  .st-blive.in { animation: riseIn 0.3s ease forwards; }
  .st-blive i { width: 6px; height: 6px; border-radius: 50%; background: #fff; animation: pulse 1.4s ease infinite; }
  @keyframes pulse { 50% { opacity: 0.35; } }
  .st-bview { border-radius: 999px; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
    padding: 4px 10px; font-size: 11px; font-weight: 600; color: #fff; opacity: 0; }
  .st-bview.in { animation: riseIn 0.3s ease 0.15s forwards; }
  .st-title { position: absolute; left: 14px; bottom: 12px; font-family: "Plus Jakarta Sans", system-ui, sans-serif;
    font-size: 15px; font-weight: 700; color: #fff; text-shadow: 0 2px 12px rgba(0,0,0,0.7); }
  .st-col { width: 268px; display: flex; flex-direction: column; gap: 8px; justify-content: flex-end; }
  .cp-row { max-width: 88%; opacity: 0; transform: translateY(14px) scale(0.95); }
  .cp-row.in { animation: riseIn 0.35s var(--rubber) forwards; }
  .cp-author { font-size: 10.5px; font-weight: 600; color: var(--st-mute); margin: 0 0 2px 4px; }
  .cp-bubble { padding: 8px 12px; border-radius: 14px; border-top-left-radius: 4px;
    background: var(--st-med); border: 1px solid var(--border); font-size: 13px; line-height: 1.4; color: var(--st-fg); }
  .tvp { border-radius: 16px; background: var(--st-card); border: 1px solid var(--border);
    padding: 13px; opacity: 0; transform: translateY(30px) scale(0.8); }
  .tvp.in { animation: cardin 0.5s var(--rubber) forwards; }
  .tv-cdtrack { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
  .tv-cdfill { height: 100%; transform-origin: left; transform: scaleX(1);
    background: linear-gradient(90deg, var(--st-mute), var(--st-fg)); }
  .tv-cdfill.go { transition: transform 4.5s linear; transform: scaleX(0); }
  .tv-cdfill.warn { background: linear-gradient(90deg, #f59e0b, var(--tv-bad)); }
  .tv-q { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 15px; font-weight: 700;
    color: var(--st-fg); line-height: 1.35; margin-bottom: 10px; }
  .tv-opt { display: flex; align-items: center; gap: 11px; padding: 10px 11px; border-radius: 14px;
    background: var(--st-low); margin-bottom: 6px; position: relative; overflow: hidden; transition: all 0.3s; }
  .tv-dist { position: absolute; inset: 0 auto 0 0; width: 0%; background: rgba(245,245,244,0.05); transition: width 0.6s ease; }
  .tv-letter { width: 29px; height: 29px; border-radius: 9px; display: grid; place-items: center;
    font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 13px; font-weight: 800; color: #fff;
    position: relative; flex: none; }
  .tv-text { flex: 1; font-size: 13.5px; font-weight: 600; color: var(--st-fg); position: relative; }
  .tv-count { font-size: 12px; font-weight: 800; color: var(--st-dim); opacity: 0; position: relative; font-variant-numeric: tabular-nums; }
  .tv-opt.mine { background: var(--st-high); box-shadow: inset 0 0 0 1px var(--border-strong); }
  .tv-opt.correct { background: color-mix(in srgb, var(--tv-ok) 8%, transparent);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--tv-ok) 24%, transparent); }
  .tv-opt.correct .tv-count { color: var(--tv-ok); opacity: 1; }
  .tv-opt.correct .tv-dist { background: color-mix(in srgb, var(--tv-ok) 12%, transparent); }
  .tv-opt.dim { opacity: 0.42; }
  .tv-score { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 6px;
    padding: 8px; border-radius: 11px; background: color-mix(in srgb, var(--tv-ok) 9%, transparent);
    font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 19px; font-weight: 800; color: var(--tv-ok);
    opacity: 0; }
  .tv-score.on { animation: hpop 0.5s var(--rubber) forwards; opacity: 1; }
  .tv-score small { font-size: 11px; font-weight: 700; color: var(--st-dim); }

  /* ===== SOCIAL (feed editorial real + momentos) ===== */
  .snv { width: 430px; opacity: 0; transform: scale(0.85) translateY(24px); }
  .snv.in { animation: cardin 0.5s var(--rubber) forwards; }
  .sn-title { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-size: 24px; font-weight: 800;
    letter-spacing: -0.5px; color: var(--text); margin-bottom: 10px; }
  .sn-stories { display: flex; gap: 14px; padding: 10px 2px 12px; border-bottom: 1px solid var(--border); }
  .sn-story { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 62px;
    opacity: 0; transform: scale(0.5); }
  .sn-story.in { animation: storyin 0.4s var(--rubber) forwards; }
  @keyframes storyin { to { opacity: 1; transform: scale(1); } }

    title('LA GENTE', 'Social', 'var(--st-dim)');
    $('sc-sn').classList.add('on');
    $('snv').classList.add('in');
    await wait(250);
    for (let i = 0; i < 4; i++) { $('sty' + i).classList.add('in'); await wait(90); }
    await wait(300);
    $('post0').classList.add('in');
    await wait(500);
    hint('Compartí momentos y conectá con los demás', 'var(--st-fg)');
    const lc = center($('sn-like'));
    curTo(lc.x, lc.y); await wait(550); await curTap();
    $('sn-like').classList.add('liked');
    countUp($('sn-cnt'), 23, 24, 300);
    if (!skipped) { burst(lc.x, lc.y, 12, 'rgb(255,93,108)', 4, 36); shake(2); }
    await wait(900);
    toast('Laura M. quiere conectar<small>Solicitud de contacto recibida</small>', I.users);
    await wait(1300); toastOff();
    curHide(); hintOff(); titleOff();
    await compressTo($('snv'), 'users');
    $('sc-sn').classList.remove('on');
    fillSeg(5);

    /* --- DESAFIO (HUD real) --- */
    title('PARTICIPÁ Y GANÁ', 'Desafío', 'var(--teal)');
    $('sc-gm').classList.add('on');
    $('hud').classList.add('in');
    await wait(350);
    countUp($('hud-n'), 0, 1240, 1200);
    const segsEls = [...$('hud-segs').querySelectorAll('.hud-seg')];
    for (let i = 0; i < 7; i++) {
      segsEls[i].classList.add('fill');
      if (i === 6) segsEls[i].classList.add('last');
      await wait(90);
    }
    for (let i = 0; i < 3; i++) {
      const f = $('hud-f' + i);
      f.classList.remove('fly'); void f.offsetWidth; f.classList.add('fly');
      if (!skipped) shake(2);
      await wait(260);
    }
    hint('Los +135 de la trivia ya están acá adentro', 'var(--teal)');
    await wait(600);
    $('hud-rank').animate([{ transform: 'scale(1)' }, { transform: 'scale(1.4)' }, { transform: 'scale(1)' }], { duration: 420, easing: 'ease-out' });
    $('hud-rank').textContent = '#6';
    if (!skipped) { const rc = center($('hud-rank')); burst(rc.x, rc.y, 12, 'rgb(94,234,212)', 4, 38); }
    await wait(1300);
    hintOff(); titleOff();
    await compressTo($('hud'), 'trophy');
    $('sc-gm').classList.remove('on');
    fillSeg(6);

    /* --- SPONSORS (wall real) --- */
    title('LAS MARCAS', 'Sponsors', 'var(--st-dim)');
    $('sc-br').classList.add('on');
    for (let i = 0; i < 2; i++) {
      const el = $('bp' + i); el.style.opacity = '1';
      if (!skipped) el.animate([{ transform: 'rotateY(90deg) scale(0.5)', opacity: 0 }, { transform: 'none', opacity: 1 }], { duration: 520, easing: 'cubic-bezier(0.2,0.9,0.3,1.3)', fill: 'forwards' });
      await wait(130);
    }
    if (!skipped) shake(3);
    for (let i = 0; i < 3; i++) {
      const el = $('bg' + i); el.style.opacity = '1';
      if (!skipped) el.animate([{ transform: 'scale(0)', opacity: 0 }, { transform: 'scale(1.12)', opacity: 1 }, { transform: 'scale(1)' }], { duration: 320, easing: 'ease-out', fill: 'forwards' });
      await wait(80);
    }
    for (let i = 0; i < 5; i++) {
      const el = $('bs' + i); el.style.opacity = '1';
      if (!skipped) el.animate([{ transform: 'scale(0)', opacity: 0 }, { transform: 'scale(1.18)', opacity: 1 }, { transform: 'scale(1)' }], { duration: 240, easing: 'ease-out', fill: 'forwards' });
      await wait(50);
    }
    await wait(300);
    $('sp-pass').classList.add('in');
    if (!skipped) { const pc = center($('sp-pass')); burst(pc.x, pc.y, 10, 'rgb(94,234,212)', 3.5, 34); }
    hint('Visitá stands, sumá stamps — hay trivias con premio', 'var(--st-fg)');
    await wait(1300);
    hintOff(); titleOff();
    await compressTo($('spw'), 'building');
    $('sc-br').classList.remove('on');
    fillSeg(7);

    /* --- FINALE: TNT -> silencio -> BIG BANG -> BIENVENIDO --- */
    for (const k of ['home', 'file', 'sparkles', 'user', 'bell']) {
      iconOf(k).classList.add('lit');
      await wait(skipped ? 20 : 110);
    }
    if (!skipped) {
      rail.animate([{ transform: 'translateY(-50%) translateX(0)' }, { transform: 'translateY(-50%) translateX(1.5px)' }, { transform: 'translateY(-50%) translateX(-1.5px)' }, { transform: 'translateY(-50%) translateX(0)' }], { duration: 90, iterations: 5 });
      await wait(450);
      rail.animate([{ transform: 'translateY(-50%) translateX(0)' }, { transform: 'translateY(-50%) translateX(3px) rotate(0.4deg)' }, { transform: 'translateY(-50%) translateX(-3px) rotate(-0.4deg)' }, { transform: 'translateY(-50%) translateX(0)' }], { duration: 70, iterations: 7 });
      await wait(490);
      /* silencio total antes del boom */
      await wait(400);
      doFlash(0.32, 400); shake(9);
      const rc2 = rail.getBoundingClientRect();
      burst(rc2.left + 26, rc2.top + rc2.height / 2, 45, SILVER, 8, 50);
      burst(rc2.left + 26, rc2.top + rc2.height / 3, 25, SILVER2, 6, 44);
      burst(rc2.left + 26, rc2.top + rc2.height * 0.66, 25, 'rgb(255,255,255)', 6, 44);
      rail.style.opacity = '0';
      $('kvback').classList.remove('on');
      await wait(500);
      for (let i = 0; i < 240; i++) {
        const edge = Math.floor(Math.random() * 4);
        const x = edge === 0 ? -20 : edge === 1 ? W + 20 : Math.random() * W;
        const y = edge === 2 ? -20 : edge === 3 ? H + 20 : Math.random() * H;
        parts.push({ x, y, vx: 0, vy: 0, tx: W / 2 + (Math.random() - 0.5) * 24, ty: H / 2 + (Math.random() - 0.5) * 24, life: 999, sz: 1 + Math.random() * 2.2, col: SILVER, al: 0.9, mode: 'seek', k: 0.014 + Math.random() * 0.016 });
      }
      const glow = $('glow');
      glow.style.opacity = '1';
      glow.animate([{ scale: 1 }, { scale: 9 }], { duration: 1300, easing: 'ease-in', fill: 'forwards' });
      await wait(1300);
      doFlash(0.38, 420); shake(10);
      glow.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 260, fill: 'forwards' });
      const ring = $('ring'); ring.classList.remove('boom'); void ring.offsetWidth; ring.classList.add('boom');
      parts.forEach((p) => { const a = Math.random() * Math.PI * 2, v = 9 + Math.random() * 12; p.mode = 'free'; p.vx = Math.cos(a) * v; p.vy = Math.sin(a) * v; p.life = 70 + Math.random() * 40; });
      await wait(350);
    } else { rail.style.opacity = '0'; $('kvback').classList.remove('on'); }

    $('sc-fin').classList.add('on');
    const bs = [...$('fin-bien').querySelectorAll('span')];
    for (const s of bs) { s.classList.add('slam'); await wait(skipped ? 0 : 42); }
    if (!skipped) { shake(6); doFlash(0.1, 200); burst(W / 2, H / 2 - 60, 20, SILVER, 5, 40); }
    await wait(200);
    $('fin-nombre').classList.add('in');
    if (!skipped) { burst(W / 2, H / 2, 30, SILVER, 6, 48); shake(5); }
    await wait(800);
    $('fin-sub').classList.add('in');
    await wait(500);
    rail.style.opacity = '';
    rail.classList.remove('in'); void rail.offsetWidth; rail.classList.add('in');
    if (!skipped) {
      await wait(350);
      const its = [...rail.querySelectorAll('.ritem')];
      for (const it of its) {
        it.style.transform = 'scale(1.35)';
        setTimeout(() => { it.style.transform = ''; }, 240);
        await wait(55);
      }
    }
    $('explorar').classList.add('in');
    fillSeg(8);
  }

  $('explorar').addEventListener('click', () => {
    $('sc-fin').animate([{ opacity: 1 }, { opacity: 0 }], { duration: 500, fill: 'forwards' });
    burst(W / 2, H / 2, 24, SILVER, 5, 40);
  });

  play();
</script>
