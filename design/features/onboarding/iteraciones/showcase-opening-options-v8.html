<title>Opening del Showcase — 4 opciones</title>
<style>
  :root {
    --bg: #08080b;
    --accent: #b5a68b;
    --text: #f4f4f6;
    --muted: rgba(244, 244, 246, 0.5);
    --spring-pop: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: Urbanist, "Plus Jakarta Sans", "Segoe UI", system-ui, sans-serif;
    overflow: hidden; user-select: none;
  }

  #stage { position: fixed; inset: 0; overflow: hidden; }
  #fx { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
  #flash { position: absolute; inset: 0; background: #fff; opacity: 0; z-index: 40; pointer-events: none; }
  #scene { position: absolute; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; }

  /* ===== switcher ===== */
  #menu {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 60;
  }
  .mchip {
    font: 700 12px Urbanist, system-ui, sans-serif;
    color: var(--muted);
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px; padding: 8px 14px; cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .mchip:hover { color: var(--text); }
  .mchip.on { color: #101014; background: var(--accent); border-color: var(--accent); }
  #note {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(244, 244, 246, 0.35); z-index: 60; white-space: nowrap;
  }

  /* ===== O1 · IMPACTO ===== */
  .o1-name { display: flex; gap: 0.04em; }
  .o1-name span {
    font-family: "Plus Jakarta Sans", Urbanist, system-ui, sans-serif;
    font-size: clamp(70px, 12vw, 130px);
    font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
    display: inline-block; opacity: 0;
    transform: translateY(-130px) rotateX(-90deg);
  }
  .o1-name span.land { animation: o1land 0.5s cubic-bezier(0.3, 0, 0.2, 1.4) forwards; }
  @keyframes o1land {
    0% { opacity: 0; transform: translateY(-130px) rotateX(-90deg); }
    60% { opacity: 1; transform: translateY(6px) rotateX(0); }
    100% { opacity: 1; transform: translateY(0) rotateX(0); }
  }
  .o1-line {
    height: 1px; width: 0; margin: 22px auto 0;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.35), transparent);
    transition: width 0.55s ease;
  }
  .o1-sub {
    margin-top: 16px; text-align: center;
    font-size: clamp(15px, 2vw, 20px); font-weight: 600; color: var(--muted);
    opacity: 0; transform: translateX(70px);
  }
  .o1-sub b { color: var(--accent); font-weight: 800; }
  .o1-sub.in { animation: o1slide 0.5s var(--spring-pop) forwards; }
  @keyframes o1slide { to { opacity: 1; transform: translateX(0); } }

  /* ===== O2 · GOLDEN TICKET ===== */
  .o2-wrap { perspective: 1200px; text-align: center; }
  .o2-over {
    font-size: 12px; font-weight: 800; letter-spacing: 0.5em; color: var(--muted);
    margin-bottom: 26px; opacity: 0; transition: opacity 0.6s, letter-spacing 0.8s ease;
  }
  .o2-over.in { opacity: 1; letter-spacing: 0.32em; }
  .o2-ticket {
    width: min(430px, 84vw); border-radius: 22px; margin: 0 auto;
    padding: 34px 30px 28px;
    background: linear-gradient(150deg, #16130d, #0e0d0a 55%, #171410);
    border: 1px solid color-mix(in srgb, var(--accent) 55%, transparent);
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.7), 0 0 60px rgba(181, 166, 139, 0.12);
    position: relative; overflow: hidden;
    transform: rotateY(90deg) scale(0.8); opacity: 0;
  }
  .o2-ticket.in { animation: o2flip 0.9s cubic-bezier(0.2, 0.9, 0.25, 1.2) forwards; }
  @keyframes o2flip {
    0% { transform: rotateY(90deg) scale(0.8); opacity: 0; }
    100% { transform: rotateY(0) scale(1); opacity: 1; }
  }
  .o2-ticket::after {
    content: ""; position: absolute; top: -50%; bottom: -50%; width: 60px;
    left: -80px; transform: rotate(18deg);
    background: linear-gradient(90deg, transparent, rgba(255, 245, 220, 0.16), transparent);
  }
  .o2-ticket.shine::after { animation: o2shine 1s ease 0.5s; }
  @keyframes o2shine { to { left: 130%; } }
  .o2-tag {
    display: inline-block; font-size: 10px; font-weight: 800; letter-spacing: 0.34em;
    color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
    border-radius: 8px; padding: 5px 12px 4px; margin-bottom: 20px;
  }
  .o2-nombre {
    font-family: "Plus Jakarta Sans", Urbanist, system-ui, sans-serif;
    font-size: clamp(34px, 6vw, 52px); font-weight: 800; letter-spacing: 0.5em;
    color: #efe8da;
    transition: letter-spacing 1.1s cubic-bezier(0.2, 0.8, 0.2, 1);
    text-shadow: 0 0 30px rgba(181, 166, 139, 0.3);
    white-space: nowrap;
  }
  .o2-ticket.in .o2-nombre { letter-spacing: 0.06em; }
  .o2-ev { margin-top: 14px; font-size: 12.5px; font-weight: 700; letter-spacing: 0.18em; color: var(--muted); }
  .o2-bien {
    margin-top: 30px;
    font-family: "Plus Jakarta Sans", Urbanist, system-ui, sans-serif;
    font-size: clamp(24px, 3.6vw, 36px); font-weight: 800; letter-spacing: -0.5px;
    opacity: 0; transform: translateY(14px) scale(0.92);
  }
  .o2-bien.in { animation: o2rise 0.6s var(--spring-pop) forwards; }
  @keyframes o2rise { to { opacity: 1; transform: translateY(0) scale(1); } }

  /* ===== O3 · SPOTLIGHT ===== */
  #o3-beam {
    position: absolute; top: -12%; left: 50%; transform: translateX(-50%);
    width: min(720px, 90vw); height: 125%;
    background: radial-gradient(50% 62% at 50% 30%, rgba(240, 232, 214, 0.13), rgba(240, 232, 214, 0.05) 45%, transparent 70%);
    clip-path: polygon(44% 0, 56% 0, 92% 100%, 8% 100%);
    opacity: 0; pointer-events: none;
  }
  #o3-beam.on { animation: o3ignite 0.9s ease forwards; }
  @keyframes o3ignite {
    0% { opacity: 0; }
    18% { opacity: 1; } 26% { opacity: 0.25; } 38% { opacity: 1; }
    46% { opacity: 0.55; } 60% { opacity: 1; }
    100% { opacity: 1; }
  }
  .o3-box { text-align: center; position: relative; z-index: 12; }
  .o3-nombre {
    font-family: "Plus Jakarta Sans", Urbanist, system-ui, sans-serif;
    font-size: clamp(60px, 11vw, 120px); font-weight: 800; letter-spacing: 0.02em;
    text-transform: uppercase;
    opacity: 0; filter: blur(26px); transform: scale(1.5);
    transition: opacity 1s ease, filter 1.1s ease, transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    text-shadow: 0 0 60px rgba(240, 232, 214, 0.35);
  }
  .o3-nombre.in { opacity: 1; filter: blur(0); transform: scale(1); }
  .o3-sub {
    margin-top: 18px; font-size: clamp(14px, 1.8vw, 18px); font-weight: 600; color: var(--muted);
    opacity: 0; transform: translateY(10px); transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .o3-sub.in { opacity: 1; transform: translateY(0); }
  .o3-sub b { color: var(--text); }

  /* ===== O4 · BIG BANG ===== */
  #o4-glow {
    position: absolute; left: 50%; top: 50%; translate: -50% -50%;
    width: 10px; height: 10px; border-radius: 50%;
    background: radial-gradient(circle, rgba(240, 232, 214, 0.9), rgba(181, 166, 139, 0.35) 55%, transparent 75%);
    opacity: 0; z-index: 8; pointer-events: none;
  }
  #o4-ring {
    position: absolute; left: 50%; top: 50%; translate: -50% -50%;
    width: 60px; height: 60px; border-radius: 50%;
    border: 2px solid rgba(240, 232, 214, 0.5);
    opacity: 0; z-index: 9; pointer-events: none;
  }
  #o4-ring.boom { animation: o4ring 0.9s cubic-bezier(0.1, 0.7, 0.3, 1) forwards; }
  @keyframes o4ring {
    0% { opacity: 0.9; width: 60px; height: 60px; border-width: 3px; }
    100% { opacity: 0; width: min(120vh, 900px); height: min(120vh, 900px); border-width: 1px; }
  }
  .o4-nombre {
    font-family: "Plus Jakarta Sans", Urbanist, system-ui, sans-serif;
    font-size: clamp(64px, 11vw, 120px); font-weight: 800; letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0; transition: opacity 1.2s ease;
    text-shadow: 0 0 40px rgba(181, 166, 139, 0.4);
  }
  .o4-nombre.in { opacity: 1; }
  .o4-sub {
    text-align: center; margin-top: 16px;
    font-size: clamp(14px, 1.8vw, 18px); font-weight: 600; color: var(--muted);
    opacity: 0; transform: translateY(10px); transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
  }
  .o4-sub.in { opacity: 1; transform: translateY(0); }
</style>

<div id="stage">
  <canvas id="fx"></canvas>
  <div id="o3-beam"></div>
  <div id="o4-glow"></div>
  <div id="o4-ring"></div>
  <div id="scene"></div>
  <div id="flash"></div>

  <div id="menu">
    <button class="mchip on" data-v="1">A · Impacto</button>
    <button class="mchip" data-v="2">B · Golden Ticket</button>
    <button class="mchip" data-v="3">C · Spotlight</button>
    <button class="mchip" data-v="4">D · Big Bang</button>
  </div>
  <div id="note">click en la escena = repetir · elegí arriba la variante</div>
</div>

<script>
  const NOMBRE = 'KAMILO';
  const EVENTO = 'Summit Empresarial 2026';

  const stage = document.getElementById('stage');
  const scene = document.getElementById('scene');
  const flash = document.getElementById('flash');
  const cv = document.getElementById('fx');
  const cx = cv.getContext('2d');
  let W, H;
  function rsz() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
  rsz(); addEventListener('resize', rsz);

  /* ===== particulas (modos: free / seek) ===== */
  const parts = [];
  function loop() {
    cx.clearRect(0, 0, W, H);
    for (let i = parts.length - 1; i >= 0; i--) {
      const p = parts[i];
      if (p.mode === 'seek') {
        p.vx += (p.tx - p.x) * p.k; p.vy += (p.ty - p.y) * p.k;
        p.vx *= 0.86; p.vy *= 0.86;
      } else {
        p.vx *= 0.965; p.vy *= 0.965;
      }
      p.x += p.vx; p.y += p.vy;
      p.life--;
      const a = Math.max(0, Math.min(1, p.life / 46));
      cx.globalAlpha = a * p.al;
      cx.beginPath(); cx.arc(p.x, p.y, p.sz, 0, 7); cx.fillStyle = p.col; cx.fill();
      cx.globalAlpha = a * p.al * 0.14;
      cx.beginPath(); cx.arc(p.x, p.y, p.sz * 3.6, 0, 7); cx.fill();
      if (p.life <= 0) parts.splice(i, 1);
    }
    cx.globalAlpha = 1;
    requestAnimationFrame(loop);
  }
  loop();

  function burst(x, y, n, col, sp, life) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const v = (sp || 4) * (0.25 + Math.random() * 0.75);
      parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, life: life || 46, sz: 1.2 + Math.random() * 2.6, col, al: 1, mode: 'free', k: 0 });
    }
  }

  /* shake fisico del stage */
  function shake(mag = 5) {
    stage.animate(
      [
        { transform: 'translate(0,0)' },
        { transform: `translate(${mag}px, ${-mag}px)` },
        { transform: `translate(${-mag * 0.7}px, ${mag * 0.6}px)` },
        { transform: `translate(${mag * 0.4}px, ${mag * 0.3}px)` },
        { transform: 'translate(0,0)' }
      ],
      { duration: 260, easing: 'ease-out' }
    );
  }
  function doFlash(op = 0.22, dur = 320) {
    flash.animate([{ opacity: op }, { opacity: 0 }], { duration: dur, easing: 'ease-out' });
  }

  /* ===== engine ===== */
  let run = 0;
  const wait = (ms) => new Promise((r) => setTimeout(r, ms));
  function alive(id) { return id === run; }

  function reset() {
    run++;
    parts.length = 0;
    scene.innerHTML = '';
    document.getElementById('o3-beam').className = '';
    document.getElementById('o4-ring').className = '';
    document.getElementById('o4-glow').style.opacity = '0';
    document.getElementById('o4-glow').style.scale = '1';
  }

  /* ============ O1 · IMPACTO (herencia v6) ============ */
  async function o1() {
    const id = run;
    scene.innerHTML = `
      <div style="text-align:center">
        <div class="o1-name" id="o1n">${[...NOMBRE].map((c) => `<span>${c}</span>`).join('')}</div>
        <div class="o1-line" id="o1l"></div>
        <div class="o1-sub" id="o1s">Bienvenido al <b>${EVENTO}</b></div>
      </div>`;
    await wait(350); if (!alive(id)) return;
    const spans = [...document.querySelectorAll('#o1n span')];
    for (let i = 0; i < spans.length; i++) {
      spans[i].classList.add('land');
      setTimeout(() => {
        if (!alive(id)) return;
        const r = spans[i].getBoundingClientRect();
        burst(r.left + r.width / 2, r.bottom - 14, 9, 'rgb(210,200,180)', 3.4, 34);
        shake(i === spans.length - 1 ? 7 : 3);
      }, 300);
      await wait(95); if (!alive(id)) return;
    }
    await wait(320); if (!alive(id)) return;
    doFlash(0.14, 260);
    document.getElementById('o1l').style.width = '220px';
    await wait(260); if (!alive(id)) return;
    document.getElementById('o1s').classList.add('in');
    await wait(1900); if (!alive(id)) return;
    scene.animate([{ transform: 'scale(1)', opacity: 1 }, { transform: 'scale(1.18)', opacity: 0 }], { duration: 550, easing: 'cubic-bezier(0.6,0,0.8,1)', fill: 'forwards' });
  }

  /* ============ O2 · GOLDEN TICKET ============ */
  async function o2() {
    const id = run;
    scene.innerHTML = `
      <div class="o2-wrap">
        <div class="o2-over" id="o2o">TU INVITACIÓN</div>
        <div class="o2-ticket" id="o2t">
          <div class="o2-tag">ACCESO TOTAL</div>
          <div class="o2-nombre">${NOMBRE}</div>
          <div class="o2-ev">${EVENTO.toUpperCase()}</div>
        </div>
        <div class="o2-bien" id="o2b">El evento es tuyo.</div>
      </div>`;
    await wait(300); if (!alive(id)) return;
    document.getElementById('o2o').classList.add('in');
    await wait(750); if (!alive(id)) return;
    const t = document.getElementById('o2t');
    t.classList.add('in', 'shine');
    await wait(420); if (!alive(id)) return;
    shake(4); doFlash(0.1, 240);
    const r = t.getBoundingClientRect();
    burst(r.left + r.width / 2, r.top + r.height / 2, 26, 'rgb(214,198,158)', 6.5, 52);
    await wait(1500); if (!alive(id)) return;
    burst(r.left + 20, r.top + 16, 8, 'rgb(214,198,158)', 3, 40);
    burst(r.right - 20, r.bottom - 16, 8, 'rgb(214,198,158)', 3, 40);
    document.getElementById('o2b').classList.add('in');
    await wait(2000); if (!alive(id)) return;
    scene.animate([{ transform: 'scale(1)', opacity: 1 }, { transform: 'scale(1.14)', opacity: 0 }], { duration: 550, easing: 'cubic-bezier(0.6,0,0.8,1)', fill: 'forwards' });
  }

  /* ============ O3 · SPOTLIGHT ============ */
  async function o3() {
    const id = run;
    scene.innerHTML = `
      <div class="o3-box">
        <div class="o3-nombre" id="o3n">${NOMBRE}</div>
        <div class="o3-sub" id="o3s">El escenario te estaba esperando · <b>${EVENTO}</b></div>
      </div>`;
    await wait(500); if (!alive(id)) return;
    document.getElementById('o3-beam').classList.add('on');
    shake(3);
    /* polvo flotando en el haz */
    const dust = setInterval(() => {
      if (!alive(id)) { clearInterval(dust); return; }
      const x = W / 2 + (Math.random() - 0.5) * Math.min(W * 0.4, 480);
      parts.push({ x, y: H * (0.15 + Math.random() * 0.6), vx: (Math.random() - 0.5) * 0.35, vy: 0.25 + Math.random() * 0.4, life: 130, sz: 0.7 + Math.random() * 1.4, col: 'rgb(232,224,204)', al: 0.5, mode: 'free', k: 0 });
    }, 70);
    await wait(900); if (!alive(id)) return;
    document.getElementById('o3n').classList.add('in');
    await wait(900); if (!alive(id)) return;
    doFlash(0.16, 200); await wait(140); if (!alive(id)) return; doFlash(0.1, 180);
    document.getElementById('o3s').classList.add('in');
    await wait(2400); if (!alive(id)) return;
    clearInterval(dust);
    scene.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 600, fill: 'forwards' });
    document.getElementById('o3-beam').animate([{ opacity: 1 }, { opacity: 0 }], { duration: 600, fill: 'forwards' });
  }

  /* ============ O4 · BIG BANG ============ */
  function textTargets(txt) {
    const oc = document.createElement('canvas');
    const s = Math.min(W * 0.8, 900);
    oc.width = s; oc.height = s * 0.3;
    const o = oc.getContext('2d');
    o.font = `800 ${s / (txt.length * 0.72)}px "Plus Jakarta Sans", Urbanist, "Segoe UI", sans-serif`;
    o.textAlign = 'center'; o.textBaseline = 'middle'; o.fillStyle = '#fff';
    o.fillText(txt, s / 2, s * 0.15);
    const d = o.getImageData(0, 0, oc.width, oc.height).data;
    const pts = [];
    const step = 5;
    for (let y = 0; y < oc.height; y += step)
      for (let x = 0; x < oc.width; x += step)
        if (d[(y * oc.width + x) * 4 + 3] > 128)
          pts.push({ x: x + (W - s) / 2, y: y + H / 2 - oc.height / 2 });
    return pts;
  }

  async function o4() {
    const id = run;
    scene.innerHTML = `
      <div style="text-align:center">
        <div class="o4-nombre" id="o4n">${NOMBRE}</div>
        <div class="o4-sub" id="o4s">${EVENTO} te da la bienvenida</div>
      </div>`;
    await wait(300); if (!alive(id)) return;
    /* implosion: particulas desde los bordes hacia el centro */
    for (let i = 0; i < 260; i++) {
      const edge = Math.floor(Math.random() * 4);
      const x = edge === 0 ? -20 : edge === 1 ? W + 20 : Math.random() * W;
      const y = edge === 2 ? -20 : edge === 3 ? H + 20 : Math.random() * H;
      parts.push({ x, y, vx: 0, vy: 0, tx: W / 2 + (Math.random() - 0.5) * 26, ty: H / 2 + (Math.random() - 0.5) * 26, life: 999, sz: 1 + Math.random() * 2.2, col: 'rgb(222,210,184)', al: 0.9, mode: 'seek', k: 0.012 + Math.random() * 0.014 });
    }
    const glow = document.getElementById('o4-glow');
    glow.style.opacity = '1';
    glow.animate([{ scale: 1 }, { scale: 9 }], { duration: 1500, easing: 'ease-in', fill: 'forwards' });
    await wait(1500); if (!alive(id)) return;
    /* BOOM */
    doFlash(0.35, 420); shake(9);
    glow.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 300, fill: 'forwards' });
    const ring = document.getElementById('o4-ring');
    ring.classList.remove('boom'); void ring.offsetWidth; ring.classList.add('boom');
    const targets = textTargets(NOMBRE);
    parts.forEach((p, i) => {
      const a = Math.random() * Math.PI * 2, v = 9 + Math.random() * 13;
      p.mode = 'free'; p.vx = Math.cos(a) * v; p.vy = Math.sin(a) * v;
      /* tras la onda, cada particula busca su letra */
      setTimeout(() => {
        if (!alive(id)) return;
        const t = targets[i % targets.length];
        p.mode = 'seek'; p.tx = t.x; p.ty = t.y; p.k = 0.05 + Math.random() * 0.05; p.life = 999;
      }, 380 + Math.random() * 260);
    });
    await wait(2100); if (!alive(id)) return;
    /* el texto DOM cristaliza sobre las particulas */
    document.getElementById('o4n').classList.add('in');
    parts.forEach((p) => { p.life = Math.min(p.life, 40 + Math.random() * 30); });
    await wait(700); if (!alive(id)) return;
    document.getElementById('o4s').classList.add('in');
    await wait(2200); if (!alive(id)) return;
    scene.animate([{ transform: 'scale(1)', opacity: 1 }, { transform: 'scale(1.16)', opacity: 0 }], { duration: 550, easing: 'cubic-bezier(0.6,0,0.8,1)', fill: 'forwards' });
  }

  /* ===== control ===== */
  const PLAYS = { 1: o1, 2: o2, 3: o3, 4: o4 };
  let current = 1;
  function playCurrent() { reset(); PLAYS[current](); }

  document.querySelectorAll('.mchip').forEach((b) => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.mchip').forEach((o) => o.classList.remove('on'));
      b.classList.add('on');
      current = +b.dataset.v;
      playCurrent();
    });
  });
  stage.addEventListener('click', (e) => {
    if (e.target.closest('#menu')) return;
    playCurrent();
  });

  playCurrent();
</script>
