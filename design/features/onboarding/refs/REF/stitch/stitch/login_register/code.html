<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-6">
<div class="text-xl font-headline font-bold bg-gradient-to-r from-[#b79fff] to-[#8a95ff] bg-clip-text text-transparent">
            EventOS Summit
        </div>
<button class="text-on-surface-variant hover:opacity-80 duration-200">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="relative flex-grow flex flex-col h-full">
<!-- Upper 40%: Blurred Event Photo & Stats -->
<section class="h-[45%] relative w-full overflow-hidden">
<img alt="vibrant crowd at a tech conference keynote with purple and blue stage lighting" class="absolute inset-0 w-full h-full object-cover blur-sm scale-105" data-alt="cinematic wide shot of a tech summit audience with atmospheric purple and blue stage lighting and blurred bokeh effects" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCPBFqADdH54Q9SJ6taCMGIC_9qQYIRlIMN1UYrc6dDhuTMKNlPjp9Z_QCn8-lYFGtInLD2vmI3eyNhPvIDglDeTsfi6zM47rq6qQWxNQygvm29_GF-E8OgdoljuNJr7_awIVaf7zPxLI3WeRRsBWXmumM1RGgADve89Uis4LDacvQ5zInHay1bDWz1XViFunztq9EZ3vaJnXDpGKQ2zF06gS49MyRKm1bil6ELZGCti0EnCfWZMZceIb94nnHVQB4MtTQQ9-LVt62f"/>
<div class="absolute inset-0 bg-gradient-to-b from-background/40 via-transparent to-background"></div>
<!-- Floating Glass Stats -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none px-6">
<div class="grid grid-cols-2 gap-4 w-full max-w-md">
<div class="bg-surface-container-high/40 backdrop-blur-xl glass-edge rounded-xl p-4 flex flex-col items-center">
<span class="text-primary font-headline font-extrabold text-2xl tracking-tight">500+</span>
<span class="text-on-surface-variant text-[10px] uppercase tracking-[0.1em] font-medium">Asistentes</span>
</div>
<div class="bg-surface-container-high/40 backdrop-blur-xl glass-edge rounded-xl p-4 flex flex-col items-center">
<span class="text-secondary font-headline font-extrabold text-2xl tracking-tight">24h</span>
<span class="text-on-surface-variant text-[10px] uppercase tracking-[0.1em] font-medium">Networking</span>
</div>
</div>
</div>
</section>
<!-- Lower 60%: Registration Sheet -->
<section class="absolute bottom-0 left-0 w-full h-[62%] bg-surface-container-low/90 backdrop-blur-2xl rounded-t-[2.5rem] glass-edge shadow-2xl flex flex-col px-8 pt-10 pb-8 z-20">
<div class="noise-texture absolute inset-0 pointer-events-none rounded-t-[2.5rem]"></div>
<header class="mb-8">
<h1 class="text-3xl font-headline font-extrabold tracking-tight text-on-surface mb-2">Únete al futuro</h1>
<p class="text-on-surface-variant text-sm">Crea tu pase digital para el EventOS Summit.</p>
</header>
<form class="space-y-6 flex-grow">
<!-- Input Group: Name -->
<div class="relative">
<label class="block text-[11px] uppercase tracking-wider text-on-surface-variant font-semibold mb-1 ml-1">Nombre completo</label>
<input class="w-full bg-surface-container-highest/50 border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface placeholder:text-outline transition-all duration-300 py-3 rounded-t-lg" placeholder="Ej. Alex Rivera" type="text"/>
</div>
<!-- Input Group: Email -->
<div class="relative">
<label class="block text-[11px] uppercase tracking-wider text-on-surface-variant font-semibold mb-1 ml-1">Correo electrónico</label>
<input class="w-full bg-surface-container-highest/50 border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface placeholder:text-outline transition-all duration-300 py-3 rounded-t-lg" placeholder="hola@summit.com" type="email"/>
</div>
<!-- Input Group: Password -->
<div class="relative">
<label class="block text-[11px] uppercase tracking-wider text-on-surface-variant font-semibold mb-1 ml-1">Contraseña</label>
<input class="w-full bg-surface-container-highest/50 border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface placeholder:text-outline transition-all duration-300 py-3 rounded-t-lg" placeholder="••••••••" type="password"/>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full aurora-gradient py-4 rounded-xl text-on-primary-fixed font-headline font-bold text-lg shadow-lg hover:scale-[0.98] active:scale-[0.95] transition-transform duration-200">
                        Crear cuenta
                    </button>
</div>
</form>
<!-- Footer Links & Navigation -->
<footer class="mt-8 flex flex-col items-center gap-6">
<a class="text-on-surface-variant text-sm hover:text-primary transition-colors" href="#">
                    ¿Ya tienes cuenta? <span class="text-primary font-semibold">Inicia sesión</span>
</a>
<!-- Progress Dots -->
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-8 h-2 rounded-full aurora-gradient"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
</footer>
