<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>W.7 Sponsors — DaVinci v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-sunken:#0a0a0a;
  --bg-elevated:#141414;
  --surface-low:#1a1a1a;
  --surface-medium:#1f1f1f;
  --surface-high:#262626;
  --surface-card:#181818;
  --border:rgba(255,255,255,0.06);
  --border-strong:rgba(255,255,255,0.12);
  --fg:#f5f5f4;
  --fg-dim:#a8a8a3;
  --fg-mute:#6b6b66;
  --fg-label:#5a5a55;

  --accent:#7CFFB2;
  --accent-soft:rgba(124,255,178,0.10);
  --accent-glow:rgba(124,255,178,0.20);
  --accent-on:#0a0a0a;

  --heart:#FF5D6C;
  --gold:#B5A68B;
  --gold-bg:rgba(181,166,139,0.14);

  --tier-platinum:rgba(255,255,255,0.10);
  --tier-platinum-grad: rgba(255,255,255,0.05), rgba(255,255,255,0.015);
  --tier-gold:rgba(255,210,80,0.20);
  --tier-gold-grad: rgba(255,210,80,0.05), rgba(255,210,80,0.01);
  --tier-silver:rgba(180,185,200,0.18);
  --tier-bronze:rgba(210,155,90,0.18);
  --tier-media:rgba(110,165,255,0.18);

  --trivia:#a78bfa;
  --trivia-bg:rgba(167,139,250,0.10);
  --trivia-border:rgba(167,139,250,0.22);

  --passport:#5eead4;
  --passport-bg:rgba(94,234,212,0.10);

  --canvas-shadow: 0 30px 80px -20px rgba(0,0,0,0.7);
  --spring-soft: cubic-bezier(0.34, 1.36, 0.64, 1);
  --spring-snap: cubic-bezier(0.16, 1.2, 0.3, 1);
  --ease-out:    cubic-bezier(0.4, 0, 0.2, 1);
}

body[data-theme="lux"]{
  --bg-sunken:#F6F8FA;
  --bg-elevated:#FFFFFF;
  --surface-low:#FFFFFF;
  --surface-medium:rgba(0,0,0,0.03);
  --surface-high:rgba(0,0,0,0.06);
  --surface-card:#FFFFFF;
  --border:rgba(0,0,0,0.08);
  --border-strong:rgba(0,0,0,0.14);
  --fg:#1A1B1E;
  --fg-dim:#4A4B50;
  --fg-mute:#7C7D82;
  --fg-label:#A8A9AE;
  --canvas-shadow: 0 16px 48px rgba(0,0,0,0.12);
  --shadow-sm: 0 2px 6px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 8px 20px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg: 0 16px 36px rgba(0,0,0,0.12), 0 6px 12px rgba(0,0,0,0.06);
  --gold:#8E8170;
  --gold-bg:rgba(142,129,112,0.12);
  --tier-platinum:rgba(0,0,0,0.10);
  --tier-platinum-grad: rgba(0,0,0,0.03), rgba(0,0,0,0.005);
  --tier-gold:rgba(184,138,40,0.30);
  --tier-gold-grad: rgba(184,138,40,0.05), rgba(184,138,40,0.01);
}

*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family: 'Urbanist', system-ui, sans-serif;
  background: var(--bg-sunken);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ============== Shell W.0 simulado ============== */
.shell{
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  padding: 24px 28px 24px 84px;
  background:
    radial-gradient(ellipse at 20% 30%, color-mix(in srgb, var(--accent) 8%, transparent), transparent 60%),
    radial-gradient(ellipse at 80% 70%, color-mix(in srgb, var(--accent) 5%, transparent), transparent 55%),
    var(--bg-sunken);
}

.sidebar{
  position: fixed;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  width: 52px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 10px 0;
  border-radius: 28px;
  border: 1px solid var(--border-strong);
  background: color-mix(in srgb, var(--bg-elevated) 90%, transparent);
  backdrop-filter: blur(22px) saturate(1.2);
  z-index: 50;
}
.sidebar .slot{
  width: 36px;
  height: 36px;
  margin: 0 auto;
  display: grid;
  place-items: center;
  border-radius: 12px;
  color: var(--fg-mute);
  cursor: pointer;
  transition: background 180ms;
}
.sidebar .slot.active{ background: var(--surface-high); color: var(--fg); }
.sidebar .slot:hover:not(.active){ background: var(--surface-medium); color: var(--fg-dim) }
.sidebar .slot.disabled{ opacity: 0.5; cursor: not-allowed; }
.sidebar .divider{ height: 1px; width: 22px; margin: 6px auto; background: var(--border); }

.theme-toggle{
  position: fixed;
  left: 18px;
  bottom: 18px;
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  color: var(--fg-dim);
  display: grid; place-items: center;
  cursor: pointer;
  z-index: 50;
}
.theme-toggle:hover{ color: var(--fg); }

/* ============== Canvas Card ============== */
.canvas{
  width: 100%;
  max-width: 1600px;
  height: min(calc(100vh - 56px), 920px);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 28px;
  box-shadow: var(--canvas-shadow);
  overflow: hidden;
  display: grid;
  grid-template-columns: 1fr;
  grid-template-rows: auto 1fr;
  transition: grid-template-columns 360ms var(--ease-out);
}
.canvas.has-detail{
  grid-template-columns: minmax(560px, 1.4fr) minmax(480px, 1fr);
  grid-template-areas: "head head" "wall detail";
}
.canvas:not(.has-detail) .sp-head{ grid-column: 1 / -1; }
.canvas.has-detail .sp-head{ grid-area: head; }
.canvas.has-detail .sp-wall{ grid-area: wall; }
.canvas.has-detail .sp-detail{ grid-area: detail; }

/* ============== Header ============== */
.sp-head{
  padding: 28px 32px 14px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}
.sp-titles h1{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  font-size: 26px;
  letter-spacing: -0.5px;
  line-height: 1.1;
}
.sp-titles .sub{
  font-size: 13px;
  color: var(--fg-mute);
  margin-top: 4px;
}
.sp-tools{
  display: flex;
  align-items: center;
  gap: 8px;
}
.sp-search{
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: 99px;
  background: var(--surface-low);
  border: 1px solid var(--border);
  min-width: 260px;
}
.sp-search input{
  flex: 1;
  background: transparent;
  border: 0;
  outline: 0;
  color: var(--fg);
  font-family: 'Urbanist', sans-serif;
  font-size: 13px;
}
.sp-search input::placeholder{ color: var(--fg-label); }
.sp-tool{
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--surface-low);
  border: 0;
  color: var(--fg-mute);
  display: grid; place-items: center;
  cursor: pointer;
  transition: background 180ms;
}
.sp-tool:hover{ background: var(--surface-medium); color: var(--fg); }
.sp-count{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 12px;
  color: var(--fg-mute);
  padding: 6px 12px;
  border-radius: 99px;
  background: var(--surface-low);
}
.sp-count strong{ color: var(--fg); margin-right: 4px; }

/* ============== Wall ============== */
.sp-wall{
  overflow-y: auto;
  padding: 4px 32px 32px;
  scrollbar-width: thin;
  scrollbar-color: var(--surface-high) transparent;
}
.sp-wall::-webkit-scrollbar{ width: 6px; }
.sp-wall::-webkit-scrollbar-track{ background: transparent; }
.sp-wall::-webkit-scrollbar-thumb{ background: var(--surface-high); border-radius: 3px; }

.tier-row{
  display: grid;
  gap: 14px;
  margin-bottom: 22px;
}
.tier-platinum{ grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
.tier-gold{ grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
.tier-silver,
.tier-bronze,
.tier-media{
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
}

.divider-line{
  height: 1px;
  background: var(--border);
  margin: 0 0 22px;
}

/* Sponsor cards */
.sp-card{
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid var(--border-strong);
  transition: transform 220ms var(--spring-snap), border-color 220ms;
}
.sp-card:hover{ transform: translateY(-2px); border-color: color-mix(in srgb, var(--accent) 30%, var(--border-strong)); }
.sp-card.platinum{
  padding: 18px 16px 16px;
  background: linear-gradient(135deg, var(--tier-platinum-grad));
  display: grid;
  grid-template-columns: 64px 1fr;
  gap: 14px;
  align-items: center;
  border-color: var(--tier-platinum);
}
.sp-card.platinum .logo{
  width: 64px; height: 64px;
  border-radius: 14px;
  display: grid; place-items: center;
  background: var(--surface-medium);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 22px;
  color: var(--fg-dim);
  overflow: hidden;
}
.sp-card.platinum .logo img{ width: 100%; height: 100%; object-fit: cover; }
.sp-card.platinum .body .name{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: -0.2px;
  margin-bottom: 4px;
}
.sp-card.platinum .body .desc{
  font-size: 11px;
  color: var(--fg-mute);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.sp-card.platinum .tier-tag{
  position: absolute; top: 10px; right: 10px;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}

.sp-card.gold{
  padding: 14px 12px;
  background: linear-gradient(135deg, var(--tier-gold-grad));
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  border-color: var(--tier-gold);
}
.sp-card.gold .logo{
  width: 44px; height: 44px;
  border-radius: 10px;
  display: grid; place-items: center;
  background: var(--surface-medium);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 600;
  font-size: 16px;
  color: var(--fg-mute);
  overflow: hidden;
}
.sp-card.gold .logo img{ width: 100%; height: 100%; object-fit: cover; }
.sp-card.gold .name{
  font-family: 'Urbanist', sans-serif;
  font-weight: 600;
  font-size: 11px;
  text-align: center;
  color: var(--fg-dim);
  line-height: 1.2;
}

.sp-card.silver,
.sp-card.bronze,
.sp-card.media{
  padding: 0;
  border: 0;
  background: transparent;
  cursor: pointer;
}
.sp-card.silver .logo,
.sp-card.bronze .logo,
.sp-card.media .logo{
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 1px solid var(--border-strong);
  background: var(--surface-medium);
  display: grid; place-items: center;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: var(--fg-mute);
  overflow: hidden;
  transition: border-color 220ms, transform 220ms var(--spring-snap);
}
.sp-card.silver .logo img,
.sp-card.bronze .logo img,
.sp-card.media .logo img{ width: 100%; height: 100%; object-fit: cover; }
.sp-card.silver:hover .logo,
.sp-card.bronze:hover .logo,
.sp-card.media:hover .logo{
  border-color: var(--fg-dim);
  transform: scale(1.05);
}

/* Badges sobre cards */
.sp-card .passport-badge{
  position: absolute;
  top: 8px; left: 8px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--passport-bg);
  border: 1px solid var(--passport);
  color: var(--passport);
  display: grid; place-items: center;
}
.sp-card .trivia-badge{
  position: absolute;
  bottom: 8px; right: 8px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--trivia-bg);
  border: 1px solid var(--trivia);
  color: var(--trivia);
  display: grid; place-items: center;
}
.sp-card.platinum .passport-badge,
.sp-card.platinum .trivia-badge{ width: 22px; height: 22px; }

.sp-card.selected{
  border-color: var(--accent);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 30%, transparent);
}
.sp-card.silver.selected .logo,
.sp-card.bronze.selected .logo,
.sp-card.media.selected .logo{
  border-color: var(--accent);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 30%, transparent);
}

/* Tier headings (DISCRETOS, casi invisibles — solo orientacion) */
.tier-label{
  font-family: 'Urbanist', sans-serif;
  font-weight: 600;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--fg-label);
  margin: 6px 0 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.tier-label::after{
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Stagger reveal */
.stagger{
  opacity: 0;
  transform: translateY(8px) scale(0.94);
  animation: stagger-in 460ms var(--spring-soft) forwards;
}
@keyframes stagger-in{
  to{ opacity: 1; transform: translateY(0) scale(1); }
}

/* Living shuffle (en JS hace dom-move) */
.shuffle-wrap{ transition: transform 800ms var(--spring-soft); }

/* ============== Detail Panel (MUTA) ============== */
.sp-detail{
  border-left: 1px solid var(--border);
  background: var(--bg-elevated);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--surface-high) transparent;
  animation: panel-in 320ms var(--spring-soft) backwards;
}
.sp-detail::-webkit-scrollbar{ width: 6px; }
.sp-detail::-webkit-scrollbar-track{ background: transparent; }
.sp-detail::-webkit-scrollbar-thumb{ background: var(--surface-high); border-radius: 3px; }

@keyframes panel-in{
  from{ opacity: 0; transform: translateX(20px); }
  to{ opacity: 1; transform: translateX(0); }
}

.detail-head{
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px 0;
}
.detail-close{
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--surface-low);
  border: 0;
  color: var(--fg-dim);
  cursor: pointer;
  display: grid; place-items: center;
}
.detail-close:hover{ background: var(--surface-medium); color: var(--fg); }

.detail-actions{
  display: flex;
  gap: 8px;
}
.detail-actions .icon-btn{
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--surface-low);
  border: 0;
  color: var(--fg-dim);
  cursor: pointer;
  display: grid; place-items: center;
  transition: background 180ms;
}
.detail-actions .icon-btn:hover{ background: var(--surface-medium); color: var(--fg); }
.detail-actions .icon-btn.fav{ color: var(--heart); }
.detail-actions .icon-btn.fav.on{ background: color-mix(in srgb, var(--heart) 15%, transparent); }

.detail-hero{
  padding: 28px 28px 18px;
  text-align: center;
}
.detail-hero .logo{
  width: 88px; height: 88px;
  border-radius: 22px;
  margin: 0 auto 16px;
  display: grid; place-items: center;
  background: var(--surface-medium);
  border: 1px solid var(--border-strong);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 32px;
  color: var(--fg-dim);
  overflow: hidden;
}
.detail-hero .logo img{ width: 100%; height: 100%; object-fit: cover; }
.detail-hero .name{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.detail-hero .tier-pill{
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 99px;
  background: var(--surface-low);
  border: 1px solid var(--border);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--fg-mute);
}
.detail-hero .desc{
  margin-top: 14px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--fg-dim);
}

.points-toast{
  position: absolute;
  top: 56px;
  left: 50%;
  transform: translateX(-50%);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 99px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-glow);
  color: var(--accent);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.2px;
  pointer-events: none;
  opacity: 0;
  animation: points-pop 2200ms var(--spring-soft) forwards;
}
@keyframes points-pop{
  0%{ opacity: 0; transform: translate(-50%, 8px) scale(0.85); }
  15%{ opacity: 1; transform: translate(-50%, 0) scale(1.04); }
  25%{ transform: translate(-50%, 0) scale(1); }
  80%{ opacity: 1; }
  100%{ opacity: 0; transform: translate(-50%, -4px) scale(0.95); }
}

.passport-pill{
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 99px;
  background: var(--passport-bg);
  border: 1px solid var(--passport);
  font-size: 10px;
  font-weight: 600;
  color: var(--passport);
  margin-left: 8px;
  letter-spacing: 0.2px;
}

.detail-section{
  padding: 22px 28px;
  border-top: 1px solid var(--border);
}
.detail-section.first{ border-top: 0; }
.section-title{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  color: var(--fg-label);
  margin-bottom: 12px;
}

/* Sessions */
.session-item{
  display: grid;
  grid-template-columns: 56px 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 12px;
  border-radius: 14px;
  background: var(--surface-low);
  border: 1px solid var(--border);
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 180ms;
}
.session-item:hover{ background: var(--surface-medium); }
.session-item .time{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 14px;
}
.session-item .time .type{
  display: block;
  margin-top: 3px;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--fg-mute);
}
.session-item .title{
  font-size: 13px;
  font-weight: 500;
  line-height: 1.3;
  margin-bottom: 3px;
}
.session-item .where{
  font-size: 11px;
  color: var(--fg-mute);
  display: flex;
  align-items: center;
  gap: 4px;
}
.session-item .chev{
  color: var(--fg-label);
}

/* Services chips */
.chip-row{
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.chip{
  padding: 7px 14px;
  border-radius: 99px;
  background: var(--surface-low);
  border: 1px solid var(--border);
  font-family: 'Urbanist', sans-serif;
  font-weight: 500;
  font-size: 12px;
  color: var(--fg-dim);
  cursor: pointer;
  transition: all 180ms;
  user-select: none;
}
.chip:hover{ background: var(--surface-medium); color: var(--fg); border-color: var(--border-strong); }
.chip.active{
  background: var(--surface-high);
  color: var(--fg);
  border-color: var(--accent);
}
.chip.disabled{ cursor: not-allowed; opacity: 0.55; }

.contact-msg{
  margin-top: 12px;
  width: 100%;
  background: var(--surface-low);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  font-family: 'Urbanist', sans-serif;
  font-size: 13px;
  color: var(--fg);
  resize: none;
  outline: 0;
  min-height: 80px;
  transition: border-color 180ms;
}
.contact-msg:focus{ border-color: var(--border-strong); }

.contact-cta{
  margin-top: 12px;
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  border: 0;
  background: var(--accent);
  color: var(--accent-on);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: opacity 180ms, transform 120ms;
}
.contact-cta:hover{ opacity: 0.92; }
.contact-cta:active{ transform: scale(0.98); }
.contact-cta:disabled{
  background: var(--surface-medium);
  color: var(--fg-mute);
  cursor: not-allowed;
  opacity: 0.6;
}
.contact-sent{

function shuffleArray(arr, seed){
  const copy = [...arr];
  let s = seed;
  for (let i = copy.length - 1; i > 0; i--){
    s = (s * 9301 + 49297) % 233280;
    const j = Math.floor((s / 233280) * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function debounce(fn, ms){
  let t;
  return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), ms); };
}

      }
      html += `</div>`;
    }
  }
  wall.innerHTML = html;

  // Hook clicks
  for (const card of wall.querySelectorAll('.sp-card')){
    card.addEventListener('click', () => {
      const id = Number(card.dataset.id);
      selectSponsor(id);
    });
  }

  // Count badge
  document.getElementById('count').innerHTML = `<strong>${SPONSORS.length}</strong>marcas`;
}

function renderCard(sp, tier, idx){
  const selected = state.selectedId === sp.id ? ' selected' : '';
  const passportBadge = sp.passport_enabled ? `<div class="passport-badge" title="Cuenta para pasaporte">
    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>` : '';
  const triviaBadge = sp.trivia_enabled ? `<div class="trivia-badge" title="Tiene trivia">
    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 015.8 1c0 2-3 3-3 3M12 17h.01"/></svg>
  </div>` : '';

  const logoEl = sp.logo_url
    ? `<div class="logo"><img src="${sp.logo_url}" alt="${sp.name}"/></div>`
    : `<div class="logo">${logoFallback(sp.name)}</div>`;

  if (tier === 'platinum'){
    return `<div class="sp-card platinum stagger${selected}" data-id="${sp.id}" style="animation-delay:${idx * 25}ms">
      ${passportBadge}${triviaBadge}
      ${logoEl}
      <div class="body">
        <div class="name">${sp.name}</div>
        <div class="desc">${sp.desc || ''}</div>
      </div>
      <div class="tier-tag">${TIER_LABELS[tier]}</div>
    </div>`;
  }
  if (tier === 'gold'){
    return `<div class="sp-card gold stagger${selected}" data-id="${sp.id}" style="animation-delay:${idx * 25}ms">
      ${passportBadge}${triviaBadge}
      ${logoEl}
      <div class="name">${sp.name}</div>
    </div>`;
  }
  // compact tiers
  return `<div class="sp-card ${tier} stagger${selected}" data-id="${sp.id}" title="${sp.name}" style="animation-delay:${idx * 18}ms">
    ${passportBadge}${triviaBadge}
    ${logoEl}
  </div>`;
}

// ============== Detail Panel ==============
function selectSponsor(id){
  if (state.selectedId === id){
    // Toggle close
    state.selectedId = null;
    document.getElementById('canvas').classList.remove('has-detail');
    document.getElementById('detail').style.display = 'none';
    renderWall();
    return;
  }
  state.selectedId = id;
  document.getElementById('canvas').classList.add('has-detail');
  document.getElementById('detail').style.display = 'block';
  renderDetail();
  renderWall(); // re-render para marcar el selected
}

function renderDetail(){
  const detail = document.getElementById('detail');
  const sp = SPONSORS.find(s => s.id === state.selectedId);
  if (!sp){ detail.innerHTML = ''; return; }

  const isFav = state.favorites.has(sp.id);
  const isContactSent = state.contactsSent.has(sp.id);

  const logoEl = sp.logo_url
    ? `<div class="logo"><img src="${sp.logo_url}" alt="${sp.name}"/></div>`
    : `<div class="logo">${logoFallback(sp.name)}</div>`;

  // Sessions section
  let sessionsHtml = '';
  if (sp.sessions && sp.sessions.length){
    sessionsHtml = `<div class="detail-section">
      <div class="section-title">Sus sesiones</div>
      ${sp.sessions.map(s => `<div class="session-item">
        <div class="time">${s.time}<span class="type" style="color:${s.typeColor}">${s.type}</span></div>
        <div>
          <div class="title">${s.title}</div>
          <div class="where">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${s.location}
          </div>
        </div>
        <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`).join('')}
    </div>`;
  }

  // Services + contact form section
  let contactHtml = '';
  if (sp.services && sp.services.length){
    if (isContactSent){
      contactHtml = `<div class="detail-section">
        <div class="section-title">Solicitud enviada</div>
        <div class="contact-sent">
          <div class="head">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            Solicitud enviada
          </div>
          <div class="sub">${sp.name} recibira tu perfil y los servicios seleccionados.</div>
        </div>
      </div>`;
    } else {
      contactHtml = `<div class="detail-section">
        <div class="section-title">Que te interesa?</div>
        <div class="chip-row" id="services-${sp.id}">
          ${sp.services.map(svc => `<div class="chip" data-service="${svc.id}">${svc.name}</div>`).join('')}
        </div>
        <textarea class="contact-msg" id="contact-msg-${sp.id}" placeholder="Cuentales tu interes (opcional)..." maxlength="1000"></textarea>
        <button class="contact-cta" id="contact-cta-${sp.id}" disabled>Solicitar contacto</button>
      </div>`;
    }
  }

  // Trivia section
  let triviaHtml = '';
  if (sp.trivia_enabled && sp.trivias && sp.trivias.length){
    const currentIdx = state.triviaIndex.get(sp.id) ?? 0;
    const total = sp.trivias.length;
    const allAnswered = sp.trivias.every(t => state.triviaAnswered.has(t.id));

    const progressDots = sp.trivias.map((t, i) => {
      const done = state.triviaAnswered.has(t.id);
      const current = i === currentIdx && !done;
      return `<div class="dot ${done ? 'done' : current ? 'current' : ''}"></div>`;
    }).join('');

    if (allAnswered){
      const correctCount = sp.trivias.filter(t => state.triviaAnswered.get(t.id)?.is_correct).length;
      triviaHtml = `<div class="detail-section">
        <div class="trivia-card">
          <div class="trivia-head">
            <div class="left">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 015.8 1c0 2-3 3-3 3M12 17h.01"/></svg>
              Trivia completada
            </div>
            <div class="trivia-bonus">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 15 8.5 22 9.3 17 14.1 18.2 21 12 17.8 5.8 21 7 14.1 2 9.3 9 8.5 12 2"/></svg>
              ${correctCount}/${total} correctas
            </div>
          </div>
          <div style="color:var(--fg-dim); font-size:12px; line-height:1.5">Gracias por participar! Ya respondiste todas las preguntas de ${sp.name}.</div>
        </div>
      </div>`;
    } else {
      const t = sp.trivias[currentIdx];
      const answered = state.triviaAnswered.get(t.id);
      triviaHtml = `<div class="detail-section">
        <div class="trivia-card" id="trivia-${sp.id}">
          <div class="trivia-progress">${progressDots}</div>
          <div class="trivia-head">
            <div class="left">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 015.8 1c0 2-3 3-3 3M12 17h.01"/></svg>
              Pregunta ${currentIdx + 1} de ${total}
            </div>
            <div class="trivia-bonus">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 15 8.5 22 9.3 17 14.1 18.2 21 12 17.8 5.8 21 7 14.1 2 9.3 9 8.5 12 2"/></svg>
              +${t.bonus_points} pts
            </div>
          </div>
          <div class="trivia-question">${t.question}</div>
          ${t.options.map((opt, i) => {
            let cls = 'trivia-option';
            if (answered){
              cls += ' locked';
              if (i === t.correct_index) cls += ' correct';
              else if (i === answered.selected) cls += ' wrong';
              else cls += ' dimmed';
            }
            const iconOk = i === t.correct_index ? `<span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></span>` : '';
            const iconBad = (answered && i === answered.selected && i !== t.correct_index) ? `<span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>` : '';
            return `<button class="${cls}" data-trivia="${t.id}" data-option="${i}" ${answered ? 'disabled' : ''}>
              <span>${opt}</span>
              ${iconOk}${iconBad}
            </button>`;
          }).join('')}
          ${answered ? `<div class="trivia-feedback ${answered.is_correct ? '' : 'wrong'}">
            ${answered.is_correct ? `+${t.bonus_points} puntos · siguiente pregunta...` : 'Respuesta incorrecta · siguiente pregunta...'}
          </div>` : ''}
        </div>
      </div>`;
    }
  }

  // Action buttons (website + email)
  let actionsHtml = '';
  const hasWebsite = !!sp.website_url;
  const hasEmail = sp.show_contact_button && !!sp.contact_email;
  if (hasWebsite || hasEmail){
    actionsHtml = `<div class="detail-section">
      <div class="action-row">
        ${hasWebsite ? `<a class="action-btn" href="${sp.website_url}" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 010 20 15 15 0 010-20z"/></svg>
          Sitio web
        </a>` : ''}
        ${hasEmail ? `<a class="action-btn" href="mailto:${sp.contact_email}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Email
        </a>` : ''}
      </div>
    </div>`;
  }

  // Passport badge
  const passportPill = sp.passport_enabled
    ? `<span class="passport-pill">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Pasaporte
      </span>`
    : '';

  detail.innerHTML = `
    <div class="detail-head">
      <button class="detail-close" id="close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="detail-actions">
        <button class="icon-btn fav ${isFav ? 'on' : ''}" id="fav-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        </button>
      </div>
    </div>
    <div class="detail-hero" style="position:relative">
      <div class="points-toast" id="points-toast">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15 8.5 22 9.3 17 14.1 18.2 21 12 17.8 5.8 21 7 14.1 2 9.3 9 8.5 12 2"/></svg>
        +${sp.visit_points} puntos por visitar
      </div>
      ${logoEl}
      <div class="name">${sp.name}${passportPill}</div>
      <div class="tier-pill">${TIER_LABELS[sp.tier]}</div>
      ${sp.desc ? `<div class="desc">${sp.desc}</div>` : ''}
    </div>
    ${sessionsHtml}
    ${triviaHtml}
    ${contactHtml}
    ${actionsHtml}
  `;

  // Hooks
  document.getElementById('close').onclick = () => selectSponsor(sp.id);
  const favBtn = document.getElementById('fav-btn');
  favBtn.onclick = () => {
    if (state.favorites.has(sp.id)) state.favorites.delete(sp.id);
    else state.favorites.add(sp.id);
    favBtn.querySelector('svg').classList.add('heart-pop');
    setTimeout(() => favBtn.querySelector('svg').classList.remove('heart-pop'), 360);
    renderDetail();
  };

  // Services chips + contact CTA
  if (sp.services?.length && !isContactSent){
    const chips = detail.querySelectorAll(`#services-${sp.id} .chip`);
    const cta = document.getElementById(`contact-cta-${sp.id}`);
    let selected = new Set();
    const refresh = () => {
      const n = selected.size;
      cta.disabled = n === 0;
      cta.textContent = n === 0 ? 'Solicitar contacto' : `Enviar solicitud (${n})`;
    };
    chips.forEach(chip => {
      chip.onclick = () => {
        const sid = chip.dataset.service;
        if (selected.has(sid)){ selected.delete(sid); chip.classList.remove('active'); }
        else { selected.add(sid); chip.classList.add('active'); }
        refresh();
      };
    });
    cta.onclick = () => {
      state.contactsSent.add(sp.id);
      renderDetail();
    };
  }

  // Trivia options
  detail.querySelectorAll('.trivia-option:not(.locked)').forEach(opt => {
    opt.onclick = () => {
      const tId = Number(opt.dataset.trivia);
      const optIdx = Number(opt.dataset.option);
      const t = sp.trivias.find(x => x.id === tId);
      const isCorrect = optIdx === t.correct_index;
      state.triviaAnswered.set(tId, { selected: optIdx, is_correct: isCorrect });
      renderDetail();
      // Auto-advance to next question after feedback
      setTimeout(() => {
        const currentIdx = state.triviaIndex.get(sp.id) ?? 0;
        if (currentIdx < sp.trivias.length - 1){
          state.triviaIndex.set(sp.id, currentIdx + 1);
          renderDetail();
        } else {
          renderDetail();
        }
      }, 1800);
    };
  });

  // Restart points toast animation each open
  const toast = document.getElementById('points-toast');
  toast.style.animation = 'none';
  void toast.offsetHeight;
  toast.style.animation = '';
}

// ============== Search ==============
document.getElementById('search').addEventListener('input', debounce((e) => {
  state.search = e.target.value;
  renderWall();
}, 250));

// ============== Living shuffle (every 7s) ==============
setInterval(() => {
  if (state.search) return; // pausa durante busqueda
  state.shuffleSeed = Math.floor(Math.random() * 100000);
  renderWall();
}, 7000);

// ============== Theme toggle ==============
document.getElementById('themeToggle').addEventListener('click', () => {
  const cur = document.body.dataset.theme;
  document.body.dataset.theme = cur === 'noir' ? 'lux' : 'noir';
});

// ============== Init ==============
renderWall();
</script>
</body>
</html>
