<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>W.7 Sponsors — DaVinci v3 (Expo + DetailPanel)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-sunken:#0a0a0a;
  --bg-elevated:#141414;
  --surface-low:#1a1a1a;
  --surface-medium:#1f1f1f;
  --surface-high:#262626;
  --surface-card:#181818;
  --border:rgba(255,255,255,0.06);
  --border-strong:rgba(255,255,255,0.12);
  --fg:#f5f5f4;
  --fg-dim:#a8a8a3;
  --fg-mute:#6b6b66;
  --fg-label:#5a5a55;
  --accent:#7CFFB2;
  --accent-soft:rgba(124,255,178,0.10);
  --accent-glow:rgba(124,255,178,0.20);
  --accent-on:#0a0a0a;
  --heart:#FF5D6C;
  --trivia:#a78bfa;
  --trivia-bg:rgba(167,139,250,0.10);
  --trivia-border:rgba(167,139,250,0.22);
  --passport:#5eead4;
  --passport-bg:rgba(94,234,212,0.10);

  /* Tier accents (espejo Expo TIER_ACCENT) */
  --tier-platinum-border:rgba(255,255,255,0.10);
  --tier-platinum-bg: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
  --tier-gold-border:rgba(255,210,80,0.10);
  --tier-gold-bg: linear-gradient(135deg, rgba(255,210,80,0.04), rgba(255,210,80,0.01));
  --tier-silver-border:rgba(180,185,200,0.10);
  --tier-bronze-border:rgba(210,155,90,0.10);
  --tier-media-border:rgba(110,165,255,0.10);

  --canvas-shadow: 0 30px 80px -20px rgba(0,0,0,0.7);
  --spring-soft: cubic-bezier(0.34, 1.36, 0.64, 1);
  --spring-snap: cubic-bezier(0.16, 1.2, 0.3, 1);
  --ease-out:    cubic-bezier(0.4, 0, 0.2, 1);
}

body[data-theme="lux"]{
  --bg-sunken:#F6F8FA;
  --bg-elevated:#FFFFFF;
  --surface-low:#FFFFFF;
  --surface-medium:rgba(0,0,0,0.03);
  --surface-high:rgba(0,0,0,0.06);
  --surface-card:#FFFFFF;
  --border:rgba(0,0,0,0.08);
  --border-strong:rgba(0,0,0,0.14);
  --fg:#1A1B1E;
  --fg-dim:#4A4B50;
  --fg-mute:#7C7D82;
  --fg-label:#A8A9AE;
  --canvas-shadow: 0 16px 48px rgba(0,0,0,0.12);
  --tier-platinum-bg: #FFFFFF;
  --tier-platinum-border: rgba(0,0,0,0.08);
  --tier-gold-bg: #FFFFFF;
  --tier-gold-border: rgba(184,138,40,0.20);
}

*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family: 'Urbanist', system-ui, sans-serif;
  background: var(--bg-sunken);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ============== Shell ============== */
.shell{
  position: fixed; inset: 0;
  display: grid; place-items: center;
  padding: 24px 28px 24px 84px;
  background:
    radial-gradient(ellipse at 20% 30%, color-mix(in srgb, var(--accent) 8%, transparent), transparent 60%),
    radial-gradient(ellipse at 80% 70%, color-mix(in srgb, var(--accent) 5%, transparent), transparent 55%),
    var(--bg-sunken);
}
.sidebar{
  position: fixed; left: 18px; top: 50%;
  transform: translateY(-50%);
  width: 52px; display: flex; flex-direction: column; gap: 4px;
  padding: 10px 0;
  border-radius: 28px;
  border: 1px solid var(--border-strong);
  background: color-mix(in srgb, var(--bg-elevated) 90%, transparent);
  backdrop-filter: blur(22px) saturate(1.2);
  z-index: 50;
}
.sidebar .slot{ width:36px;height:36px;margin:0 auto;display:grid;place-items:center;border-radius:12px;color:var(--fg-mute);cursor:pointer; }
.sidebar .slot.active{ background: var(--surface-high); color: var(--fg); }
.sidebar .divider{ height:1px;width:22px;margin:6px auto;background:var(--border); }
.theme-toggle{ position:fixed;left:18px;bottom:18px;width:38px;height:38px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border-strong);color:var(--fg-dim);display:grid;place-items:center;cursor:pointer;z-index:50; }

/* ============== Canvas — 2 columnas fijas ============== */
.canvas{
  width: 100%;
  max-width: 1600px;
  height: min(calc(100vh - 56px), 920px);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 28px;
  box-shadow: var(--canvas-shadow);
  overflow: hidden;
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);  /* SIEMPRE 2 cols */
  grid-template-rows: 1fr;
}

/* ============== Wall (izquierda — espejo Expo) ============== */
.wall{
  display: flex;
  flex-direction: column;
  min-width: 0;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.wall-head{
  padding: 26px 28px 14px;
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
  flex-shrink: 0;
}
.wall-head h1{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800; font-size: 24px;
  letter-spacing: -0.5px;
}
.wall-head .search{
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 99px;
  background: var(--surface-low);
  border: 1px solid var(--border);
  width: 240px;
}
.wall-head .search input{
  flex:1; background:transparent; border:0; outline:0;
  color: var(--fg); font-family:'Urbanist',sans-serif; font-size:13px;
}
.wall-head .search input::placeholder{ color: var(--fg-label); }

.wall-body{
  overflow-y: auto;
  padding: 6px 24px 28px;
  scrollbar-width: thin;
  scrollbar-color: var(--surface-high) transparent;
  flex: 1;
}
.wall-body::-webkit-scrollbar{ width:6px }
.wall-body::-webkit-scrollbar-thumb{ background: var(--surface-high); border-radius:3px }

/* Tier groups */
.tier-group{ margin-bottom: 18px; }
.tier-group + .tier-group::before{
  content:''; display:block;
  height:1px; background: var(--border);
  margin-bottom: 18px;
}

/* Grid Platinum: cards grandes con logo + nombre + desc */
.grid-platinum{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
}
.card-platinum{
  position: relative;
  background: var(--tier-platinum-bg);
  border: 1px solid var(--tier-platinum-border);
  border-radius: 16px;
  padding: 14px;
  display: grid;
  grid-template-columns: 56px 1fr;
  gap: 12px;
  align-items: center;
  cursor: pointer;
  transition: transform 220ms var(--spring-snap), border-color 220ms;
}
.card-platinum:hover{ transform: translateY(-2px); border-color: var(--border-strong); }
.card-platinum.selected{ border-color: var(--accent); }
.card-platinum .logo{
  width: 56px; height: 56px;
  border-radius: 14px;
  background: var(--surface-medium);
  display: grid; place-items: center;
  overflow: hidden;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700; font-size: 20px;
  color: var(--fg-mute);
}
.card-platinum .logo img{ width:100%; height:100%; object-fit: cover; }
.card-platinum .body{ min-width: 0; }
.card-platinum .name{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700; font-size: 13px;
  letter-spacing: -0.2px;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.card-platinum .desc{
  font-size: 11px;
  color: var(--fg-mute);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Grid Gold: cards medianas verticales */
.grid-gold{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
}
.card-gold{
  position: relative;
  background: var(--tier-gold-bg);
  border: 1px solid var(--tier-gold-border);
  border-radius: 14px;
  padding: 12px 8px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  transition: transform 220ms var(--spring-snap), border-color 220ms;
}
.card-gold:hover{ transform: translateY(-2px); border-color: rgba(255,210,80,0.30); }
.card-gold.selected{ border-color: var(--accent); }
.card-gold .logo{
  width: 42px; height: 42px;
  border-radius: 10px;
  background: var(--surface-medium);
  display: grid; place-items: center;
  overflow: hidden;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 600; font-size: 16px;
  color: var(--fg-mute);
}
.card-gold .logo img{ width:100%; height:100%; object-fit: cover; }
.card-gold .name{
  font-family: 'Urbanist', sans-serif;
  font-weight: 600; font-size: 11px;
  text-align: center;
  color: var(--fg-dim);
  line-height: 1.2;
  max-width: 100%;
  white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}

/* Compact tiers (Silver/Bronze/Media) — SOLO logo round (Expo pattern) */
.grid-compact{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(60px, 60px));
  gap: 14px;
  justify-content: flex-start;
}
.card-compact{
  position: relative;
  width: 60px; height: 60px;
  cursor: pointer;
}
.card-compact .logo{
  width: 60px; height: 60px;
  border-radius: 50%;
  background: var(--surface-medium);
  border: 1px solid var(--border-strong);
  display: grid; place-items: center;
  overflow: hidden;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 600; font-size: 16px;
  color: var(--fg-mute);
  transition: border-color 200ms, transform 220ms var(--spring-snap);
}
.card-compact .logo img{ width:100%; height:100%; object-fit: cover; }
.card-compact:hover .logo{ transform: scale(1.08); border-color: var(--fg-mute); }
.card-compact.selected .logo{ border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 30%, transparent); }

/* Badges sobre cards (passport + trivia) */
.badge-mini{
  position: absolute;
  width: 16px; height: 16px;
  border-radius: 50%;
  display: grid; place-items: center;
  z-index: 2;
}
.badge-mini.passport{
  top: 6px; left: 6px;
  background: var(--passport-bg);
  border: 1px solid var(--passport);
  color: var(--passport);
}
.badge-mini.trivia{
  bottom: 6px; right: 6px;
  background: var(--trivia-bg);
  border: 1px solid var(--trivia);
  color: var(--trivia);
}
.card-platinum .badge-mini{ width: 18px; height: 18px; }
.card-compact .badge-mini.passport{ top: -2px; left: -2px; }
.card-compact .badge-mini.trivia{ bottom: -2px; right: -2px; }

/* Stagger reveal on first mount */
.stagger{
  opacity: 0;
  transform: translateY(6px) scale(0.94);
  animation: stagger-in 460ms var(--spring-soft) forwards;
}
@keyframes stagger-in{
  to{ opacity: 1; transform: translateY(0) scale(1); }
}

/* Living shuffle FLIP — cuando re-renderiza con nuevo orden, las cards
   se acomodan suavemente porque tienen transition: transform 600ms */
.shuffle-target{ transition: opacity 480ms var(--ease-out); }
.shuffle-fade{ opacity: 0.35; }

/* ============== DetailPanel (derecha) ============== */
.detail{
  display: flex;
  flex-direction: column;
  background: var(--bg-elevated);
  overflow: hidden;
}
.detail-empty{
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 32px;
  text-align: center;
  color: var(--fg-label);
}
.detail-empty .ico{
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--surface-low);
  border: 1px solid var(--border);
  display: grid; place-items: center;
  margin: 0 auto 14px;
  color: var(--fg-mute);
}
.detail-empty .title{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 600; font-size: 14px;
  color: var(--fg-mute);
  margin-bottom: 4px;
}
.detail-empty .sub{ font-size: 12px; color: var(--fg-label); }

.detail-full{
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--surface-high) transparent;
  animation: panel-fade 280ms var(--spring-soft);
}
.detail-full::-webkit-scrollbar{ width:6px }
.detail-full::-webkit-scrollbar-thumb{ background: var(--surface-high); border-radius:3px }
@keyframes panel-fade{
  from{ opacity: 0; transform: translateX(12px); }
  to{ opacity: 1; transform: translateX(0); }
}

.detail-head{
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 24px 0;
}
.detail-btn{
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--surface-low); border: 0;
  color: var(--fg-dim); cursor: pointer;
  display: grid; place-items: center;
  transition: background 180ms;
}
.detail-btn:hover{ background: var(--surface-medium); color: var(--fg); }
.detail-btn.fav{ color: var(--heart); }
.detail-btn.fav.on{ background: color-mix(in srgb, var(--heart) 15%, transparent); }

.hero{ padding: 24px 28px 16px; text-align: center; position: relative; }
.hero .logo{
  width: 88px; height: 88px;
  border-radius: 22px;
  margin: 0 auto 14px;
  background: var(--surface-medium);
  border: 1px solid var(--border-strong);
  display: grid; place-items: center;
  overflow: hidden;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700; font-size: 30px;
  color: var(--fg-dim);
}
.hero .logo img{ width:100%; height:100%; object-fit: cover; }
.hero .name{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800; font-size: 22px;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
  display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center;
}
.hero .tier-pill{
  display: inline-block;
  padding: 3px 10px; border-radius: 99px;
  background: var(--surface-low);
  border: 1px solid var(--border);
  font-size: 9px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--fg-mute);
}
.hero .desc{
  margin-top: 12px;
  font-size: 13px; line-height: 1.6;
  color: var(--fg-dim);
}
.passport-pill{
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 99px;
  background: var(--passport-bg);
  border: 1px solid var(--passport);
  font-size: 9px; font-weight: 700;
  color: var(--passport);
  letter-spacing: 0.4px;
  vertical-align: middle;
}
.points-toast{
  position: absolute;
  top: -8px; left: 50%;
  transform: translateX(-50%);
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px;
  border-radius: 99px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-glow);
  color: var(--accent);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700; font-size: 11px;
  pointer-events: none; opacity: 0;
  animation: points-pop 2200ms var(--spring-soft) forwards;
}
@keyframes points-pop{
  0%{ opacity:0; transform: translate(-50%, -4px) scale(0.85); }
  15%{ opacity:1; transform: translate(-50%, 0) scale(1.04); }
  25%{ transform: translate(-50%, 0) scale(1); }
  80%{ opacity:1; }
  100%{ opacity:0; transform: translate(-50%, -10px) scale(0.95); }
}

.section{
  padding: 20px 28px;
  border-top: 1px solid var(--border);
}
.section-title{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700; font-size: 10px;
  letter-spacing: 1.6px; text-transform: uppercase;
  color: var(--fg-label);
  margin-bottom: 12px;
}

/* Sessions */
.session-item{
  display: grid; grid-template-columns: 56px 1fr auto;
  gap: 12px; align-items: center;
  padding: 12px; margin-bottom: 8px;
  border-radius: 14px;
  background: var(--surface-low);
  border: 1px solid var(--border);
  cursor: pointer;
}
.session-item:hover{ background: var(--surface-medium); }
.session-item .time{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700; font-size: 14px;
}
.session-item .time .type{
  display: block; margin-top: 3px;
  font-size: 8px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--fg-mute);
}
.session-item .title{ font-size: 13px; font-weight: 500; line-height: 1.3; margin-bottom: 3px; }
.session-item .where{
  font-size: 11px; color: var(--fg-mute);
  display: flex; align-items: center; gap: 4px;
}

/* Services + contact */
.chips{ display: flex; flex-wrap: wrap; gap: 8px; }
.chip{
  padding: 7px 14px; border-radius: 99px;
  background: var(--surface-low);
  border: 1px solid var(--border);
  font-family: 'Urbanist', sans-serif;
  font-weight: 500; font-size: 12px;
  color: var(--fg-dim); cursor: pointer;
  user-select: none;
  transition: all 180ms;
}
.chip:hover{ background: var(--surface-medium); color: var(--fg); border-color: var(--border-strong); }
.chip.active{ background: var(--surface-high); color: var(--fg); border-color: var(--accent); }
.msg{
  margin-top: 12px; width: 100%;
  background: var(--surface-low);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  font-family: 'Urbanist', sans-serif; font-size: 13px;
  color: var(--fg); resize: none; outline: 0;
  min-height: 80px;
}
.cta{
  margin-top: 12px; width: 100%;
  padding: 13px; border-radius: 12px;
  border: 0; background: var(--accent);
  color: var(--accent-on);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700; font-size: 13px;
  cursor: pointer;
}
.cta:hover{ opacity: 0.92; }
.cta:disabled{ background: var(--surface-medium); color: var(--fg-mute); cursor: not-allowed; opacity: 0.6; }
.sent-box{
  margin-top: 14px; padding: 14px;
  border-radius: 12px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-glow);
}
.sent-box .head{
  display: flex; align-items: center; gap: 6px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700; font-size: 12px;
  color: var(--accent); margin-bottom: 4px;
}
.sent-box .sub{ font-size: 11px; color: var(--fg-mute); padding-left: 22px; }

/* Trivia */
.trivia-card{
  background: var(--trivia-bg);
  border: 1px solid var(--trivia-border);
  border-radius: 16px;
  padding: 18px;
}
.trivia-progress{ display: flex; gap: 4px; margin-bottom: 12px; }
.trivia-progress .dot{
  flex: 1; height: 3px; border-radius: 2px;
  background: var(--surface-low);
}
.trivia-progress .dot.done{ background: var(--trivia); }
.trivia-progress .dot.current{ background: color-mix(in srgb, var(--trivia) 60%, transparent); }
.trivia-head{ display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.trivia-head .left{
  display: flex; align-items: center; gap: 10px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700; font-size: 13px;
  color: var(--trivia);
}
.trivia-bonus{
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700;
  color: var(--trivia);
  background: color-mix(in srgb, var(--trivia) 15%, transparent);
  padding: 4px 10px; border-radius: 99px;
}
.trivia-q{
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 600; font-size: 14px;
  line-height: 1.4; margin-bottom: 14px;
}
.trivia-opt{
  width: 100%; text-align: left;
  background: var(--surface-low);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px; margin-bottom: 8px;
  font-family: 'Urbanist', sans-serif; font-size: 13px;
  color: var(--fg-dim); cursor: pointer;
  transition: all 180ms;
  display: flex; align-items: center; justify-content: space-between;
}
.trivia-opt:hover:not(.locked){ background: var(--surface-medium); border-color: var(--border-strong); color: var(--fg); }
.trivia-opt.locked{ cursor: default; }
.trivia-opt.correct{ background: color-mix(in srgb, var(--accent) 15%, transparent); border-color: var(--accent); color: var(--accent); font-weight: 600; }
.trivia-opt.wrong{ background: color-mix(in srgb, var(--heart) 15%, transparent); border-color: var(--heart); color: var(--heart); font-weight: 600; }
.trivia-opt.dimmed{ opacity: 0.5; }
.trivia-feedback{
  margin-top: 12px; text-align: center;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700; font-size: 12px;
  color: var(--accent);
}
.trivia-feedback.wrong{ color: var(--heart); }

/* Actions */
.action-row{ display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.action-btn{
  padding: 12px; border-radius: 12px;
  background: var(--surface-low);
  border: 1px solid var(--border);
  color: var(--fg-dim);
  font-family: 'Urbanist', sans-serif;
  font-weight: 600; font-size: 12px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  text-decoration: none;

  search: '',

  shuffleSeed: Math.floor(Math.random() * 100000),
  favorites: new Set([2, 11]),
  contactsSent: new Set([]),
  triviaAnswered: new Map(),
  triviaIndex: new Map(),
  firstMount: true,
};

// ============== Utils ==============
function shuffleWithSeed(arr, seed){
  const copy = [...arr];
  let s = seed;
  for (let i = copy.length - 1; i > 0; i--){
    s = (s * 9301 + 49297) % 233280;
    const j = Math.floor((s / 233280) * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}
function logoFallback(name){ return name.charAt(0).toUpperCase(); }
function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t = setTimeout(()=>fn(...a), ms); }; }

// ============== Wall render (espejo Expo: 3 tier groups con shuffle por tier) ==============
function renderWall(){
  const wall = document.getElementById('wall');
  const q = state.search.trim().toLowerCase();
  const filtered = SPONSORS.filter(s => !q || s.name.toLowerCase().includes(q) || (s.desc||'').toLowerCase().includes(q));

  if (filtered.length === 0){
    wall.innerHTML = `<div class="empty-wall">
      <div class="title">Sin resultados</div>
      <div>No encontramos sponsors con "${state.search}".</div>
    </div>`;
    return;
  }

  let html = '';
  let staggerIdx = 0;
  for (const tier of TIER_ORDER){
    const items = filtered.filter(s => s.tier === tier);
    if (!items.length) continue;
    // Shuffle DENTRO del tier (Expo pattern: equidad por tier)
    const shuffled = q ? items : shuffleWithSeed(items, state.shuffleSeed + tier.charCodeAt(0));

    if (tier === 'platinum'){
      html += `<div class="tier-group"><div class="grid-platinum">`;
      for (const sp of shuffled){
        html += renderPlatinumCard(sp, staggerIdx++);
      }
      html += `</div></div>`;
    } else if (tier === 'gold'){
      html += `<div class="tier-group"><div class="grid-gold">`;
      for (const sp of shuffled){
        html += renderGoldCard(sp, staggerIdx++);
      }
      html += `</div></div>`;
    } else {
      html += `<div class="tier-group"><div class="grid-compact">`;
      for (const sp of shuffled){
        html += renderCompactCard(sp, tier, staggerIdx++);
      }
      html += `</div></div>`;
    }
  }
  wall.innerHTML = html;

  wall.querySelectorAll('[data-id]').forEach(card => {
    card.addEventListener('click', () => selectSponsor(Number(card.dataset.id)));
  });

  // Solo aplica stagger animation en el primer mount, no en shuffles
  if (state.firstMount){
    state.firstMount = false;
  } else {
    // Remueve stagger class para que el siguiente shuffle no haga la entrada pop
    wall.querySelectorAll('.stagger').forEach(el => el.classList.remove('stagger'));
  }
}

function badges(sp){

}

  const sel = state.selectedId === sp.id ? ' selected' : '';

}
function renderGoldCard(sp, idx){
  const sel = state.selectedId === sp.id ? ' selected' : '';
  return `<div class="card-gold stagger${sel}" data-id="${sp.id}" style="animation-delay:${idx*18}ms">

function renderCompactCard(sp, tier, idx){

function selectSponsor(id){
  if (state.selectedId === id){
    state.selectedId = null;
    renderWall();
    renderDetail();

  state.selectedId = id;
  renderWall();
  renderDetail();
}

        <div class="trivia-head">
          <div class="left"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 015.8 1c0 2-3 3-3 3M12 17h.01"/></svg>Trivia completada</div>
          <div class="trivia-bonus"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 15 8.5 22 9.3 17 14.1 18.2 21 12 17.8 5.8 21 7 14.1 2 9.3 9 8.5 12 2"/></svg>${correctCount}/${total} correctas</div>
        </div>
        <div style="color:var(--fg-dim); font-size:12px; line-height:1.5">Gracias por participar!</div>
      </div></div>`;
    } else {
      const t = sp.trivias[cur];
      const answered = state.triviaAnswered.get(t.id);
      triviaHtml = `<div class="section"><div class="trivia-card">
        <div class="trivia-progress">${dots}</div>
        <div class="trivia-head">
          <div class="left"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 015.8 1c0 2-3 3-3 3M12 17h.01"/></svg>Pregunta ${cur+1} de ${total}</div>
          <div class="trivia-bonus"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 15 8.5 22 9.3 17 14.1 18.2 21 12 17.8 5.8 21 7 14.1 2 9.3 9 8.5 12 2"/></svg>+${t.bonus_points} pts</div>
        </div>
        <div class="trivia-q">${t.question}</div>
        ${t.options.map((opt, i) => {
          let cls = 'trivia-opt';
          if (answered){
            cls += ' locked';
            if (i === t.correct_index) cls += ' correct';
            else if (i === answered.selected) cls += ' wrong';
            else cls += ' dimmed';
          }
          return `<button class="${cls}" data-trivia="${t.id}" data-option="${i}" ${answered ? 'disabled':''}>${opt}</button>`;
        }).join('')}
        ${answered ? `<div class="trivia-feedback ${answered.is_correct ? '' : 'wrong'}">${answered.is_correct ? `+${t.bonus_points} puntos · siguiente pregunta...` : 'Respuesta incorrecta · siguiente pregunta...'}</div>` : ''}
      </div></div>`;
    }
  }

  let contactHtml = '';
  if (sp.services?.length){
    if (isContactSent){
      contactHtml = `<div class="section"><div class="sent-box">
        <div class="head"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Solicitud enviada</div>
        <div class="sub">${sp.name} recibira tu perfil y los servicios seleccionados.</div>
      </div></div>`;
    } else {
      contactHtml = `<div class="section">
        <div class="section-title">Que te interesa?</div>
        <div class="chips" id="svcs">${sp.services.map(s => `<div class="chip" data-svc="${s.id}">${s.name}</div>`).join('')}</div>
        <textarea class="msg" placeholder="Cuentales tu interes (opcional)..." maxlength="1000"></textarea>
        <button class="cta" id="ctaContact" disabled>Solicitar contacto</button>
      </div>`;
    }
  }

  let actionsHtml = '';
  const hasWeb = !!sp.website_url;
  const hasEmail = sp.show_contact_button && !!sp.contact_email;
  if (hasWeb || hasEmail){
    actionsHtml = `<div class="section"><div class="action-row">
      ${hasWeb ? `<a class="action-btn" href="${sp.website_url}" target="_blank" rel="noopener"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 010 20 15 15 0 010-20z"/></svg>Sitio web</a>` : ''}
      ${hasEmail ? `<a class="action-btn" href="mailto:${sp.contact_email}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Email</a>` : ''}
    </div></div>`;
  }

  const passportPill = sp.passport_enabled
    ? `<span class="passport-pill"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Pasaporte</span>` : '';

  panel.innerHTML = `<div class="detail-full">
    <div class="detail-head">
      <button class="detail-btn" id="close"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <button class="detail-btn fav ${isFav ? 'on' : ''}" id="favBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      </button>
    </div>
    <div class="hero">
      <div class="points-toast"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15 8.5 22 9.3 17 14.1 18.2 21 12 17.8 5.8 21 7 14.1 2 9.3 9 8.5 12 2"/></svg>+${sp.visit_points} puntos por visitar</div>
      ${logoNode(sp)}
      <div class="name">${sp.name}${passportPill}</div>
      <div class="tier-pill">${TIER_LABELS[sp.tier]}</div>
      ${sp.desc ? `<div class="desc">${sp.desc}</div>` : ''}
    </div>
    ${sessionsHtml}
    ${triviaHtml}
    ${contactHtml}
    ${actionsHtml}
  </div>`;

  document.getElementById('close').onclick = () => selectSponsor(sp.id);
  const favBtn = document.getElementById('favBtn');
  favBtn.onclick = () => {
    if (state.favorites.has(sp.id)) state.favorites.delete(sp.id);
    else state.favorites.add(sp.id);
    favBtn.querySelector('svg').classList.add('heart-pop');
    setTimeout(() => favBtn.querySelector('svg').classList.remove('heart-pop'), 360);
    renderDetail();
  };
  if (sp.services?.length && !isContactSent){
    const chips = panel.querySelectorAll('#svcs .chip');
    const cta = document.getElementById('ctaContact');
    let sel = new Set();
    const refresh = () => {
      const n = sel.size;
      cta.disabled = n === 0;
      cta.textContent = n === 0 ? 'Solicitar contacto' : `Enviar solicitud (${n})`;
    };
    chips.forEach(chip => {
      chip.onclick = () => {
        const id = chip.dataset.svc;
        if (sel.has(id)){ sel.delete(id); chip.classList.remove('active'); }
        else { sel.add(id); chip.classList.add('active'); }
        refresh();
      };
    });
    cta.onclick = () => { state.contactsSent.add(sp.id); renderDetail(); };
  }
  panel.querySelectorAll('.trivia-opt:not(.locked)').forEach(opt => {
    opt.onclick = () => {
      const tId = Number(opt.dataset.trivia);
      const optIdx = Number(opt.dataset.option);
      const t = sp.trivias.find(x => x.id === tId);
      const isCorrect = optIdx === t.correct_index;
      state.triviaAnswered.set(tId, { selected: optIdx, is_correct: isCorrect });
      renderDetail();
      setTimeout(() => {
        const c = state.triviaIndex.get(sp.id) ?? 0;
        if (c < sp.trivias.length - 1) state.triviaIndex.set(sp.id, c + 1);
        renderDetail();
      }, 1800);
    };
  });
}

// ============== Search ==============
document.getElementById('search').addEventListener('input', debounce((e) => {
  state.search = e.target.value;
  renderWall();
}, 250));

// ============== Living shuffle 7s (DENTRO de cada tier — Expo pattern) ==============
setInterval(() => {
  if (state.search) return;
  state.shuffleSeed = Math.floor(Math.random() * 100000);
  renderWall();
}, 7000);

// ============== Theme toggle ==============
document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.dataset.theme = document.body.dataset.theme === 'noir' ? 'lux' : 'noir';
});

// ============== Init ==============
renderWall();
renderDetail();
</script>
</body>
</html>
