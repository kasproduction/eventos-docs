<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Agenda — Spatial Shell W.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Urbanist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-sunken:#0a0a0a;
    --bg-elevated:#141414;
    --bg-raised:#1c1c1c;
    --bg-overlay:#222222;
    --border:rgba(255,255,255,0.08);
    --border-strong:rgba(255,255,255,0.14);
    --fg:#f5f5f4;
    --fg-dim:#a8a8a3;
    --fg-mute:#6b6b66;
    /* === ACCENT del tema (per-evento). Se sobrescribe via JS / Tweaks === */
    --accent:#7CFFB2;
    --accent-soft:rgba(124,255,178,0.16);
    --accent-glow:rgba(124,255,178,0.25);
    --accent-shadow:rgba(124,255,178,0.6);
    --accent-on:#0a0a0a;       /* texto sobre accent */
    --indigo:#7C7CFF;
    --indigo-dim:rgba(124,124,255,0.16);
    --emerald:#34d399;
    --rose:#ff5d6c;
    --gold:#f5c66c;
    --canvas-card-shadow: 0 30px 80px -20px rgba(0,0,0,0.7), 0 1px 0 rgba(255,255,255,0.04) inset;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-sunken);color:var(--fg);font-family:'Urbanist',system-ui,sans-serif;overflow:hidden;height:100%}
  body{
    background:
      radial-gradient(1200px 700px at 20% 10%, rgba(124,255,178,0.05), transparent 60%),
      radial-gradient(900px 600px at 90% 90%, rgba(124,124,255,0.04), transparent 60%),
      var(--bg-sunken);
  }
  .stage{
    min-height:100vh; width:100%;
    display:flex;align-items:center;justify-content:center;
    padding:28px 36px 28px 96px;
  }

  /* ============ SIDEBAR ============ */
  .sidebar{
    position:fixed; left:18px; top:50%; transform:translateY(-50%);
    width:52px; padding:10px 6px;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    background:rgba(20,20,20,0.85);
    border:1px solid var(--border);
    border-radius:28px;
    backdrop-filter:blur(20px);
    box-shadow: 0 20px 50px -10px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.04) inset;
    z-index:50;
  }
  .sb-item{
    width:40px;height:40px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    color:var(--fg-mute); cursor:pointer; position:relative;
    transition:all .2s ease;
  }
  .sb-item:hover{color:var(--fg);background:rgba(255,255,255,0.04)}
  .sb-item.active{color:var(--fg);background:rgba(255,255,255,0.06)}
  .sb-item.active::before{
    content:""; position:absolute; left:-9px; top:50%; transform:translateY(-50%);
    width:3px; height:18px; border-radius:2px; background:var(--accent);
    box-shadow:0 0 12px var(--accent-shadow);
  }
  .sb-logo{
    width:36px;height:36px;border-radius:10px;
    background:linear-gradient(135deg,#fff,#cfcfcf);
    color:#0a0a0a;font-weight:800;font-family:'Plus Jakarta Sans';font-size:15px;
    display:flex;align-items:center;justify-content:center;margin-bottom:4px;
  }
  .sb-sep{width:24px;height:1px;background:var(--border);margin:4px 0}
  .sb-badge{
    position:absolute;top:6px;right:6px;
    width:8px;height:8px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 2px var(--bg-elevated), 0 0 8px var(--accent-shadow);
  }
  .sb-live{
    position:absolute;top:8px;right:8px;width:6px;height:6px;border-radius:50%;
    background:var(--accent); box-shadow:0 0 0 3px var(--accent-glow);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.6}}

  /* ============ CARD RAIZ ============ */
  .card{
    width: min(1600px, calc(100vw - 150px), calc((100vh - 80px) * 16 / 9));
    aspect-ratio: 16/9;
    border-radius:26px;
    background:
      radial-gradient(800px 500px at 20% 20%, color-mix(in oklab, var(--accent) 6%, transparent), transparent 65%),
      radial-gradient(700px 500px at 80% 90%, rgba(124,124,255,0.04), transparent 60%),
      var(--bg-elevated);
    border:1px solid var(--border);
    box-shadow:var(--canvas-card-shadow);
    overflow:hidden;
    position:relative;
    display:block;
  }

  /* ============ MODULE STAGE (escenario dentro del card) ============ */
  .module-stage{
    position:absolute; inset:0;
    display:grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: clamp(14px, 1.4vw, 22px);
    padding: clamp(16px, 1.6vw, 26px);
    align-items:stretch;
  }

  /* When detail is closed, agenda lives left, right side is empty (with hint) */
  .module-stage.solo{
    grid-template-columns: minmax(0, min(540px, 42%)) 1fr;
  }
  .module-stage.solo .empty-hint{
    display:flex; align-items:center; justify-content:center;
    color:var(--fg-mute); font-size:13px; letter-spacing:0.04em;
    flex-direction:column; gap:14px; text-align:center; padding:40px;
    opacity:.6;
  }
  .module-stage.solo .empty-hint .glyph{
    width:60px;height:60px;border-radius:18px;
    border:1.5px dashed var(--border-strong);
    display:flex;align-items:center;justify-content:center;
  }
  .module-stage:not(.solo) .empty-hint{display:none}

  .module-card{
    background:var(--bg-elevated);
    border:1px solid var(--border);
    border-radius:22px;
    overflow:hidden;
    display:flex; flex-direction:column;
    min-height:0; min-width:0;
    box-shadow: 0 16px 40px -16px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.04) inset;
  }
  body[data-theme="lux"] .module-card{
    background:#ffffff;
    box-shadow: 0 16px 40px -16px rgba(0,0,0,0.12), 0 1px 0 rgba(255,255,255,0.6) inset;
  }

  /* ============ AGENDA LAYOUT ============ */
  .agenda-root{
    flex:1; display:flex; flex-direction:column;
    min-width:0; min-height:0; position:relative;
  }
  .agenda-header{
    padding: clamp(16px, 1.6vw, 24px) clamp(18px, 1.8vw, 26px) 0;
    display:flex; flex-direction:column; gap: clamp(10px, 1.1vw, 16px);
  }
  .agenda-toprow{
    display:flex; align-items:flex-end; justify-content:space-between; gap:24px;
  }
  .agenda-title{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:800; letter-spacing:-0.02em;
    font-size:clamp(22px, 1.8vw, 30px); line-height:1; margin:0;
  }
  .agenda-sub{ color:var(--fg-dim); font-size:clamp(11px, 0.8vw, 13px); margin-top:5px; letter-spacing:0.01em }
  .agenda-tabs{
    display:flex; gap:4px; padding:4px; border-radius:14px;
    background:var(--bg-raised); border:1px solid var(--border);
  }
  .agenda-tab{
    padding:8px 16px; font-size:13px; font-weight:600; color:var(--fg-dim);
    background:transparent; border:none; border-radius:10px; cursor:pointer;
    font-family:'Urbanist',sans-serif; letter-spacing:0.01em;
    transition:all .2s ease; display:flex; align-items:center; gap:8px;
  }
  .agenda-tab:hover{color:var(--fg)}
  .agenda-tab.active{ background:var(--fg); color:#0a0a0a }
  .tab-count{
    font-size:11px; padding:2px 7px; border-radius:99px; font-weight:700;
    background:rgba(255,255,255,0.06); color:var(--fg-dim);
  }
  .agenda-tab.active .tab-count{ background:rgba(0,0,0,0.12); color:#0a0a0a }

  /* ============ DATE STRIP ============ */
  .date-strip{
    display:flex; gap:10px; align-items:center; flex-wrap:nowrap;
  }
  .date-pill{
    flex:0 0 auto;
    width:50px; height:62px; border-radius:18px;
    background:var(--bg-raised); border:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; position:relative; overflow:hidden;
    transition:all .25s ease; color:var(--fg-mute);
    font-family:'Plus Jakarta Sans';
  }
  .date-pill .dp-dow{ font-size:9px; font-weight:700; letter-spacing:0.12em; opacity:.7 }
  .date-pill .dp-day{ font-size:19px; font-weight:800; margin-top:1px; color:var(--fg-dim) }
  .date-pill:hover{ border-color:var(--border-strong); color:var(--fg) }
  .date-pill:hover .dp-day{color:var(--fg)}
  .date-pill.has-events::after{
    content:""; position:absolute; bottom:8px; width:5px; height:5px; border-radius:50%; background:var(--accent); opacity:.85;
  }
  .date-pill.active{
    background:var(--accent); border-color:transparent; color:var(--accent-on);
    box-shadow:0 8px 22px -6px var(--accent-shadow);
  }
  .date-pill.active .dp-dow{opacity:1}
  .date-pill.active .dp-day{color:var(--accent-on)}
  .date-pill.active::after{background:var(--accent-on); opacity:.45}

  .date-actions{
    margin-left:auto; display:flex; gap:8px; align-items:center;
  }
  .date-btn{
    width:34px;height:34px;border-radius:11px;
    background:var(--bg-raised); border:1px solid var(--border); color:var(--fg-dim);
    display:flex;align-items:center;justify-content:center;cursor:pointer; transition:all .2s ease;
  }
  .date-btn:hover{color:var(--fg);border-color:var(--border-strong)}
  .gear-btn{
    width:38px;height:38px;border-radius:50%;
    background:var(--accent); color:var(--accent-on); border:none;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 6px 18px -4px var(--accent-shadow);
    transition:all .25s ease;
  }
  .gear-btn:hover{ transform:translateY(-1px); box-shadow:0 10px 22px -4px var(--accent-shadow); }

  /* filter chips */
  .chip-row{
    display:flex; gap:8px; flex-wrap:nowrap; overflow-x:auto;
    padding-bottom:2px; scrollbar-width:none;
  }
  .chip-row::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;
    padding:7px 14px; font-size:12.5px; font-weight:600;
    border-radius:99px; background:var(--bg-raised); border:1px solid var(--border);
    color:var(--fg-dim); cursor:pointer; display:flex; align-items:center; gap:7px;
    font-family:'Urbanist'; transition:all .2s ease;
  }
  .chip:hover{color:var(--fg);border-color:var(--border-strong)}
  .chip.active{ background:var(--fg); color:#0a0a0a; border-color:transparent }
  .chip-dot{ width:6px;height:6px;border-radius:50%; }

  /* ============ TIMELINE LIST ============ */
  .agenda-body{
    flex:1; min-height:0; padding: clamp(12px,1.2vw,18px) clamp(18px,1.8vw,26px) clamp(16px,1.6vw,24px);
    overflow-y:auto; overflow-x:hidden;
    scroll-behavior:smooth;
  }
  .agenda-body::-webkit-scrollbar{width:6px}
  .agenda-body::-webkit-scrollbar-track{background:transparent}
  .agenda-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}

  .timeline-item{
    display:grid; grid-template-columns: 64px 1fr; gap:12px;
    padding:5px 0;
  }
  .ti-time{
    padding-top:16px;
    color:var(--fg-mute); font-size:11.5px; font-family:'JetBrains Mono'; letter-spacing:-0.02em;
    position:relative;
  }
  .ti-time .dot{
    position:absolute; right:-3px; top:24px;
    width:8px;height:8px;border-radius:50%; background:var(--fg-mute);
  }
  .timeline-item.live .ti-time{color:var(--accent)}
  .timeline-item.live .ti-time .dot{
    background:var(--accent); box-shadow:0 0 0 3px var(--accent-glow);
    animation:pulse 1.6s ease-in-out infinite;
  }
  .timeline-item.past .ti-time{color:var(--fg-mute);opacity:.6}
  .timeline-item.past .ti-time .dot{background:var(--fg-mute);opacity:.5}

  .session-card{
    background:var(--bg-raised); border:1px solid var(--border);
    border-radius:18px; padding:14px 16px;
    cursor:pointer; transition:all .25s cubic-bezier(.2,.8,.2,1);
    position:relative;
  }
  .session-card:hover{
    background:#212121; border-color:var(--border-strong);
    transform:translateX(2px);
  }
  .session-card.selected{
    background:#262626; border-color:var(--accent-glow);
    box-shadow:0 0 0 1px var(--accent-glow), 0 12px 30px -10px rgba(0,0,0,0.5);
  }
  .timeline-item.past .session-card{ opacity:0.55 }
  .timeline-item.past .session-card .sc-title{ text-decoration:line-through; text-decoration-thickness:1px; text-decoration-color:rgba(255,255,255,0.4) }

  .sc-row1{ display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap }
  .sc-tag{
    font-size:11px; font-weight:700; padding:4px 10px; border-radius:99px;
    letter-spacing:0.04em; display:inline-flex; align-items:center; gap:6px;
    font-family:'Urbanist';
  }
  .sc-tag.tech{ background:rgba(124,124,255,0.16); color:#a8a8ff }
  .sc-tag.business{ background:rgba(52,211,153,0.16); color:#5eead4 }
  .sc-tag.innovation{ background:rgba(245,198,108,0.16); color:#f5c66c }
  .sc-tag.leadership{ background:rgba(255,93,108,0.16); color:#ff8a96 }
  .sc-tag.live{ background:var(--accent-soft); color:var(--accent) }
  .sc-tag.live::before{
    content:""; width:6px;height:6px;border-radius:50%;background:var(--accent);
    animation:pulse 1.6s ease-in-out infinite;
  }
  .sc-checkmark{
    width:18px;height:18px;border-radius:50%; border:1.5px solid var(--fg-mute);
    display:inline-flex;align-items:center;justify-content:center; flex-shrink:0;
  }
  .timeline-item.past .sc-checkmark{ border-color:var(--accent); background:var(--accent) }
  .timeline-item.past .sc-checkmark svg{ stroke:var(--accent-on) }

  .sc-title{
    font-family:'Plus Jakarta Sans'; font-weight:700; font-size:14.5px; line-height:1.3;
    margin:0 0 8px 0; letter-spacing:-0.01em;
  }
  .sc-meta{ display:flex; align-items:center; gap:6px; color:var(--fg-dim); font-size:12px; margin:5px 0 }
  .sc-meta svg{ flex-shrink:0; opacity:.8 }

  .sc-speakers{ display:flex; align-items:center; gap:10px; margin-top:8px }
  .avatar-stack{ display:flex; }
  .avatar{
    width:24px;height:24px;border-radius:50%;
    border:2px solid var(--bg-raised); margin-left:-7px;
    background-size:cover;background-position:center;
    flex-shrink:0;
  }
  .avatar:first-child{margin-left:0}
  .session-card.selected .avatar{ border-color:#262626 }
  .sc-speakers-text{ color:var(--fg-dim); font-size:12px; }

  .sc-actions{ display:flex; align-items:center; gap:10px; margin-top:14px }
  .sc-btn{
    padding:8px 14px; border-radius:99px; font-size:12.5px; font-weight:600;
    background:rgba(245,198,108,0.10); color:var(--gold);
    border:none; cursor:pointer; display:inline-flex; align-items:center; gap:7px;
    font-family:'Urbanist'; transition:all .2s ease;
  }
  .sc-btn:hover{ background:rgba(245,198,108,0.18) }
  .sc-btn.cal{ background:rgba(255,255,255,0.06); color:var(--fg) }
  .sc-btn.cal:hover{ background:rgba(255,255,255,0.10) }

  .sc-fav{
    position:absolute; top:18px; right:18px;
    width:32px;height:32px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer; transition:all .2s ease;
    background:transparent; border:none; color:var(--fg-mute);
  }
  .sc-fav:hover{ background:rgba(255,255,255,0.06); color:var(--fg) }
  .sc-fav.active{ color:var(--rose) }

  /* description preview for live cards */
  .sc-desc{
    color:var(--fg-dim); font-size:13.5px; line-height:1.5; margin:0 0 8px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }

  /* ============ DETAIL PANEL (module-card) ============ */
  .detail-panel{
    display:flex; flex-direction:column;
    min-height:0; min-width:0;
    opacity:0; transform: translateX(40px) scale(.98);
    transition: opacity .35s ease, transform .42s cubic-bezier(.2,.8,.2,1);
    pointer-events:none;
  }
  .detail-panel.open{ opacity:1; transform:translateX(0) scale(1); pointer-events:auto }

  .dp-header{
    display:flex; align-items:center; gap:10px;
    padding: clamp(14px,1.4vw,20px) clamp(16px,1.6vw,22px) 10px;
    border-bottom:1px solid var(--border);
  }
  .dp-back{
    width:36px;height:36px;border-radius:50%;
    background:rgba(255,255,255,0.06); border:none; cursor:pointer;
    display:flex;align-items:center;justify-content:center; color:var(--fg);
    transition:all .2s ease;
  }
  .dp-back:hover{ background:rgba(255,255,255,0.10) }
  .dp-headtitle{ font-size:14px; color:var(--fg-dim); flex:1; text-align:center; letter-spacing:0.04em }
  .dp-headspace{ width:36px }

  .dp-body{
    flex:1; overflow-y:auto;
    padding: clamp(14px,1.5vw,22px) clamp(16px,1.6vw,22px);
  }
  .dp-body::-webkit-scrollbar{width:6px}
  .dp-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}

  .dp-tag{
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 12px; border-radius:99px;
    background:rgba(124,124,255,0.16); color:#a8a8ff;
    font-size:12px; font-weight:700;
  }
  .dp-tag .dot{ width:6px;height:6px;border-radius:50%;background:#a8a8ff }
  .dp-title{
    font-family:'Plus Jakarta Sans'; font-weight:800;
    font-size:clamp(20px, 1.8vw, 28px); line-height:1.1; letter-spacing:-0.02em;
    margin:12px 0 14px;
  }

  .dp-meta-card{
    background:var(--bg-raised); border:1px solid var(--border);
    border-radius:14px; padding:14px 16px;
    display:flex; flex-direction:column; gap:10px;
  }
  .dp-meta-row{ display:flex; align-items:center; gap:10px; color:var(--fg); font-size:13px }
  .dp-meta-row svg{ color:var(--fg-mute); flex-shrink:0 }

  .dp-action-row{
    display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:14px;
  }
  .dp-action{
    padding:11px; border-radius:13px;
    background:var(--bg-raised); border:1px solid var(--border);
    color:var(--fg); cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:7px;
    font-family:'Urbanist'; font-weight:600; font-size:13px;
    transition:all .2s ease;
  }
  .dp-action:hover{ border-color:var(--border-strong); background:#222 }
  .dp-action.fav.active{
    background:rgba(255,93,108,0.10); border-color:rgba(255,93,108,0.35);
    color:var(--rose);
  }
  .dp-action.fav.active svg{ fill:var(--rose); stroke:var(--rose) }

  .dp-section-title{
    text-transform:uppercase; letter-spacing:0.14em;
    font-size:10.5px; font-weight:700; color:var(--fg-mute);
    margin:18px 0 8px;
  }
  .dp-about{
    background:var(--bg-raised); border:1px solid var(--border);
    border-radius:13px; padding:13px 15px;
    color:var(--fg-dim); line-height:1.5; font-size:13px;
  }

  .dp-speaker-row{
    display:flex; align-items:center; gap:12px;
    padding:10px 12px;
    background:var(--bg-raised); border:1px solid var(--border);
    border-radius:13px; margin-bottom:6px; cursor:pointer;
    transition:all .2s ease;
  }
  .dp-speaker-row:hover{ background:#212121; border-color:var(--border-strong) }
  .dp-speaker-row .avatar{ width:38px;height:38px; margin:0; border:none; flex-shrink:0 }
  .dp-speaker-info{ flex:1; min-width:0 }
  .dp-speaker-name{ font-family:'Plus Jakarta Sans'; font-weight:700; font-size:13.5px; margin:0 }
  .dp-speaker-role{ color:var(--fg-dim); font-size:11.5px; margin-top:2px }
  .dp-speaker-row svg.chev{ color:var(--fg-mute); flex-shrink:0 }

  /* Empty state for Mi Agenda */
  .empty-state{
    flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column;
    text-align:center; padding:40px; color:var(--fg-dim);
  }
  .empty-state h3{ font-family:'Plus Jakarta Sans'; font-weight:700; color:var(--fg); margin:8px 0 6px; font-size:18px }
  .empty-state p{ font-size:13px; max-width:300px; line-height:1.5; margin:0 }

  /* ============ TWEAKS toggle hint ============ */
  .hint{
    position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    font-family:'JetBrains Mono'; font-size:11px; color:var(--fg-mute);
    letter-spacing:0.04em; pointer-events:none; z-index:1;
  }
  .hint kbd{
    background:var(--bg-raised); padding:2px 6px; border-radius:4px;
    border:1px solid var(--border); color:var(--fg-dim);
  }

  /* Theme: Lux (light) */
  body[data-theme="lux"]{
    background:

<script type="text/babel">
  const { useEffect } = React;

  function AppTweaks(){
    const [tweaks, setTweak] = useTweaks({
      preset: THEMES.preset,
      mode: THEMES.mode,
    });

    useEffect(()=>{
      THEMES.preset = tweaks.preset;
      THEMES.mode = tweaks.mode;
      applyTheme();
    }, [tweaks.preset, tweaks.mode]);

    return (
      <TweaksPanel title="Tweaks">
        <TweakSection title="Tema del evento" description="El accent es propio del evento. Cambia el preset y todos los componentes (live dot, fechas, glow, sidebar) se reactualizan.">
          <TweakRadio
            label="Modo"
            value={tweaks.mode}
            onChange={(v)=>setTweak('mode', v)}
            options={[
              { value:'noir', label:'Noir' },
              { value:'lux',  label:'Lux' },
            ]}
          />
          <TweakSelect
            label="Accent"
            value={tweaks.preset}
            onChange={(v)=>setTweak('preset', v)}
            options={Object.entries(PRESETS).map(([k,v])=>({ value:k, label:v.label }))}
          />
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:8}}>
            {Object.entries(PRESETS).map(([k,v])=>(
              <button
                key={k}
                onClick={()=>setTweak('preset', k)}
                title={v.label}
                style={{
                  width:28,height:28,borderRadius:'50%',
                  background:v.accent,
                  border: tweaks.preset===k ? '2px solid #fff' : '2px solid rgba(255,255,255,0.1)',
                  cursor:'pointer', padding:0,
                  boxShadow: tweaks.preset===k ? `0 0 0 2px ${v.accent}55` : 'none',
                }}
              />
            ))}
          </div>
        </TweakSection>
      </TweaksPanel>
    );
  }

  const tweakRoot = document.createElement('div');
  document.body.appendChild(tweakRoot);
  ReactDOM.createRoot(tweakRoot).render(<AppTweaks />);
</script>

      state.tab = t.dataset.tab;
      // titles
      document.getElementById('title').textContent = state.tab==='mine' ? 'Mi Agenda' : 'Agenda';
      renderTabs();
      renderList();
    };
  });
}

function renderList(){
  const body = document.getElementById('agendaBody');

    body.innerHTML = `<div class="empty-state">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.4">

    return;
  }

    c.onclick = (e)=>{
      if(e.target.closest('.sc-fav') || e.target.closest('.sc-btn')) return;
      openPanel(c.dataset.id);

  return `<div class="timeline-item ${s.state} ${state.selectedId===s.id?'is-selected':''}">

        ${isLive ? `<span class="sc-tag live">EN VIVO</span>` : ''}

      </div>
      <h3 class="sc-title">${s.title}</h3>
      ${isLive ? `<p class="sc-desc">${s.about}</p>`: ''}
      <div class="sc-meta">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${escIcon('location')}</svg>
        ${s.room}
      </div>
      <div class="sc-speakers">
        <div class="avatar-stack">
          ${speakers.slice(0,3).map(p=>`<div class="avatar" style="background-image:url('${p.avatar}')"></div>`).join('')}
        </div>
        <span class="sc-speakers-text">${truncated}</span>
      </div>
      ${(isPast && s.evaluable) ? `<div class="sc-actions"><button class="sc-btn" onclick="event.stopPropagation()"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">${escIcon('star')}</svg> Evaluar</button></div>`:''}
      ${(state.tab==='mine' && !isPast) ? `<div class="sc-actions"><button class="sc-btn cal" onclick="event.stopPropagation()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4M12 13v4M10 15h4"/></svg> Calendario</button></div>`:''}
    </div>
  </div>`;
}

/* ---------- DETAIL PANEL ---------- */
const panel = document.getElementById('detailPanel');
const dpBody = document.getElementById('dpBody');

function openPanel(id){
  const stage = document.getElementById('moduleStage');
  // if same one already open: close
  if(state.selectedId===id && panel.classList.contains('open')){
    closePanel(); return;
  }
  // if another one is open: animate swap (slide out then in)
  if(panel.classList.contains('open')){
    panel.classList.remove('open');
    setTimeout(()=>{
      state.selectedId = id;
      renderDetail(id);
      renderList();
      requestAnimationFrame(()=>panel.classList.add('open'));
    }, 380);
  } else {
    state.selectedId = id;
    renderDetail(id);
    renderList();
    stage.classList.remove('solo');
    requestAnimationFrame(()=>panel.classList.add('open'));
  }
}

function closePanel(){
  const stage = document.getElementById('moduleStage');
  panel.classList.remove('open');
  setTimeout(()=>{ state.selectedId=null; stage.classList.add('solo'); renderList(); }, 380);
}

function renderDetail(id){
  const s = SESSIONS.find(x=>x.id===id);
  if(!s) return;
  const tagLabel = {tech:'Tecnología', business:'Negocios', innovation:'Innovación', leadership:'Liderazgo'}[s.cat];
  const tagColor = {tech:'#a8a8ff', business:'#5eead4', innovation:'#f5c66c', leadership:'#ff8a96'}[s.cat];
  const tagBg = {tech:'rgba(124,124,255,0.16)', business:'rgba(52,211,153,0.16)', innovation:'rgba(245,198,108,0.16)', leadership:'rgba(255,93,108,0.16)'}[s.cat];
  const dateLabel = WEEK.find(w=>w.day===state.date)?.label || '';
  const speakers = s.speakers.map(sid=>SPEAKERS[sid]);

  dpBody.innerHTML = `
    <div class="dp-content-wrap">
      <span class="dp-tag" style="background:${tagBg};color:${tagColor}">
        <span class="dot" style="background:${tagColor}"></span>${tagLabel}
      </span>
      <h2 class="dp-title">${s.title}</h2>
      <div class="dp-meta-card">
        <div class="dp-meta-row">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${escIcon('cal')}</svg>
          ${dateLabel}
        </div>
        <div class="dp-meta-row">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${escIcon('clock')}</svg>
          ${s.time} – ${s.timeEnd}
        </div>
        <div class="dp-meta-row">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${escIcon('location')}</svg>
          ${s.room}
        </div>
      </div>

      <div class="dp-action-row">
        <button class="dp-action fav ${s.fav?'active':''}" id="dpFav">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="${s.fav?'currentColor':'none'}" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${escIcon('heart')}</svg>
          ${s.fav?'Favorita':'Favorita'}
        </button>
        <button class="dp-action">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4M12 13v4M10 15h4"/></svg>
          Calendario
        </button>
      </div>

      <div class="dp-section-title">Acerca de</div>
      <div class="dp-about">${s.about}</div>

      <div class="dp-section-title">Speakers</div>
      ${speakers.map(p=>`
        <div class="dp-speaker-row">
          <div class="avatar" style="background-image:url('${p.avatar}')"></div>
          <div class="dp-speaker-info">
            <div class="dp-speaker-name">${p.name}</div>
            <div class="dp-speaker-role">${p.role}</div>
          </div>
          <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${escIcon('chev')}</svg>
        </div>
      `).join('')}
    </div>
  `;

  document.getElementById('dpFav').onclick = ()=>{
    s.fav = !s.fav;
    renderTabs();
    renderList();
    renderDetail(id);
  };
}

document.getElementById('dpClose').onclick = closePanel;

/* ---------- KEYBOARD ---------- */
document.addEventListener('keydown', (e)=>{
  if(e.key==='Escape' && panel.classList.contains('open')) { closePanel(); return; }
  if(!['ArrowDown','ArrowUp'].includes(e.key)) return;
  const items = visibleSessions();
  if(items.length===0) return;
  const idx = state.selectedId ? items.findIndex(s=>s.id===state.selectedId) : -1;
  let next = idx;
  if(e.key==='ArrowDown') next = idx<0 ? 0 : Math.min(items.length-1, idx+1);
  if(e.key==='ArrowUp')   next = idx<0 ? 0 : Math.max(0, idx-1);
  if(items[next]) {
    e.preventDefault();
    openPanel(items[next].id);
    // scroll into view in list
    const card = document.querySelector(`.session-card[data-id="${items[next].id}"]`);
    if(card){
      const body = document.getElementById('agendaBody');
      const r = card.getBoundingClientRect();
      const br = body.getBoundingClientRect();
      if(r.top < br.top || r.bottom > br.bottom){
        body.scrollTop += (r.top - br.top) - 80;
      }
    }
  }
});

/* ---------- INIT ---------- */

renderDateStrip();
renderChips();
renderList();

/* ---------- THEME / ACCENT (per-evento) ---------- */
const THEMES = /*EDITMODE-BEGIN*/{
  "preset": "rojo",
  "mode": "noir"
}/*EDITMODE-END*/;

const PRESETS = {
  verde:    { accent:'#7CFFB2', on:'#0a0a0a', label:'Verde Lima' },
  rojo:     { accent:'#FF3D55', on:'#ffffff', label:'Rojo Pasión' },
  violeta:  { accent:'#A78BFA', on:'#0a0a0a', label:'Violeta' },
  ambar:    { accent:'#F5C66C', on:'#0a0a0a', label:'Ámbar' },
  cyan:     { accent:'#22D3EE', on:'#0a0a0a', label:'Cyan' },
  magenta:  { accent:'#EC4899', on:'#ffffff', label:'Magenta' },
  indigo:   { accent:'#6366F1', on:'#ffffff', label:'Índigo' },
};

function hexToRgba(hex, a){
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16);
  const g = parseInt(h.substring(2,4),16);
  const b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

function applyTheme(){
  const p = PRESETS[THEMES.preset] || PRESETS.verde;
  const r = document.documentElement.style;
  r.setProperty('--accent', p.accent);
  r.setProperty('--accent-on', p.on);
  r.setProperty('--accent-soft', hexToRgba(p.accent, 0.16));
  r.setProperty('--accent-glow', hexToRgba(p.accent, 0.28));
  r.setProperty('--accent-shadow', hexToRgba(p.accent, 0.55));
  document.body.dataset.theme = THEMES.mode;
}
applyTheme();
</script>
