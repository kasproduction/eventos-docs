<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>W.5 Speakers — DaVinci v2 (espejo Expo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-sunken:#0a0a0a;
  --bg-elevated:#141414;
  --surface-low:#1a1a1a;
  --surface-medium:#1f1f1f;
  --surface-high:#262626;
  --surface-card:#181818;
  --border:rgba(255,255,255,0.06);
  --border-strong:rgba(255,255,255,0.12);
  --fg:#f5f5f4;
  --fg-dim:#a8a8a3;
  --fg-mute:#6b6b66;
  --fg-label:#5a5a55;

  --gold:#B5A68B;
  --gold-soft:rgba(181,166,139,0.45);
  --gold-bg:rgba(181,166,139,0.10);
  --gold-bg-strong:rgba(181,166,139,0.16);
  --gold-border:rgba(181,166,139,0.20);

  --linkedin:#0A66C2;

  /* Session types — del mobile speaker/[id].tsx TYPE_COLORS */
  --st-keynote:#a882ff;
  --st-panel:#64c8ff;
  --st-workshop:#ffb464;
  --st-lightning:#ff7eb3;

  --canvas-shadow: 0 30px 80px -20px rgba(0,0,0,0.7);

  --spring-soft: cubic-bezier(0.34, 1.36, 0.64, 1);
  --spring-snap: cubic-bezier(0.16, 1.2, 0.3, 1);
  --ease-out:    cubic-bezier(0.4, 0, 0.2, 1);
}

body[data-theme="lux"]{
  --bg-sunken:#F6F8FA;
  --bg-elevated:#FFFFFF;
  --surface-low:#FFFFFF;
  --surface-medium:rgba(0,0,0,0.03);
  --surface-high:rgba(0,0,0,0.06);
  --surface-card:#FFFFFF;
  --border:rgba(0,0,0,0.08);
  --border-strong:rgba(0,0,0,0.14);
  --fg:#1A1B1E;
  --fg-dim:#4A4B50;
  --fg-mute:#7C7D82;
  --fg-label:#A8A9AE;
  --canvas-shadow: 0 16px 48px rgba(0,0,0,0.12);

  --shadow-sm: 0 2px 6px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 8px 20px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg: 0 16px 36px rgba(0,0,0,0.12), 0 6px 12px rgba(0,0,0,0.06);

  --gold:#8E8170;
  --gold-soft:rgba(142,129,112,0.55);
  --gold-bg:rgba(142,129,112,0.10);
  --gold-bg-strong:rgba(142,129,112,0.16);
  --gold-border:rgba(142,129,112,0.22);
}

body[data-theme="lux"] .speakers-card{ background: transparent; border:0; box-shadow:none }
body[data-theme="lux"] .sp-row{
  background: var(--surface-card);
  border-color: transparent;
  box-shadow: var(--shadow-sm);
}
body[data-theme="lux"] .sp-row:hover{
  background: var(--surface-card);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
/* Lux glass blur en featured cards — replica BlurView intensity={30} del movil */
body[data-theme="lux"] .feat-card{
  background: rgba(255,255,255,0.55);
  -webkit-backdrop-filter: blur(30px) saturate(140%);
  backdrop-filter: blur(30px) saturate(140%);
  border: 1px solid rgba(255,255,255,0.75);
  box-shadow: var(--shadow-lg);
}
body[data-theme="lux"] .feat-card:hover{
  background: rgba(255,255,255,0.65);
  transform: translateY(-2px);
}
body[data-theme="lux"] .feat-card.selected{
  border-color: var(--border-strong);
  box-shadow: var(--shadow-lg);
}
body[data-theme="lux"] .ag-back{ background:#fff; box-shadow: var(--shadow-sm) }
body[data-theme="lux"] .sp-search{
  background: #fff;
  border: 0;
  box-shadow: var(--shadow-sm);
}
body[data-theme="lux"] .detail{
  border-color: transparent;
  box-shadow: var(--shadow-lg);
}
body[data-theme="lux"] .dp-bio,
body[data-theme="lux"] .dp-session{
  background: #ffffff;
  border-color: transparent;
  box-shadow: var(--shadow-sm);
}
body[data-theme="lux"] .dp-linkedin{
  background: var(--linkedin); color: #fff;
  box-shadow: var(--shadow-sm);
}
body[data-theme="lux"] .empty-hint{
  background: #ffffff;
  border: 1px dashed var(--border-strong);
  box-shadow: var(--shadow-sm);
}

*{box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{margin:0;padding:0;background:var(--bg-sunken);color:var(--fg);
  font-family:'Urbanist',system-ui,sans-serif;height:100%;overflow:hidden}
button{font-family:inherit;color:inherit;background:transparent;border:none;cursor:pointer;padding:0}

.stage{
  min-height:100vh; width:100%;
  display:flex;align-items:center;justify-content:center;
  padding:28px 36px 28px 96px;
}

/* ==================== SIDEBAR ==================== */
.sidebar{
  position:fixed; left:18px; top:50%; transform:translateY(-50%);
  width:52px; padding:10px 6px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:28px;
  box-shadow:0 12px 32px rgba(0,0,0,0.4);
  z-index:50;
}
body[data-theme="lux"] .sidebar{ box-shadow: var(--shadow-md) }
.sb-logo{
  width:32px;height:32px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;margin-bottom:4px;
  font-family:'Plus Jakarta Sans';font-weight:800;font-size:13px;color:var(--gold);
}
.sb-item{
  width:36px;height:36px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  color:var(--fg-mute); cursor:pointer; position:relative;
  transition:color 200ms var(--ease-out), background 200ms var(--ease-out);
}
.sb-item:hover{color:var(--fg)}
.sb-item.active{color:var(--fg);background:var(--surface-high)}
.sb-item.active::before{
  content:""; position:absolute; left:-7px; top:8px; bottom:8px;
  width:2px; border-radius:2px; background:var(--gold);
}
.sb-live{
  position:absolute;top:8px;right:8px;width:6px;height:6px;border-radius:50%;
  background:#7CFFB2;
  animation:pulse-live 1.6s ease-in-out infinite;
}
.sb-badge{
  position:absolute;top:6px;right:6px;
  height:14px;min-width:14px;padding:0 3px;border-radius:99px;
  background:var(--gold);color:#0a0a0a;
  font-family:'Plus Jakarta Sans';font-size:8px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--bg-elevated);
}
.sb-sep{width:24px;height:1px;background:var(--border);margin:4px 0}

@keyframes pulse-live{
  0%,100%{opacity:1}
  50%{opacity:.45}
}

/* ==================== CANVAS RAIZ ==================== */
.canvas{
  width: min(1600px, calc(100vw - 150px));
  height: min(calc(100vh - 56px), 920px);
  border-radius:26px;
  container-type: inline-size;
  background:var(--bg-elevated);
  border:1px solid var(--border-strong);
  box-shadow:var(--canvas-shadow);
  overflow:hidden;
  position:relative;
  display:flex; flex-direction:column;
}

/* ==================== HEADER (replica W.3 AgendaHeader: title + tools) ==================== */
.ag-header{
  flex-shrink:0;
  width: 60%;
  min-width: 460px;
  max-width: 920px;
  margin-left: clamp(20px, 2vw, 32px);
  padding: clamp(20px, 2vw, 32px) clamp(20px, 2vw, 32px) clamp(8px, 0.8vw, 12px);
  display:flex; align-items:center; justify-content:space-between; gap:14px;
}
.ag-title{
  font-family:'Plus Jakarta Sans';font-weight:800;letter-spacing:-0.022em;
  font-size:clamp(26px, 2.2vw, 32px);line-height:1;margin:0;
  color:var(--fg); white-space: nowrap;
}
.ag-tools{display:flex;align-items:center;gap:6px;flex-shrink:0;position:relative}
.ag-tool{
  width:32px;height:32px;border-radius:50%;
  background:var(--surface-low);color:var(--fg-dim);
  display:flex;align-items:center;justify-content:center;
  transition:all 180ms var(--ease-out);
}
.ag-tool:hover{color:var(--fg);background:var(--surface-medium)}
.ag-tool:active{ transform: scale(0.92) }
body[data-theme="lux"] .ag-tool{ background:#fff; box-shadow: var(--shadow-sm) }

.ag-search-wrap{
  position:absolute; top:50%; right:0; transform:translateY(-50%);
  display:none; align-items:center;
  height:38px; padding: 0 36px 0 36px;
  background: var(--surface-medium);
  border-radius:14px;
  width: 280px;
  z-index:5;
}
body[data-theme="lux"] .ag-search-wrap{ background:#fff; box-shadow: var(--shadow-sm) }
.ag-search-wrap.open{display:flex; animation: pop-in 240ms var(--spring-soft)}
.ag-search-wrap svg.icon{
  position:absolute; left:13px; color:var(--fg-mute);
}
.ag-search-wrap input{
  background:transparent;border:none;outline:none;color:var(--fg);
  font-family:inherit;font-size:13px;width:100%;
}
.ag-search-wrap input::placeholder{ color:var(--fg-label) }
.ag-search-close{
  position:absolute; right:10px;
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--fg-mute);
  transition: color 180ms var(--ease-out), background 180ms var(--ease-out);
}
.ag-search-close:hover{ color:var(--fg); background: var(--surface-low) }
@keyframes pop-in{
  from{opacity:0;transform:translateY(-50%) scale(.94)}
  to{opacity:1;transform:translateY(-50%) scale(1)}
}

/* ==================== SPEAKERS WRAP ==================== */
.speakers-wrap{
  flex:1; min-height:0;
  display:flex;
  justify-content: flex-start;
  padding: 0 clamp(20px, 2vw, 32px) clamp(20px, 2vw, 32px);
}
.speakers-card{
  width: 60%;
  min-width: 460px;
  max-width: 920px;
  background: transparent;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.ag-header{ align-self: flex-start }

.sp-body{
  flex:1; min-height:0;
  overflow-y: auto; overflow-x: hidden;
  padding: clamp(18px, 1.6vw, 26px) clamp(20px, 2vw, 30px);
  scroll-behavior: smooth;
}
.sp-body::-webkit-scrollbar{width:5px}
.sp-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
body[data-theme="lux"] .sp-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.06)}

/* ==================== SECTION HEADER ==================== */
.sp-section-head{
  display:flex; align-items:baseline; justify-content:space-between;
  margin: 0 0 12px;
}
.sp-section-head:not(:first-child){ margin-top: 24px }
.sp-section-title{
  font-family:'Plus Jakarta Sans';font-weight:800;
  font-size: clamp(17px, 1.3vw, 19px);
  letter-spacing:-0.018em;
  color: var(--fg);
  margin:0;
}
.sp-section-link,
.sp-section-meta{
  font-family:'Urbanist'; font-weight:500;
  font-size:12.5px; color: var(--fg-mute);
}
.sp-section-link{ cursor:pointer; transition: color 200ms var(--ease-out) }
.sp-section-link:hover{ color: var(--fg) }

/* ==================== FEATURED CAROUSEL ==================== */
.feat-strip{
  overflow-x:auto;
  overflow-y:hidden;
  padding: 6px 0 8px;
  scroll-snap-type: x mandatory;
  scrollbar-width: thin;
  -webkit-overflow-scrolling: touch;
}
.feat-strip::-webkit-scrollbar{height:6px}
.feat-strip::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
body[data-theme="lux"] .feat-strip::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08)}

/* Inner row breathing animation — replica BreathingCarousel.tsx del movil */
.feat-track{
  display:inline-flex; gap: 12px;
  padding: 0 2px;
  animation: breathe 4.8s ease-in-out 1.2s infinite alternate;
  will-change: transform;
}
.feat-track.stopped{ animation: none; transform: translateX(0) !important; transition: transform 250ms var(--ease-out) }
@keyframes breathe{
  from { transform: translateX(0) }
  to   { transform: translateX(-12px) }
}
@media (prefers-reduced-motion: reduce){
  .feat-track{ animation: none }
}

.feat-card{
  scroll-snap-align: start;
  width: 200px; flex-shrink: 0;
  /* Noir: luminous-border glass — replica surface.low rgba(255,255,255,0.03) + borderLight 0.5px */
  background: rgba(255,255,255,0.03);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius:22px;
  overflow:hidden;
  cursor:pointer;
  display:flex; flex-direction:column;
  padding: 12px;
  transition: background 250ms var(--ease-out), transform 250ms var(--spring-soft), border-color 250ms var(--ease-out), box-shadow 250ms var(--ease-out);
}
.feat-card:hover{ background: rgba(255,255,255,0.05); transform: translateY(-2px) }
.feat-card:active{ transform: scale(0.985) }
.feat-card.selected{ border-color: rgba(255,255,255,0.22) }

.feat-photo{
  aspect-ratio: 4 / 5;
  background-size: cover;
  background-position: center 20%;
  border-radius: 14px;
  background-color: var(--surface-medium);
  position:relative;
  overflow:hidden;
}
.feat-keynote{
  position:absolute; top:8px; left:8px;
  padding:3px 8px; border-radius:6px;
  background: rgba(0,0,0,0.55);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  font-family:'Urbanist';font-weight:700;font-size:9px;letter-spacing:0.08em;
  color: #fff; text-transform: uppercase;
}

.feat-info{ padding: 12px 4px 4px }
.feat-name{
  font-family:'Plus Jakarta Sans';font-weight:700;
  font-size:15px; line-height:1.2;
  color:var(--fg); margin:0 0 2px;
  letter-spacing:-0.012em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.feat-role{
  font-size:12px; color:var(--fg-mute);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-bottom:8px;
}
.feat-sessions{
  display:flex; align-items:center; gap:5px;
  font-size:10px; color:var(--fg-mute); font-weight:600;
}
.feat-sessions svg{ width:11px; height:11px }

/* ==================== TODOS LIST (replica mobile — 1 col larga) ==================== */
.sp-grid{
  display:grid;
  grid-template-columns: 1fr;
  gap: 6px;
}
@container (min-width: 640px){
  .sp-grid{ grid-template-columns: repeat(2, 1fr); gap: 8px; }
}

.sp-row{
  display:flex; align-items:center; gap:14px;
  padding: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 18px;
  cursor:pointer;
  text-align: left;
  transition: background 250ms var(--ease-out), transform 250ms var(--spring-soft), border-color 250ms var(--ease-out);
}
.sp-row:hover{ background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.10); transform: translateY(-1px) }
.sp-row:active{ transform: scale(0.985) }
.sp-row.selected{ border-color: rgba(255,255,255,0.18) }

.sp-avatar{
  width:56px; height:56px; border-radius:16px;
  background-size: cover; background-position: center 20%;
  background-color: var(--surface-medium);
  flex-shrink:0;
}
.sp-row-info{ min-width:0; flex:1 }
.sp-row-name{
  font-family:'Plus Jakarta Sans';font-weight:700;
  font-size:14px; color:var(--fg);
  margin:0 0 1px; letter-spacing:-0.01em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.sp-row-role{
  font-size:12px; color:var(--fg-mute);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-bottom:5px;
}
.sp-row-meta{
  display:inline-flex; align-items:center; gap:3px;
  padding: 2px 7px; border-radius: 5px;
  background: var(--surface-medium);
  font-size: 10px; color: var(--fg-mute); font-weight:600;
}
.sp-row-meta svg{ width:9px; height:9px }
.sp-row .chev{ color: var(--fg-label); flex-shrink:0 }

/* Empty state */
.sp-empty{
  text-align:center;
  padding: 40px 20px;
  color: var(--fg-mute);
  font-size: 12.5px;
  font-family:'Urbanist'; font-weight:400;
}

/* ==================== DETAIL PANEL ==================== */
.detail{
  position:absolute;
  top: clamp(18px, 1.8vw, 28px);
  bottom: clamp(18px, 1.8vw, 28px);
  right: clamp(20px, 2vw, 32px);
  width: clamp(340px, 28vw, 540px);
  background: var(--surface-card);
  border: 1px solid var(--border-strong);
  border-radius: 22px;
  display:flex; flex-direction:column;
  overflow:hidden;
  opacity:0; pointer-events:none;
  transform: translateX(80px);
  transition:
    opacity 380ms var(--ease-out),
    transform 480ms var(--spring-snap);
  box-shadow: 0 24px 60px -16px rgba(0,0,0,0.55);
  z-index:10;
}
.detail.open{ opacity:1; pointer-events:auto; transform: translateX(0) }
.detail.swap-out{
  opacity:0; transform: translateX(-60px);
  transition: opacity 220ms var(--ease-out), transform 260ms var(--ease-out);
}

.dp-header{
  display:flex;align-items:center;justify-content:space-between;
  padding: 16px 20px 8px;
  flex-shrink:0;
}
.dp-back{
  width:36px;height:36px;border-radius:50%;
  background:var(--surface-medium);color:var(--fg);
  display:flex;align-items:center;justify-content:center;
  transition: background 200ms var(--ease-out);
}
body[data-theme="lux"] .dp-back{ background:#fff; box-shadow: var(--shadow-sm) }
.dp-back:hover{background:var(--surface-high)}
.dp-back:active{ transform: scale(0.94) }
.dp-headtitle{
  font-family:'Plus Jakarta Sans';
  font-size:16px;color:var(--fg);font-weight:700;letter-spacing:-0.01em;
}
.dp-headspace{width:36px}

.dp-body{
  flex:1;overflow-y:auto;
  padding: 8px 20px 24px;
}
.dp-body::-webkit-scrollbar{width:5px}
.dp-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
body[data-theme="lux"] .dp-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.06)}

/* Hero photo — square, max 260, centrada en el panel (panel desktop es estrecho,
   full-width 1:1 dominaba). Mobile usa full-width pero en pantalla 375px da ~330px,
   aqui limitamos visualmente para mantener proporcion en panel ~340-540px */
.dp-photo{
  width: 100%;
  max-width: 260px;
  aspect-ratio: 1 / 1;
  border-radius: 24px;
  background-size: cover; background-position: center 20%;
  background-color: var(--surface-medium);
  margin: 0 auto 20px;
}
body[data-theme="lux"] .dp-photo{ box-shadow: var(--shadow-sm) }

.dp-name{
  font-family:'Plus Jakarta Sans';font-weight:800;
  font-size: clamp(22px, 1.7vw, 28px); line-height:1.15;
  letter-spacing:-0.022em;
  color: var(--fg);
  margin: 0;
}
.dp-role{
  margin-top: 5px;
  font-size: 13.5px;
  color: var(--fg-dim);
  line-height: 1.4;
  font-family:'Urbanist'; font-weight:400;
}
.dp-role b{ color: var(--fg); font-weight:600 }

/* Rating display row — Stars + avg + n votos (solo si rating_count > 0) */
.dp-rating-row{
  display:flex; align-items:center; gap: 8px;
  margin-top: 12px;
}
.dp-rating-stars{ display:flex; gap: 2px; color: var(--gold) }
.dp-rating-stars svg{ width: 14px; height: 14px }
.dp-rating-meta{
  font-family:'Urbanist'; font-weight:500;
  font-size: 12.5px; color: var(--fg-mute);
}
.dp-rating-meta b{ color: var(--fg); font-weight:700 }

/* Action row — LinkedIn + Calificar lado a lado, ambos flex:1 cuando hay 2;
   cuando solo hay 1 (linkedin_url null) se acota a tamaño contenido y se alinea
   derecha — en panel desktop ~340-540px, un boton flex:1 solo se veia gigante */
.dp-actions{
  display:flex; gap: 8px;
  margin-top: 20px;
}
.dp-actions button{
  flex: 1 1 0;
  min-width: 0;
  display:flex; align-items:center; justify-content:center; gap: 7px;
  padding: 13px;
  border-radius: 14px;
  font-family:'Urbanist'; font-weight:600; font-size: 13px;
  border: 1px solid transparent;
  transition: transform 200ms var(--spring-soft), background 200ms var(--ease-out), border-color 200ms var(--ease-out);
}
.dp-actions button:active{ transform: scale(0.98) }
.dp-actions svg{ width:16px; height:16px; flex-shrink:0 }
/* Solo Calificar (sin LinkedIn) → no llenar todo el ancho */
.dp-actions:has(> button:only-child){ justify-content: flex-end }
.dp-actions:has(> button:only-child) button{
  flex: 0 0 auto;
  min-width: 180px;
  max-width: 220px;
}

.dp-linkedin{
  background: #ffffff;
  color: #0a0a0a;
}
body[data-theme="lux"] .dp-linkedin{ background: var(--linkedin); color: #fff }

.dp-rate{
  background: var(--gold-bg);
  color: var(--gold);
  border-color: var(--gold-border) !important;
}
.dp-rate:hover{ background: var(--gold-bg-strong) }
.dp-rate.rated{
  background: var(--gold-bg);
  color: var(--gold-soft);
  border-color: var(--gold-border) !important;
  cursor: default;
  opacity: 0.7;
}
.dp-rate.rated:hover{ background: var(--gold-bg) }

/* Bio card — "ACERCA DE" label uppercase letterspacing 1.2 */
.dp-bio{
  margin-top: 20px;
  padding: 18px;
  border-radius: 18px;
  background: var(--surface-low);
  border: 1px solid var(--border);
}
.dp-bio-label{
  font-family:'Urbanist'; font-weight:700;
  font-size: 11px; color: var(--fg-label);
  letter-spacing: 1.2px; text-transform: uppercase;
  margin-bottom: 10px;
}
.dp-bio-text{
  font-family:'Urbanist'; font-weight: 400;
  font-size: 14px; color: var(--fg-dim);
  line-height: 1.55;
  margin: 0;
}

/* Sessions list — replica mobile speaker/[id].tsx */
.dp-sessions-label{
  font-family:'Urbanist'; font-weight:700;
  font-size: 11px; color: var(--fg-label);
  letter-spacing: 1.2px; text-transform: uppercase;
  margin: 22px 0 12px 4px;
}
.dp-sessions{ display:flex; flex-direction:column; gap: 10px }
.dp-session{
  display:flex; align-items:center; gap:14px;
  padding: 16px;
  border-radius: 18px;
  background: var(--surface-low);
  border: 1px solid var(--border);
  cursor:pointer;
  text-align: left;
  transition: background 200ms var(--ease-out), transform 200ms var(--spring-soft);
}
.dp-session:hover{ background: var(--surface-medium) }
.dp-session:active{ transform: scale(0.99) }
.dp-sess-time{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  flex-shrink:0; min-width: 56px;
  gap: 4px;
}
.dp-sess-hh{
  font-family:'Plus Jakarta Sans';font-weight:700;
  font-size: 14px; color: var(--fg); letter-spacing:-0.01em;
}
.dp-sess-type{
  padding: 2px 6px;
  border-radius: 4px;
  font-family:'Urbanist'; font-weight:600;
  font-size: 9px; letter-spacing: 0.3px; text-transform: uppercase;
}
.dp-sess-info{ flex:1; min-width:0; display:flex; flex-direction:column; gap: 4px }
.dp-sess-title{
  font-family:'Urbanist'; font-weight:600;
  font-size: 13px; color: var(--fg); margin:0; line-height:1.35;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.dp-sess-loc{
  display:flex; align-items:center; gap: 4px;
  font-size: 11px; color: var(--fg-mute);
  font-family:'Urbanist'; font-weight:400;
}
.dp-sess-loc svg{ width:10px; height:10px }
.dp-session svg.chev{ color: var(--fg-label); flex-shrink:0 }

.dp-sessions-hint{
  font-family:'Urbanist'; font-weight:500;
  font-size: 10.5px; color: var(--fg-label);
  text-align: center;
  margin-top: 12px;
}

/* ==================== EMPTY HINT ==================== */
.empty-hint{
  position:absolute;
  top: clamp(18px, 1.8vw, 28px);
  bottom: clamp(18px, 1.8vw, 28px);
  right: clamp(20px, 2vw, 32px);
  width: clamp(340px, 28vw, 540px);
  background: var(--surface-card);
  border: 1px dashed var(--border-strong);
  border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;text-align:center;
  padding:40px;color:var(--fg-mute);
  opacity:0; pointer-events:none;
  transition: opacity 280ms var(--ease-out);
  z-index:5;
}
.canvas:not(.has-detail) .empty-hint{ opacity:.55 }
.empty-hint .glyph{
  width:60px;height:60px;border-radius:18px;
  background:var(--surface-medium);
  display:flex;align-items:center;justify-content:center;
}
.empty-hint h3{font-family:'Plus Jakarta Sans';font-weight:700;font-size:14px;margin:0;color:var(--fg-dim);letter-spacing:-0.01em}
.empty-hint p{font-size:11.5px;margin:4px 0 0;line-height:1.5}
.kbd{
  background:var(--surface-low);padding:1px 5px;border-radius:4px;
  color:var(--fg-dim); font-family:'Urbanist'; font-weight:600;
}

/* ==================== RATING MODAL (estrellas — replica mobile RatingModal) ==================== */
.rate-overlay{
  position: fixed; inset:0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition: opacity 240ms var(--ease-out);
  z-index: 200;
}
body[data-theme="lux"] .rate-overlay{ background: rgba(0,0,0,0.35) }
.rate-overlay.open{ opacity:1; pointer-events:auto }

.rate-modal{
  width: min(420px, 90vw);
  background: var(--bg-elevated);
  border:1px solid var(--border-strong);
  border-radius: 22px;
  padding: 26px 28px;
  transform: scale(0.94) translateY(8px);
  transition: transform 360ms var(--spring-snap);
  box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6);
}
body[data-theme="lux"] .rate-modal{ box-shadow: var(--shadow-lg) }
.rate-overlay.open .rate-modal{ transform: scale(1) translateY(0) }

.rate-title{
  font-family:'Plus Jakarta Sans';font-weight:800;
  font-size: 19px; margin:0;
  letter-spacing:-0.018em;
  color: var(--fg);
}
.rate-sub{
  margin-top: 4px;
  font-size: 13px;
  color: var(--fg-mute);
  font-family:'Urbanist'; font-weight:500;
}
.rate-stars{
  display:flex; gap:14px; justify-content:center;
  margin: 22px 0 18px;
}
.rate-s{
  width:38px; height:38px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  color: var(--border-strong);
  transition: color 180ms var(--ease-out), transform 200ms var(--spring-soft);
}
.rate-s:hover{ transform: scale(1.12) }
.rate-s:active{ transform: scale(0.92) }
.rate-s.on{ color: var(--gold) }
.rate-s.on svg{ fill: currentColor }
.rate-s svg{ width:32px; height:32px }

.rate-comment{
  width:100%;
  background: var(--surface-low);
  border:1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  font-family: inherit; color: var(--fg);
  font-size: 13px;
  resize:none; min-height: 70px;
  outline: none;
  transition: border 200ms var(--ease-out);
}
.rate-comment:focus{ border-color: var(--border-strong) }
.rate-comment::placeholder{ color: var(--fg-mute) }

.rate-actions{
  display:flex; flex-direction:column; gap:8px;
  margin-top: 16px;
}
.rate-send{
  padding: 13px;
  border-radius: 13px;
  background: var(--gold); color: #0a0a0a;
  font-family:'Urbanist'; font-weight:700; font-size:13px;
  letter-spacing:0.02em;
  transition: transform 200ms var(--spring-soft), background 200ms var(--ease-out);
}
body[data-theme="lux"] .rate-send{ color: #ffffff }
.rate-send:hover{ transform: translateY(-1px) }
.rate-send:active{ transform: scale(0.98) }
.rate-send:disabled{
  background: var(--surface-medium); color: var(--fg-mute);
  cursor: not-allowed;
}
.rate-cancel{
  padding: 11px;
  font-family:'Urbanist'; font-weight:600; font-size:12.5px;
  color: var(--fg-mute);
}
.rate-cancel:hover{ color: var(--fg) }

/* ==================== TWEAKS / TOAST ==================== */
.tweaks{
  position:fixed;top:18px;right:18px;
  background:var(--bg-elevated);
  border:1px solid var(--border);border-radius:16px;
  padding:10px 12px;
  font-size:10px;color:var(--fg-dim);
  font-family:'Urbanist';display:flex;align-items:center;gap:10px;
  z-index:60;
}
body[data-theme="lux"] .tweaks{ box-shadow: var(--shadow-sm) }
.seg{display:flex;gap:2px;padding:2px;background:var(--surface-low);border-radius:8px}
.seg button{padding:3px 9px;border-radius:6px;font-size:9.5px;font-weight:600;color:var(--fg-mute)}
.seg button.active{background:var(--surface-high);color:var(--fg)}

.hint{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  font-family:'Urbanist';font-size:10px;color:var(--fg-mute);
  letter-spacing:0.04em;pointer-events:none;z-index:1;
}
.hint kbd{
  background:var(--surface-low);padding:1px 5px;border-radius:4px;
  color:var(--fg-dim); font-family:inherit;
}

.toast{
  position: fixed; top: 70px; left: 50%;
  transform: translateX(-50%) translateY(-12px);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 16px 10px 12px;
  font-family: 'Urbanist'; font-weight: 600; font-size: 12.5px;
  color: var(--fg);
  display: flex; align-items: center; gap: 10px;
  opacity: 0; pointer-events: none;
  transition: all 320ms var(--spring-soft);
  z-index: 300;
  box-shadow: 0 12px 32px -8px rgba(0,0,0,0.45);
}
body[data-theme="lux"] .toast{ box-shadow: 0 12px 32px -8px rgba(0,0,0,0.18) }
.toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); pointer-events:auto }
.toast .toast-icon{
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  background: var(--gold-bg); color: var(--gold);
}
</style>

/* ==================== STATE ==================== */
const state = {
  search: '',
  debouncedSearch: '',
  selectedId: null,
  ratings: {},        // { speakerId: { stars, comment } } — replica useMySpeakerRatings
  breathStopped: false,
};
let searchTimer = null;

/* ==================== HELPERS ==================== */
const $ = (s, p=document) => p.querySelector(s);
const $$ = (s, p=document) => Array.from(p.querySelectorAll(s));

function hasKeynoteSession(s){
  return s.sessions?.some(sess => sess.session_type?.name?.toLowerCase().includes('keynote'));
}

function svgChev(){
  return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chev"><path d="M9 18l6-6-6-6"/></svg>';
}
function svgCalendar(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>';
}
function svgPin(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg>';
}
function svgStar(filled){
  return filled
    ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L9 9l-7 .5 5.4 4.6L5.5 22 12 18l6.5 4-1.9-7.9L22 9.5 15 9z"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2L9 9l-7 .5 5.4 4.6L5.5 22 12 18l6.5 4-1.9-7.9L22 9.5 15 9z"/></svg>';
}
function svgLinkedIn(){
  return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h14zM8 8a1 1 0 100-2 1 1 0 000 2zm1 10v-7H7v7h2zm9 0v-4c0-1.7-1.3-3-3-3s-3 1.3-3 3v4h2v-4c0-.6.4-1 1-1s1 .4 1 1v4h2z"/></svg>';
}
function formatTime(iso){
  const d = new Date(iso);
  let hh = d.getHours();
  const mm = String(d.getMinutes()).padStart(2,'0');
  const ampm = hh >= 12 ? 'p.m.' : 'a.m.';
  hh = hh % 12; if (hh === 0) hh = 12;
  return `${hh}:${mm} ${ampm}`;
}

/* ==================== FILTER + FEATURED (replica mobile speakers.tsx) ==================== */
function filterSpeakers(){
  if (!state.debouncedSearch.trim()) return speakers.slice();
  const q = state.debouncedSearch.trim().toLowerCase();
  return speakers.filter(s =>
    s.name.toLowerCase().includes(q) ||
    (s.company && s.company.toLowerCase().includes(q)) ||
    (s.job_title && s.job_title.toLowerCase().includes(q))
  );
}

function getFeatured(){
  if (!speakers.length) return [];
  const keynotes = speakers.filter(hasKeynoteSession);
  if (keynotes.length >= 2) return keynotes.slice(0, 8);
  return [...speakers]
    .sort((a, b) => (b.sessions?.length ?? 0) - (a.sessions?.length ?? 0))
    .slice(0, 5);
}

/* ==================== RENDER BODY ==================== */
function renderBody(){
  const host = $('#spContent');
  const filtered = filterSpeakers();
  const hasSearch = state.debouncedSearch.trim().length > 0;
  const featured = hasSearch ? [] : getFeatured();

  let html = '';

  // FEATURED — solo si NO hay search activo (replica mobile)
  if (featured.length){
    html += `
      <div class="sp-section-head">
        <h2 class="sp-section-title">Destacados</h2>
        <button class="sp-section-link" data-action="scroll-todos">Ver todos</button>
      </div>
      <div class="feat-strip" id="featStrip">
        <div class="feat-track${state.breathStopped?' stopped':''}" id="featTrack">
          ${featured.map(featCardHtml).join('')}
        </div>
      </div>
      <div style="height:24px"></div>`;
  }

  // TODOS / RESULTADOS
  html += `
    <div class="sp-section-head" id="todosHead">
      <h2 class="sp-section-title">${hasSearch ? 'Resultados' : 'Todos'}</h2>
      <span class="sp-section-meta">${filtered.length} ${filtered.length===1?'speaker':'speakers'}</span>
    </div>`;

  if (filtered.length === 0){
    html += `<div class="sp-empty">No se encontraron speakers.</div>`;
  } else {
    html += `<div class="sp-grid">${filtered.map(rowHtml).join('')}</div>`;
  }

  host.innerHTML = html;

  host.querySelectorAll('[data-spid]').forEach(el => {
    el.addEventListener('click', () => openDetail(parseInt(el.dataset.spid, 10)));
  });
  host.querySelectorAll('[data-action="scroll-todos"]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      stopBreathing();
      const target = host.querySelector('#todosHead');
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });

  // Stop breathing al primer scroll/touch
  const strip = host.querySelector('#featStrip');
  if (strip && !state.breathStopped){
    const stop = () => stopBreathing();
    strip.addEventListener('pointerdown', stop, { once:true });
    strip.addEventListener('wheel', stop, { once:true, passive:true });
    strip.addEventListener('scroll', stop, { once:true, passive:true });
  }
}

function stopBreathing(){
  if (state.breathStopped) return;
  state.breathStopped = true;
  const track = document.getElementById('featTrack');
  if (track) track.classList.add('stopped');
}

function featCardHtml(s){
  const sel = state.selectedId === s.id ? ' selected' : '';
  const role = [s.job_title, s.company].filter(Boolean).join(' · ');
  const sessionCount = s.sessions?.length ?? 0;
  return `
    <article class="feat-card${sel}" data-spid="${s.id}">
      <div class="feat-photo" style="background-image:url('${s.photo_url}')">
        ${hasKeynoteSession(s) ? `<span class="feat-keynote">Keynote</span>` : ''}
      </div>
      <div class="feat-info">
        <h3 class="feat-name">${s.name}</h3>
        <div class="feat-role">${role}</div>
        ${sessionCount > 0 ? `
          <div class="feat-sessions">${svgCalendar()}${sessionCount} ${sessionCount===1?'sesion':'sesiones'}</div>
        ` : ''}
      </div>
    </article>`;
}

function rowHtml(s){
  const sel = state.selectedId === s.id ? ' selected' : '';
  const role = [s.job_title, s.company].filter(Boolean).join(' · ');
  const sessionCount = s.sessions?.length ?? 0;
  return `
    <button class="sp-row${sel}" data-spid="${s.id}">
      <div class="sp-avatar" style="background-image:url('${s.photo_url}')"></div>
      <div class="sp-row-info">
        <h4 class="sp-row-name">${s.name}</h4>
        <div class="sp-row-role">${role}</div>
        ${sessionCount > 0 ? `<span class="sp-row-meta">${svgCalendar()}${sessionCount}</span>` : ''}
      </div>
      ${svgChev()}
    </button>`;
}

/* ==================== DETAIL ==================== */
function openDetail(id){
  state.selectedId = id;
  const s = speakers.find(x => x.id === id);
  if (!s) return;

  const detail = $('#detailCard');
  const canvas = $('#canvas');
  const dpBody = $('#dpBody');

  if (detail.classList.contains('open')){
    detail.classList.add('swap-out');
    setTimeout(() => {
      paintDetail(s, dpBody);
      detail.classList.remove('swap-out');
    }, 220);
  } else {
    paintDetail(s, dpBody);
    requestAnimationFrame(() => detail.classList.add('open'));
  }
  canvas.classList.add('has-detail');
  renderBody();
}

function paintDetail(s, host){
  const r = state.ratings[s.id];
  const alreadyRated = !!r;

  // Role: "Cargo en **Empresa**" (replica mobile speaker/[id].tsx:138-145)
  let roleHtml = '';
  if (s.job_title) roleHtml += s.job_title;
  if (s.job_title && s.company) roleHtml += ' en ';
  if (s.company) roleHtml += `<b>${s.company}</b>`;

  // Rating display — solo si rating_count > 0 (replica mobile :149)
  let ratingHtml = '';
  if (s.avg_rating !== null && s.rating_count > 0){
    const stars = [1,2,3,4,5].map(i => svgStar(i <= Math.round(s.avg_rating))).join('');
    ratingHtml = `
      <div class="dp-rating-row">
        <div class="dp-rating-stars">${stars}</div>
        <div class="dp-rating-meta">
          <b>${s.avg_rating.toFixed(1)}</b> · ${s.rating_count} ${s.rating_count===1?'voto':'votos'}
        </div>
      </div>`;
  }

  // Actions: LinkedIn (si hay url) + Calificar — ambos flex:1
  const linkedinBtn = s.linkedin_url ? `
    <button class="dp-linkedin" data-action="linkedin">
      ${svgLinkedIn()} LinkedIn
    </button>` : '';

  const rateBtn = `
    <button class="dp-rate ${alreadyRated?'rated':''}" data-action="rate" ${alreadyRated?'disabled':''}>
      ${svgStar(true)} ${alreadyRated ? 'Evaluado' : 'Calificar'}
    </button>`;

  // Sessions (replica mobile speaker/[id].tsx:215-280)
  const sessionsHtml = (s.sessions && s.sessions.length > 0) ? `
    <div class="dp-sessions-label">Sus sesiones</div>
    <div class="dp-sessions">
      ${s.sessions.map(sess => {
        const time = formatTime(sess.start);
        const [hh, ampm] = time.split(' ');
        const color = sess.session_type?.color ?? 'var(--fg-mute)';
        const tName = sess.session_type?.name ?? '';
        return `
          <button class="dp-session" data-sess-id="${sess.id}">
            <div class="dp-sess-time">
              <span class="dp-sess-hh">${hh}</span>
              ${tName ? `<span class="dp-sess-type" style="background:${color}28;color:${color}">${tName}</span>` : ''}
            </div>
            <div class="dp-sess-info">
              <h4 class="dp-sess-title">${sess.title}</h4>
              ${sess.location ? `<div class="dp-sess-loc">${svgPin()}${sess.location}</div>` : ''}
            </div>
            ${svgChev()}
          </button>`;
      }).join('')}
    </div>
    <div class="dp-sessions-hint">Toca una sesion para ver el detalle</div>
  ` : '';

  host.innerHTML = `
    <div class="dp-photo" style="background-image:url('${s.photo_url}')"></div>
    <h2 class="dp-name">${s.name}</h2>
    ${roleHtml ? `<div class="dp-role">${roleHtml}</div>` : ''}
    ${ratingHtml}
    <div class="dp-actions">
      ${linkedinBtn}
      ${rateBtn}
    </div>
    ${s.bio ? `
      <div class="dp-bio">
        <div class="dp-bio-label">Acerca de</div>
        <p class="dp-bio-text">${s.bio}</p>
      </div>
    ` : ''}
    ${sessionsHtml}
  `;

  // Wire actions
  const rateButton = host.querySelector('[data-action="rate"]');
  if (rateButton && !alreadyRated) rateButton.addEventListener('click', () => openRateModal(s));

  const linkedinButton = host.querySelector('[data-action="linkedin"]');
  if (linkedinButton) linkedinButton.addEventListener('click', () => {
    showToast('LinkedIn (demo) · ' + s.linkedin_url);
  });

  host.querySelectorAll('[data-sess-id]').forEach(el => {
    el.addEventListener('click', () => showToast('Abrir detalle sesion #' + el.dataset.sessId));
  });
}

function closeDetail(){
  $('#detailCard').classList.remove('open');
  $('#canvas').classList.remove('has-detail');
  state.selectedId = null;
  renderBody();
}

$('#dpClose').addEventListener('click', closeDetail);

/* ==================== RATING MODAL (estrellas) ==================== */
let rateState = { speakerId:null, stars:0 };

function openRateModal(s){
  rateState = { speakerId:s.id, stars: 0 };
  $('#rateSub').textContent = s.name;
  $('#rateComment').value = '';
  renderRateStars();
  updateRateSendDisabled();
  $('#rateOverlay').classList.add('open');
  setTimeout(() => $('#rateComment').focus(), 200);
}

function renderRateStars(){
  const host = $('#rateStars');
  host.innerHTML = '';
  for (let i=1; i<=5; i++){
    const btn = document.createElement('button');
    btn.className = 'rate-s' + (i<=rateState.stars?' on':'');
    btn.innerHTML = svgStar(i<=rateState.stars);
    btn.addEventListener('click', () => {
      rateState.stars = i;
      renderRateStars();
      updateRateSendDisabled();
    });
    btn.addEventListener('mouseenter', () => {
      Array.from(host.children).forEach((c, idx) => {
        c.classList.toggle('on', idx < i);
        c.innerHTML = svgStar(idx < i);
      });
    });
    btn.addEventListener('mouseleave', () => {
      Array.from(host.children).forEach((c, idx) => {
        c.classList.toggle('on', idx < rateState.stars);
        c.innerHTML = svgStar(idx < rateState.stars);
      });
    });
    host.appendChild(btn);
  }
}

function updateRateSendDisabled(){
  $('#rateSend').disabled = rateState.stars === 0;
}

$('#rateCancel').addEventListener('click', closeRateModal);
$('#rateOverlay').addEventListener('click', (e) => {
  if (e.target === $('#rateOverlay')) closeRateModal();
});

$('#rateSend').addEventListener('click', () => {
  if (rateState.stars === 0) return;
  state.ratings[rateState.speakerId] = {
    stars: rateState.stars,
    comment: $('#rateComment').value.trim(),
  };
  const s = speakers.find(x => x.id === rateState.speakerId);
  closeRateModal();
  if (state.selectedId === s.id){
    paintDetail(s, $('#dpBody'));
  }
  showToast(`Evaluacion enviada · ${rateState.stars}/5`);
});

function closeRateModal(){
  $('#rateOverlay').classList.remove('open');
}

/* ==================== TOAST ==================== */
let toastTimer;
function showToast(msg){
  const t = $('#toast');
  $('#toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ==================== SEARCH colapsable ⌘K — replica W.3 AgendaHeader ==================== */
const searchInput = $('#searchInput');
const searchBtn = $('#searchBtn');
const searchWrap = $('#searchWrap');
const searchClose = $('#searchClose');

function openSearch(){
  if (searchWrap.classList.contains('open')) return;
  searchWrap.classList.add('open');
  setTimeout(() => searchInput.focus(), 50);
}
function closeSearch(){
  searchWrap.classList.remove('open');
  searchInput.value = '';
  state.search = '';
  state.debouncedSearch = '';
  renderBody();
}
searchBtn.addEventListener('click', openSearch);
searchClose.addEventListener('click', closeSearch);

searchInput.addEventListener('input', (e) => {
  state.search = e.target.value;
  if (searchTimer) clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.debouncedSearch = state.search.trim();
    renderBody();
  }, 400);
});

/* ==================== KEYBOARD (replica W.3 agenda) ==================== */
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k'){
    e.preventDefault();
    openSearch();
    return;
  }
  if (e.key === 'Escape'){
    if ($('#rateOverlay').classList.contains('open')) { closeRateModal(); return }
    if (searchWrap.classList.contains('open')) { closeSearch(); return }
    if ($('#detailCard').classList.contains('open')) { closeDetail(); return }
  }
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp'){
    if (document.activeElement === searchInput) return;
    if (!$('#detailCard').classList.contains('open')) return;
    const list = filterSpeakers();
    if (!list.length) return;
    const cur = list.findIndex(s => s.id === state.selectedId);
    let next = e.key === 'ArrowDown' ? cur+1 : cur-1;
    if (next < 0) next = list.length-1;
    if (next >= list.length) next = 0;
    e.preventDefault();
    openDetail(list[next].id);
  }
});

/* ==================== TWEAKS ==================== */
$$('#seg-mode button').forEach(b => {
  b.addEventListener('click', () => {
    $$('#seg-mode button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.body.dataset.theme = b.dataset.mode;
  });
});

/* ==================== INIT ==================== */
renderBody();
</script>
