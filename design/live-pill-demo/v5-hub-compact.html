<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Live Hub v5 — compact, sin scroll vertical</title>
<style>
  :root {
    --bg: #0a0a0c;
    --bg-elevated: #16161a;
    --bg-raised: #1a1a1f;
    --surface-low: #1d1d22;
    --surface-high: #2a2a30;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --text-primary: #ededf0;
    --text-secondary: #b4b4ba;
    --text-muted: #767680;
    --accent: #7c5cff;
    --accent-light: #a896ff;
    --live-red: #ff4757;
    --next-amber: #f5b942;
    --glass: rgba(20,20,24,0.72);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    overflow: hidden;
  }
  body {
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 14px;
    padding: 20px 28px;
    height: 100vh;
  }

  .toolbar {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    padding: 10px 16px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 14px;
    flex-shrink: 0;
  }
  .toolbar h1 { margin: 0; font-size: 13px; font-weight: 700; margin-right: 12px; }
  .toolbar .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-left: 12px; }
  .toolbar button {
    padding: 6px 12px;
    background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 999px;
    font-size: 11px; font-weight: 600; cursor: pointer;
    transition: all 0.15s ease;
  }
  .toolbar button:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .toolbar button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .shell {
    position: relative;
    background:
      radial-gradient(circle at 20% 30%, rgba(124,92,255,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(255,71,87,0.04) 0%, transparent 50%),
      var(--bg);
    border: 1px solid var(--border);
    border-radius: 22px;
    overflow: hidden;
    min-height: 0;
  }

  .sidebar {
    position: absolute;
    left: 16px; top: 50%; transform: translateY(-50%);
    width: 50px;
    background: var(--glass);
    backdrop-filter: blur(22px);
    border: 1px solid var(--border-strong);
    border-radius: 26px;
    padding: 9px 0;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    z-index: 5;
  }
  .brand { width: 30px; height: 30px; display: grid; place-items: center; color: var(--accent); font-weight: 800; font-size: 13px; margin-bottom: 5px; }
  .nav-item {
    position: relative;
    width: 34px; height: 34px;
    display: grid; place-items: center;
    border-radius: 11px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .nav-item:hover { background: var(--surface-low); color: var(--text-secondary); }
  .nav-item.active { background: var(--surface-high); color: var(--text-primary); }
  .nav-item svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.7; }
  .nav-item .badge {
    position: absolute; top: -2px; right: -2px;
    min-width: 15px; height: 15px;
    padding: 0 4px;
    background: var(--live-red);
    color: #fff;
    font-size: 9px; font-weight: 700;
    display: grid; place-items: center;
    border-radius: 999px;
    border: 2px solid var(--bg);
  }
  .nav-item .pulse-dot {
    position: absolute; top: 5px; right: 5px;
    width: 6px; height: 6px;
    background: var(--live-red);
    border-radius: 999px;
    box-shadow: 0 0 7px var(--live-red);
    animation: pulse 1.6s ease-in-out infinite;
  }
  .divider { width: 24px; height: 1px; background: var(--border); margin: 5px 0; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  /* ── Stage / Canvas ── */
  .stage {
    position: absolute;
    left: 80px; right: 20px; top: 20px; bottom: 20px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr 1fr;
    gap: 8px;
  }

  /* Header */
  .hub-header {
    padding: 18px 26px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .hub-header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .hub-header .subtitle {
    margin-top: 2px;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
  }
  .hub-header .live-pill-inline {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 12px;
    background: color-mix(in srgb, var(--live-red) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--live-red) 30%, transparent);
    border-radius: 999px;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--live-red);
  }
  .hub-header .live-pill-inline::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--live-red);
    border-radius: 999px;
    box-shadow: 0 0 5px var(--live-red);
    animation: pulse 1.6s ease-in-out infinite;
  }

  /* Sections — cada una toma 1fr de altura */
  .section {
    padding: 0 26px;
    min-height: 0;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 8px;
  }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding-right: 4px;
  }
  .section-head h2 {
    margin: 0;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-primary);
  }
  .section-head h2.live { color: var(--live-red); display: flex; align-items: center; gap: 7px; }
  .section-head h2.live::before {
    content: '';
    width: 5px; height: 5px;
    background: var(--live-red);
    border-radius: 999px;
    box-shadow: 0 0 4px var(--live-red);
    animation: pulse 1.6s ease-in-out infinite;
  }
  .section-head .qty {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.1em;
  }

  /* Horizontal scroll row */
  .row-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    overflow-y: hidden;
    padding-bottom: 8px;
    scroll-snap-type: x mandatory;
    align-items: stretch;
    min-height: 0;
  }
  .row-scroll::-webkit-scrollbar { height: 4px; }
  .row-scroll::-webkit-scrollbar-track { background: transparent; }
  .row-scroll::-webkit-scrollbar-thumb { background: var(--surface-high); border-radius: 999px; }
  .row-scroll > * { scroll-snap-align: start; flex-shrink: 0; }

  /* ── LIVE CARDS ── */
  .card-live {
    position: relative;
    aspect-ratio: 16/9;
    height: 100%;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s ease;
    border: 1px solid var(--border);
  }
  .card-live:hover { transform: scale(1.02); }
  .card-live .poster {
    position: absolute; inset: 0;
  }
  .card-live.featured .poster {
    background:
      radial-gradient(circle at 30% 20%, rgba(124,92,255,0.45) 0%, transparent 55%),
      linear-gradient(135deg, #2a1f4f 0%, #15102a 50%, #0a0810 100%);
  }
  .card-live.bg-1 .poster {
    background: radial-gradient(circle at 30% 20%, rgba(89,170,255,0.5) 0%, transparent 60%), linear-gradient(135deg, #1a2e4d 0%, #0e1828 50%, #08101a 100%);
  }
  .card-live.bg-2 .poster {
    background: radial-gradient(circle at 30% 20%, rgba(245,185,66,0.5) 0%, transparent 60%), linear-gradient(135deg, #4a3315 0%, #2a1d0c 50%, #1a1207 100%);
  }
  .card-live.bg-3 .poster {
    background: radial-gradient(circle at 30% 20%, rgba(255,127,127,0.5) 0%, transparent 60%), linear-gradient(135deg, #4a1e2e 0%, #2a1018 50%, #1a070e 100%);
  }
  .card-live .gradient {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 45%, rgba(0,0,0,0.85) 100%);
  }
  .card-live .top {
    position: absolute; top: 10px; left: 10px; right: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .card-live .live-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px;
    background: var(--live-red);
    color: #fff;
    font-size: 9px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    border-radius: 999px;
  }
  .card-live .live-tag::before {
    content: '';
    width: 4px; height: 4px;
    background: #fff;
    border-radius: 999px;
    animation: pulse 1.6s ease-in-out infinite;
  }
  .card-live .audience-tag {
    padding: 3px 8px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    border-radius: 999px;
    font-variant-numeric: tabular-nums;
  }
  .card-live .featured-tag {
    padding: 3px 8px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    color: #fff;
    font-size: 8px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    border-radius: 999px;
  }
  .card-live .info {
    position: absolute; left: 14px; right: 14px; bottom: 12px;
    color: #fff;
  }
  .card-live .room-tag {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent-light);
    margin-bottom: 4px;
  }
  .card-live h4 {
    margin: 0 0 4px;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.01em;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-live .speaker-line {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Hero (featured) — mas grande */
  .card-live.featured {
    /* tomara aspect natural pero anchor-width usando minmax; calculado via JS o flex-basis */
  }
  .card-live.featured h4 {
    font-size: 16px;
    -webkit-line-clamp: 2;
  }
  .card-live.featured .info {
    bottom: 14px;
  }

  /* Play overlay */
  .card-live .play-overlay {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    background: rgba(0,0,0,0.32);
    backdrop-filter: blur(2px);
    opacity: 0;
    transition: opacity 0.18s ease;
  }
  .card-live:hover .play-overlay { opacity: 1; }
  .card-live .play-icon {
    width: 50px; height: 50px;
    background: rgba(255,255,255,0.95);
    border-radius: 999px;
    display: grid; place-items: center;
    transform: scale(0.8);
    transition: transform 0.22s ease;
  }
  .card-live:hover .play-icon { transform: scale(1); }
  .card-live .play-icon svg { width: 22px; height: 22px; fill: #000; }

  /* ── UPCOMING CARDS ── */
  .card-up {
    position: relative;
    width: 200px;
    height: 100%;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    display: grid;
    grid-template-rows: auto 1fr;
  }
  .card-up:hover {
    transform: translateY(-2px);
    border-color: var(--border-strong);
  }
  .card-up .poster {
    position: relative;
    aspect-ratio: 16/9;
    background:
      radial-gradient(circle at 30% 20%, rgba(245,185,66,0.18) 0%, transparent 60%),
      linear-gradient(135deg, #2a2317 0%, #15110a 100%);
  }
  .card-up.fav .poster {
    background:
      radial-gradient(circle at 30% 20%, rgba(124,92,255,0.22) 0%, transparent 60%),
      linear-gradient(135deg, #2a1f4f 0%, #15102a 100%);
  }
  .card-up .countdown-badge {
    position: absolute; top: 8px; left: 8px;
    padding: 3px 8px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    color: var(--next-amber);
    font-size: 9px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-radius: 999px;
    display: flex; align-items: center; gap: 4px;
  }
  .card-up .countdown-badge.urgent {
    background: var(--live-red);
    color: #fff;
    animation: pulse-bg 1.4s ease-in-out infinite;
  }
  .card-up .countdown-badge svg { width: 9px; height: 9px; stroke: currentColor; fill: none; stroke-width: 2; }
  .card-up .fav-badge {
    position: absolute; top: 8px; right: 8px;
    padding: 3px 6px;
    background: color-mix(in srgb, var(--accent) 26%, transparent);
    color: var(--accent-light);
    font-size: 8px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-radius: 5px;
    backdrop-filter: blur(6px);
  }
  @keyframes pulse-bg {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .card-up .preview-watermark {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    font-size: 9px;
    color: rgba(255,255,255,0.22);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 700;
  }
  .card-up .info {
    padding: 8px 10px 10px;
  }
  .card-up .room-tag {
    font-size: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 3px;
  }
  .card-up h4 {
    margin: 0 0 3px;
    font-size: 11px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text-primary);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-up .speaker-line {
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Empty */
  .empty {
    padding: 24px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 11px;
    border: 1px dashed var(--border);
    border-radius: 12px;
    margin: auto;
    width: fit-content;
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>Live Hub v5 · compact (sin scroll vertical)</h1>
  <span class="label">Live:</span>
  <button data-state="0">0</button>
  <button data-state="1">1</button>
  <button data-state="3" class="active">3</button>
  <button data-state="6">6</button>
  <span class="label">Upcoming:</span>
  <button data-upcoming="0">0</button>
  <button data-upcoming="3">3</button>
  <button data-upcoming="6" class="active">6</button>
  <button data-upcoming="10">10</button>
</div>

<div class="shell">
  <aside class="sidebar">
    <div class="brand">E</div>
    <div class="divider"></div>
    <div class="nav-item" title="Inicio">
      <svg viewBox="0 0 24 24"><path d="M3 12L12 4l9 8M5 10v10h4v-6h6v6h4V10"/></svg>
    </div>
    <div class="nav-item" title="Agenda">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
    </div>
    <div id="liveItem" class="nav-item active" title="En vivo">
      <svg viewBox="0 0 24 24">
        <path d="M2 12a10 10 0 0120 0M5 12a7 7 0 0114 0M8 12a4 4 0 018 0"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
      </svg>
    </div>
    <div class="nav-item" title="Speakers">
      <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3zM19 10v2a7 7 0 01-14 0v-2M12 19v3M8 22h8"/></svg>
    </div>
  </aside>

  <main class="stage">
    <div class="hub-header">
      <div>
        <h1 id="hubTitle">En vivo</h1>
        <div class="subtitle" id="hubSubtitle">3 transmisiones · 6 proximas</div>
      </div>
      <div class="live-pill-inline" id="liveBadge">3 EN VIVO</div>
    </div>

    <div class="section" id="liveSection">
      <div class="section-head">
        <h2 class="live">Pasando ahora</h2>
        <span class="qty" id="liveQty"></span>
      </div>
      <div class="row-scroll" id="liveRow"></div>
    </div>

    <div class="section" id="upcomingSection">
      <div class="section-head">
        <h2>Proximamente</h2>
        <span class="qty" id="upQty"></span>
      </div>
      <div class="row-scroll" id="upcomingRow"></div>
    </div>
  </main>
</div>

<script>
  const LIVE = [
    { id: 203, title: 'Keynote: Banca digital en LatAm', speaker: 'Maria Garcia', room: 'Auditorio Principal', featured: true, attendees: 245 },
    { id: 204, title: 'Workshop: TS avanzado', speaker: 'Sofia Hernandez', room: 'Sala 3', featured: false, attendees: 87 },
    { id: 207, title: 'Panel: Mujeres lideres en tech', speaker: 'Ana Martinez +1', room: 'Sala 2', featured: false, attendees: 132 },
    { id: 220, title: 'Roundtable: Future of fintech', speaker: 'Diego Pereira', room: 'Sala 4', featured: false, attendees: 64 },
    { id: 221, title: 'Q&A: Engineering leadership', speaker: 'Roberto Silva', room: 'Sala 5', featured: false, attendees: 53 },
    { id: 222, title: 'Demo: AI en customer support', speaker: 'Laura Torres', room: 'Sala 6', featured: false, attendees: 41 },
  ];
  const UPCOMING = [
    { id: 208, title: 'Demo: Real estate proptech', speaker: 'Jorge Vasquez', room: 'Sala 3', startsInMin: 8, isFavorite: true },
    { id: 209, title: 'Charla: Cultura de innovacion', speaker: 'Maria Garcia', room: 'Sala 1', startsInMin: 22, isFavorite: false },
    { id: 210, title: 'Fireside chat: Liderazgo en crisis', speaker: 'CEO panel', room: 'Auditorio', startsInMin: 58, isFavorite: true },
    { id: 211, title: 'Mesa redonda: Diversidad', speaker: 'Multiple', room: 'Sala 2', startsInMin: 90, isFavorite: false },
    { id: 212, title: 'Closing keynote', speaker: 'Carlos Rodriguez', room: 'Auditorio', startsInMin: 125, isFavorite: false },
    { id: 213, title: 'After-event networking', speaker: '—', room: 'Terraza', startsInMin: 180, isFavorite: false },
    { id: 214, title: 'Workshop hands-on: K8s', speaker: 'Pedro Ramirez', room: 'Sala 7', startsInMin: 220, isFavorite: true },
    { id: 215, title: 'Lightning talks', speaker: 'Multiple speakers', room: 'Sala 1', startsInMin: 280, isFavorite: false },
    { id: 216, title: 'Office hours con sponsors', speaker: '—', room: 'Lobby', startsInMin: 340, isFavorite: false },
    { id: 217, title: 'Recap & awards', speaker: 'Org team', room: 'Auditorio', startsInMin: 400, isFavorite: true },
  ];

  let liveCount = 3;
  let upcomingCount = 6;
  const liveItem = document.getElementById('liveItem');
  const liveRow = document.getElementById('liveRow');
  const upcomingRow = document.getElementById('upcomingRow');
  const hubTitle = document.getElementById('hubTitle');
  const hubSubtitle = document.getElementById('hubSubtitle');
  const liveBadge = document.getElementById('liveBadge');
  const liveQty = document.getElementById('liveQty');
  const upQty = document.getElementById('upQty');
  const liveSection = document.getElementById('liveSection');
  const upcomingSection = document.getElementById('upcomingSection');

  function refresh() {
    liveItem.innerHTML = `
      <svg viewBox="0 0 24 24">
        <path d="M2 12a10 10 0 0120 0M5 12a7 7 0 0114 0M8 12a4 4 0 018 0"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
      </svg>
    `;
    if (liveCount > 0) {
      liveItem.style.color = 'var(--live-red)';
      const dot = document.createElement('div');
      dot.className = 'pulse-dot';
      liveItem.appendChild(dot);
      if (liveCount >= 2) {
        const badge = document.createElement('div');
        badge.className = 'badge';
        badge.textContent = String(liveCount);
        liveItem.appendChild(badge);
      }
    } else {
      liveItem.style.color = '';
    }

    const live = LIVE.slice(0, liveCount).slice();
    live.sort((a, b) => Number(b.featured) - Number(a.featured) || b.attendees - a.attendees);
    const upcoming = UPCOMING.slice(0, upcomingCount).slice();
    upcoming.sort((a, b) => a.startsInMin - b.startsInMin);

    // Header
    if (live.length > 0) {
      hubTitle.textContent = 'En vivo';
      hubSubtitle.textContent = `${live.length} ${live.length === 1 ? 'transmision' : 'transmisiones'}${upcoming.length ? ` · ${upcoming.length} proximas` : ''}`;
      liveBadge.textContent = `${live.length} EN VIVO`;
      liveBadge.style.display = 'inline-flex';
    } else if (upcoming.length > 0) {
      hubTitle.textContent = 'Por arrancar';
      hubSubtitle.textContent = `${upcoming.length} sesiones proximas`;
      liveBadge.style.display = 'none';
    } else {
      hubTitle.textContent = 'En vivo';
      hubSubtitle.textContent = 'Sin sesiones activas ni proximas';
      liveBadge.style.display = 'none';
    }

    // Sections
    if (live.length === 0 && upcoming.length === 0) {
      liveSection.style.display = 'none';
      upcomingSection.style.display = 'none';
      // Empty global
      const stage = document.querySelector('.stage');
      if (!document.getElementById('emptyMsg')) {
        const m = document.createElement('div');
        m.id = 'emptyMsg';
        m.className = 'empty';
        m.style.gridRow = '2 / span 2';
        m.style.alignSelf = 'center';
        m.style.justifySelf = 'center';
        m.textContent = 'Cuando arranque alguna sesion en vivo aparece aqui.';
        stage.appendChild(m);
      }
      return;
    } else {
      const old = document.getElementById('emptyMsg');
      if (old) old.remove();
    }

    if (live.length > 0) {
      liveSection.style.display = 'grid';
      liveQty.textContent = `${live.length} ${live.length === 1 ? 'TRANSMISION' : 'TRANSMISIONES'}`;
      liveRow.innerHTML = live.map((s, i) => liveCard(s, i)).join('');
    } else {
      liveSection.style.display = 'none';
    }

    if (upcoming.length > 0) {
      upcomingSection.style.display = 'grid';
      upQty.textContent = `SIGUIENTES ${upcoming.length}`;
      upcomingRow.innerHTML = upcoming.map(s => upCard(s)).join('');
    } else {
      upcomingSection.style.display = 'none';
    }

    // Click bindings
    document.querySelectorAll('[data-id]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.id;
        const isLive = el.classList.contains('card-live');
        if (isLive) alert(`Navega a /session-stream/${id}`);
        else alert(`Navega a /agenda?highlight=${id}`);
      });
    });
  }

  function liveCard(s, idx) {
    const variant = s.featured ? 'featured' : `bg-${(idx % 3) + 1}`;
    return `
      <div class="card-live ${variant}" data-id="${s.id}" style="${s.featured ? 'aspect-ratio: 16/9;' : ''}">
        <div class="poster"></div>
        <div class="gradient"></div>
        <div class="top">
          <span class="live-tag">En vivo</span>
          <div style="display:flex; gap:6px;">
            ${s.featured ? '<span class="featured-tag">Sala principal</span>' : ''}
            <span class="audience-tag">${s.attendees}</span>
          </div>
        </div>
        <div class="play-overlay">
          <div class="play-icon">
            <svg viewBox="0 0 24 24"><polygon points="5 3 21 12 5 21 5 3"/></svg>
          </div>
        </div>
        <div class="info">
          <div class="room-tag">${s.room}</div>
          <h4>${s.title}</h4>
          <div class="speaker-line">${s.speaker}</div>
        </div>
      </div>
    `;
  }

  function upCard(s) {
    const urgent = s.startsInMin < 10;
    return `
      <div class="card-up${s.isFavorite ? ' fav' : ''}" data-id="${s.id}">
        <div class="poster">
          <div class="countdown-badge${urgent ? ' urgent' : ''}">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            EN ${s.startsInMin} MIN
          </div>
          ${s.isFavorite ? '<span class="fav-badge">Tu agenda</span>' : ''}
          <div class="preview-watermark">PROXIMAMENTE</div>
        </div>
        <div class="info">
          <div class="room-tag">${s.room}</div>
          <h4>${s.title}</h4>
          <div class="speaker-line">${s.speaker}</div>
        </div>
      </div>
    `;
  }

  document.querySelectorAll('.toolbar button').forEach(b => {
    b.addEventListener('click', () => {
      if (b.dataset.state !== undefined) {
        liveCount = Number(b.dataset.state);
        document.querySelectorAll('[data-state]').forEach(x => x.classList.toggle('active', x === b));
      } else if (b.dataset.upcoming !== undefined) {
        upcomingCount = Number(b.dataset.upcoming);
        document.querySelectorAll('[data-upcoming]').forEach(x => x.classList.toggle('active', x === b));
      }
      refresh();
    });
  });

  refresh();
</script>

</body>
</html>
